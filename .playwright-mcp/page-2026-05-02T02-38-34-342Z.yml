            - generic [ref=e349]:
              - generic [ref=e350]:
                - generic [ref=e351]:
                  - heading "1. Introduction" [level=2] [ref=e352]
                  - generic [ref=e353]:
                    - text: The rapid rise of digital platforms has raised concerns about their effects on business and society (
                    - link "Gerwe and Silva, 2020" [ref=e354] [cursor=pointer]:
                      - /url: "#bib43"
                      - generic [ref=e355]: Gerwe and Silva, 2020
                    - text: ","
                    - link "Ilsøe and Larsen, 2023" [ref=e356] [cursor=pointer]:
                      - /url: "#bib53"
                      - generic [ref=e357]: Ilsøe and Larsen, 2023
                    - text: ). These concerns are particularly pronounced in the context of
                    - emphasis [ref=e358]: digital labor platforms (DLPs)
                    - text: . DLPs are businesses that use their digital infrastructure (e.g., apps, websites) to act as intermediaries in transactions between workers and clients who need their services for specific ‘gigs’ (
                    - link "Howson et al., 2022" [ref=e359] [cursor=pointer]:
                      - /url: "#bib51"
                      - generic [ref=e360]: Howson et al., 2022
                    - text: ). The nature of these gigs can vary along many dimensions, including duration, skill requirements, and the extent to which they are tethered to a particular geographic region (
                    - link "Woodcock & Graham, 2019" [ref=e361] [cursor=pointer]:
                      - /url: "#bib121"
                      - generic [ref=e362]: Woodcock & Graham, 2019
                    - text: ). In recent years, we have seen a surge in the number of DLPs worldwide and the volume of ‘gigs’ intermediated through them. The
                    - link "International Labour Office (2021)" [ref=e363] [cursor=pointer]:
                      - /url: "#bib55"
                      - generic [ref=e364]: International Labour Office (2021)
                    - text: documented a nearly five-fold increase between 2010 and 2020, from 142 to 777. This growth stems from a rich constellation of factors, including the widespread availability of technologies that facilitate connectivity, longstanding trends towards greater outsourcing, workers’ desire for more latitude in their work, and customers’ desire for greater convenience (
                    - link "Woodcock & Graham, 2019" [ref=e365] [cursor=pointer]:
                      - /url: "#bib121"
                      - generic [ref=e366]: Woodcock & Graham, 2019
                    - text: ).
                  - generic [ref=e367]:
                    - text: Some of the purported benefits of DLPs have indeed materialized in recent years. In some cases, workers have been able to gain greater control over their work and access more profitable opportunities to sell their labor (
                    - link "Graham et al., 2017" [ref=e368] [cursor=pointer]:
                      - /url: "#bib45"
                      - generic [ref=e369]: Graham et al., 2017
                    - text: ). Clients, whether individual customers or other businesses, have access to a larger pool of workers to provide them with increasingly convenient and customized services (
                    - link "Woodcock & Graham, 2019" [ref=e370] [cursor=pointer]:
                      - /url: "#bib121"
                      - generic [ref=e371]: Woodcock & Graham, 2019
                    - text: ). The more transactions the DLPs facilitate, the more they are likely to benefit financially from network effects and come closer to achieving the coveted monopoly status that can garner significant financial return, particularly for early-stage, high-risk-taking investors (
                    - link "Christiaens, 2023" [ref=e372] [cursor=pointer]:
                      - /url: "#bib20"
                      - generic [ref=e373]: Christiaens, 2023
                    - text: ).
                  - generic [ref=e374]:
                    - text: At the same time, a growing chorus of policymakers, regulators, and researchers identified myriad concerns about how DLPs harm workers and transfer risk onto them. These harms include the deprivation of workers from benefits and protections, subjection to algorithmic management and automated decision-making, and violations of workers’ privacy and intensified workplace surveillance (
                    - link "Ilsøe and Larsen, 2023" [ref=e375] [cursor=pointer]:
                      - /url: "#bib53"
                      - generic [ref=e376]: Ilsøe and Larsen, 2023
                    - text: ","
                    - link "Rogers, 2023" [ref=e377] [cursor=pointer]:
                      - /url: "#bib95"
                      - generic [ref=e378]: Rogers, 2023
                    - text: ","
                    - link "Uzunca and Kas, 2023" [ref=e379] [cursor=pointer]:
                      - /url: "#bib116"
                      - generic [ref=e380]: Uzunca and Kas, 2023
                    - text: ). These measures curtail workers’ autonomy to self-determine when and how they work, and the pay they can set, with some DLPs being more guilty of this than others. Yet, DLPs actively encourage ‘responsibilization’, whereby the worker becomes responsible for remediating these harms and taking on additional entrepreneurial risks (
                    - link "Kluzik, 2022" [ref=e381] [cursor=pointer]:
                      - /url: "#bib63"
                      - generic [ref=e382]: Kluzik, 2022
                    - text: ). Instead of the state or the corporations operating DLPs, it is the workers
                    - emphasis [ref=e383]: qua
                    - text: entrepreneurs who are burdened with the costs and financial responsibility of ensuring their own occupational safety and health, tax payments, obtaining the requisite insurance and licenses, preventing their capital assets depreciating (e.g., cars, computers, smartphones), and taking on any legal liabilities that might arise (
                    - link "Bieber and Moggia, 2021" [ref=e384] [cursor=pointer]:
                      - /url: "#bib7"
                      - generic [ref=e385]: Bieber and Moggia, 2021
                    - text: ","
                    - link "Dubal, 2017" [ref=e386] [cursor=pointer]:
                      - /url: "#bib33"
                      - generic [ref=e387]: Dubal, 2017
                    - text: ","
                    - link "Nielsen et al., 2022" [ref=e388] [cursor=pointer]:
                      - /url: "#bib87"
                      - generic [ref=e389]: Nielsen et al., 2022
                    - text: ","
                    - link "The App-Based Drivers Union of Bangladesh, 2022" [ref=e390] [cursor=pointer]:
                      - /url: "#bib110"
                      - generic [ref=e391]: The App-Based Drivers Union of Bangladesh, 2022
                    - text: ). As discussed in this article, depending on the organizational and legal structure of a DLP, workers
                    - emphasis [ref=e392]: qua
                    - text: entrepreneurs can be exposed to joint and several liability for the actions of other members of the DLP or violating securities laws through their financing or revenue-generation activities. In many instances, DLP workers can find themselves simultaneously facing pressure to leave and pressure to stay. Working in precarious conditions on unfavorable terms creates a desire to exit, while accumulated debt generates pressure to continue working for the DLP.
                  - generic [ref=e393]:
                    - text: Given these negative effects, researchers spanning many disciplines have joined the growing chorus of multilateral organizations, policymakers, and labor unions to investigate the regulation of DLPs. A common approach has been to study major deficiencies and gaps in existing regulations and suggest interventions. For example,
                    - link "Cutolo and Kenney (2021)" [ref=e394] [cursor=pointer]:
                      - /url: "#bib25"
                      - generic [ref=e395]: Cutolo and Kenney (2021)
                    - text: advanced an array of suggestions to improve regulation, including creating stakeholder councils and a dedicated regulatory agency focused on platform competition. Recently, this has been coupled with setting baseline standards for working conditions, data governance, and privacy protections in DLPs at the supranational level (i.e., the EU’s Platform Work Directive) and similar proposals for setting standards for decent work in the platform economy at the international level (i.e., the proposal for an ILO Convention on Realizing Decent Work in the Platform Economy) (
                    - link "International Labour Organization, 2025" [ref=e396] [cursor=pointer]:
                      - /url: "#bib56"
                      - generic [ref=e397]: International Labour Organization, 2025
                    - text: ).
                  - generic [ref=e398]:
                    - text: A further approach, which we speak to in this paper, examines how alternative forms of DLP ownership and governance contribute to remedying or exacerbating worker harms and entrepreneurial risks. What we term Cooperative DLPs emerged in large part as a response to concerns about Corporate DLPs and a desire to humanize work in the digital economy (
                    - link "Mannan and Pek, 2024" [ref=e399] [cursor=pointer]:
                      - /url: "#bib75"
                      - generic [ref=e400]: Mannan and Pek, 2024
                    - text: ","
                    - link "Scholz, 2023" [ref=e401] [cursor=pointer]:
                      - /url: "#bib101"
                      - generic [ref=e402]: Scholz, 2023
                    - text: ). More recently, what we term DAO DLPs have emerged in part as a potential means of addressing some of the challenges Cooperative DLPs can face when it comes to their governance and financing (
                    - link "Amend et al., 2024" [ref=e403] [cursor=pointer]:
                      - /url: "#bib3"
                      - generic [ref=e404]: Amend et al., 2024
                    - text: ","
                    - link "Gurkov, 2022" [ref=e405] [cursor=pointer]:
                      - /url: "#bib46"
                      - generic [ref=e406]: Gurkov, 2022
                    - text: ). While there is a growing body of work chronicling the evolution of these three archetypes, we lack a critical comparison of how and why they contribute to worker harms and entrepreneurial risks. We argue that this hinders scholars’, policymakers’, and cooperators’ efforts to more comprehensively advance a digital solidarity economy.
                  - generic [ref=e407]:
                    - text: Our paper takes up this opportunity by critically comparing these three archetypes in terms of their governance and financing and, in turn, their potential to amplify or mitigate workers’ exposure to harms and entrepreneurial risks. To undertake our critical comparison, we consulted literature on each of these archetypes in the fields of management, organizational theory, and law. From this literature, we identified prominent examples of each archetype, which we then explored in greater detail by, for instance, reviewing their publicly accessible legal documents and promotional materials. This allowed us to synthesize the characteristics of these three archetypes. Our paper thereby makes two overarching contributions to research on cooperatives and the emerging digital solidarity economy. First, we advance our understanding of
                    - emphasis [ref=e408]: how
                    - text: different configurations of ownership and governance shape the harms and entrepreneurial risks workers face in the burgeoning digital economy. While much of the attention in this nascent body of literature has focused on Corporate DLPs and, more recently, Cooperative DLPs, we shed light on a newer set of DAO DLPs when comparing these archetypes. As we argue, for those interested in tracking the evolution of work in the digital economy and cultivating a digital solidarity economy, the DAO DLP, especially the Cooperative DAO DLP variant, are important to be mindful of as they present new opportunities and challenges to enact collaborative governance at scale and raise financing. Second, and relatedly, our article deepens our knowledge about
                    - emphasis [ref=e409]: why
                    - text: DLPs are legally structured in particular ways and how these choices about their structure prompt the evolution of organizational archetypes. Our paper explains how legal entities are used to manage entrepreneurial risks in the digital economy, with liability mitigation being a key, but not sole, driver for how these archetypes are organized and the legal entities chosen. Our analysis of the Cooperative DAO DLP sheds light on how the cooperative legal structure may be used in the web3 industry—a burgeoning sector in which web applications use blockchain technology for their backend infrastructure (
                    - link "de Filippi et al., 2025" [ref=e410] [cursor=pointer]:
                      - /url: "#bib29"
                      - generic [ref=e411]: de Filippi et al., 2025
                    - text: )—for
                    - emphasis [ref=e412]: strategic
                    - text: reasons as well as
                    - emphasis [ref=e413]: value-driven
                    - text: reasons, such as adherence to the ICA’s cooperative principles or practicing solidarity. If buttressed by further supportive legislation, this trend has the potential to gain significant momentum among cooperators interested in leveraging new and emerging technologies like blockchain.
                  - generic [ref=e414]:
                    - text: "In the next three sections of this paper, we progressively move through each of the three focal archetypes in turn: Corporate DLPs, Cooperative DLPs, and DAO DLPs. For each archetype, we begin by defining it and elaborating its distinctiveness based on its governance and financing. When it comes to governance, we consider who has ultimate governance control over the firm, how decisions about the platform are made, and what the overarching form of governance is. We also synthesize what we currently know about the nature of worker voice, workers"
                    - emphasis [ref=e415]: qua
                    - text: workers’ risk of being harmed, and workers
                    - emphasis [ref=e416]: qua
                    - text: entrepreneurs’ exposure to entrepreneurial risks. One of the two variants of DAO DLPs we discuss—the Cooperative DAO DLP—uses the cooperative legal structure to manage legal risks, evidencing a gradual hybridization of organizational archetypes. We conclude with a discussion that synthesizes our scholarly and practical contributions and identifies promising avenues for future research.
                - generic [ref=e417]:
                  - heading "2. Corporate DLPs" [level=2] [ref=e418]
                  - generic [ref=e419]:
                    - text: The first, and ubiquitous, archetype of DLP is the Corporate DLP, which refers to DLPs that are owned and operated by for-profit, investor-owned corporations. Early Corporate DLPs, such as Amazon Mechanical Turk (AMT) in 2005 (
                    - link "Schwartz, 2019" [ref=e420] [cursor=pointer]:
                      - /url: "#bib103"
                      - generic [ref=e421]: Schwartz, 2019
                    - text: ), emerged as a complement to an earlier generation of e-commerce platforms (e.g., Amazon) that needed to outsource parcels of work that were at the time too difficult to automate and would otherwise require a large hired workforce to complete. The success of AMT led to the DLP being used as a service by other businesses. Human intelligence tasks, like data labelling and other small tasks, were completed by a globally dispersed workforce, with each task typically earning a worker a few cents (
                    - link "Ekbia & Nardi, 2017" [ref=e422] [cursor=pointer]:
                      - /url: "#bib37"
                      - generic [ref=e423]: Ekbia & Nardi, 2017
                    - text: ).
                  - generic [ref=e424]:
                    - text: The global financial crisis of 2008 and the recession that followed were key factors behind the explosive growth of Corporate DLPs across a range of sectors. While the development of digital platforms enabled multi-sided markets to be created online, the increase in home ownership costs and the need to save on expenses during this period were major socio-economic factors behind public interest in making efficient use of idle resources (e.g., cars) (
                    - link "Habibi and Kohli, 2022" [ref=e425] [cursor=pointer]:
                      - /url: "#bib47"
                      - generic [ref=e426]: Habibi and Kohli, 2022
                    - text: ","
                    - link "Mont et al., 2020" [ref=e427] [cursor=pointer]:
                      - /url: "#bib82"
                      - generic [ref=e428]: Mont et al., 2020
                    - text: ). Corporate DLPs, such as Uber and Lyft, became quickly popular due to their promise of efficiently allocating these resources using their matchmaking algorithms, but what was deliberately obscured was how these DLPs coordinate and extract economic value from labor. As discussed further below, the (often elusive) pursuit of profit by the corporate operators of these labor platforms and their well-heeled investors has resulted in many forms of labor exploitation.
                  - generic [ref=e429]:
                    - heading "2.1. Corporate DLPs’ governance and financing" [level=3] [ref=e430]
                    - generic [ref=e431]:
                      - text: Corporate DLPs are often initially created as startups with the goal of eventually completing a successful exit strategy, typically through an initial public offering or a business sale to another corporation (
                      - link "Mannan & Schneider, 2021" [ref=e432] [cursor=pointer]:
                        - /url: "#bib77"
                        - generic [ref=e433]: Mannan & Schneider, 2021
                      - text: ). These corporations are established by founders who, typically, espouse the view that legacy institutions and regulations have led to market failures and have been detrimental to individual human freedom. To be able to finance these high-risk enterprises, the founders secure the support of a “tight-knit social club of risk-taking financiers”, from angel investors to venture capital funds to sovereign wealth funds, to fill this entrepreneurial financing void (
                      - link "Zwick, 2022" [ref=e434] [cursor=pointer]:
                        - /url: "#bib122"
                        - generic [ref=e435]: Zwick, 2022
                      - text: ", p. 47). Venture capital funds are not just investors in start-ups; they are also a mechanism for coordinating capital allocation from several actors to achieve the occasional, exponential financial return. In addition to the general partners who create, manage, and partially invest in the funds, the limited partners of these funds are capitalized by “public and private pension funds, university endowments and foundations, insurance companies, and wealthy families and individuals” ("
                      - link "Shestakofsky, 2024" [ref=e436] [cursor=pointer]:
                        - /url: "#bib104"
                        - generic [ref=e437]: Shestakofsky, 2024
                      - text: ", p. 6). VC funds are designed to seek liquidity from their investments within a short time period, as their business model depends on the startups they invest in achieving a high valuation—not generating high operating revenue ("
                      - link "Shestakofsky, 2024" [ref=e438] [cursor=pointer]:
                        - /url: "#bib104"
                        - generic [ref=e439]: Shestakofsky, 2024
                      - text: ). It is this logic that animates VC funds’ involvement in the corporate governance of the startups they invest in and their overarching interest in pursuing a profitable ‘liquidity event’, whether through an initial public offering or an acquisition.
                    - generic [ref=e440]:
                      - text: When it comes to ultimate control of the firm, which refers to “whatever collective choice procedure [e.g., voting] used to make decisions when legally enforceable contracts are silent about what needs to be done” (
                      - link "Dow, 2018" [ref=e441] [cursor=pointer]:
                        - /url: "#bib32"
                        - generic [ref=e442]: Dow, 2018
                      - text: ", p. 4), we classify Corporate DLPs as capital-managed firms (KMFs), where ultimate control over the business is held by financial investors. This ultimate control is exercised in several ways, from appointing or removing the board of directors of the corporation to deciding on the winding up and dissolution of the business. In terms of the forms of governance, Corporate DLPs have"
                      - emphasis [ref=e443]: plutocratic governance
                      - text: ", as it is the wealth of investors that determines the weight of their voice in ‘one share, one vote’ governance systems. Plutocratic governance can also become oligarchic governance due to the dual-class share structures of some Corporate DLPs (e.g., Lyft), which privilege the voice of early founder-investors by granting them extra votes per share ("
                      - link "Bebchuk & Kastiel, 2019" [ref=e444] [cursor=pointer]:
                        - /url: "#bib6"
                        - generic [ref=e445]: Bebchuk & Kastiel, 2019
                      - text: ). This can, in some cases, create a governance system dominated by a wealthy few.
                    - generic [ref=e446]:
                      - text: Delegated management with a board structure means that capital suppliers (e.g., ordinary shareholders) are not able to have a day-to-day role in setting business policy (
                      - link "Armour et al., 2017" [ref=e447] [cursor=pointer]:
                        - /url: "#bib4"
                        - generic [ref=e448]: Armour et al., 2017
                      - text: ). This includes decisions about ICT and data governance, which, as
                      - link "Weber and colleagues (2009)" [ref=e449] [cursor=pointer]:
                        - /url: "#bib119"
                        - generic [ref=e450]: Weber and colleagues (2009)
                      - text: observed, are closely related to a business’s profit and growth orientation. In practice, these decisions relate to topics like user interfaces and application programming interfaces of the platform, the collection, use, and governance of data, and the development of software code (
                      - link "Schreieck et al., 2016" [ref=e451] [cursor=pointer]:
                        - /url: "#bib102"
                        - generic [ref=e452]: Schreieck et al., 2016
                      - text: ). In a Corporate DLP, these decisions are set by corporate management and the employees of the corporate platform with a view towards profit maximization, without direct intervention by any stakeholders (
                      - link "Armour et al., 2017" [ref=e453] [cursor=pointer]:
                        - /url: "#bib4"
                        - generic [ref=e454]: Armour et al., 2017
                      - text: ","
                      - link "Weber et al., 2009" [ref=e455] [cursor=pointer]:
                        - /url: "#bib119"
                        - generic [ref=e456]: Weber et al., 2009
                      - text: ). As suggested by
                      - link "Tiwana and colleagues (2010)" [ref=e457] [cursor=pointer]:
                        - /url: "#bib115"
                        - generic [ref=e458]: Tiwana and colleagues (2010)
                      - text: ", the partitioning of decision rights between platform owners and platform ‘users’ is a scale, with a concentration of decision rights in the former group leading to centralization and a shift of decision rights to the latter group leading to decentralization. Since Corporate DLPs give management the ultimate say in such questions, decision-making over platform design is"
                      - emphasis [ref=e459]: highly centralized
                      - text: .
                    - generic [ref=e460]:
                      - text: Given this approach to governance, it is no surprise that workers on Corporate DLPs have
                      - emphasis [ref=e461]: very minimal
                      - text: opportunities to exercise voice, and those opportunities that they do have tend to be significantly curtailed. In many jurisdictions, platform workers lack access to formal voice channels, such as representation through labor unions, which are typically available to workers outside the platform economy (
                      - link "Bucher et al., 2024" [ref=e462] [cursor=pointer]:
                        - /url: "#bib13"
                        - generic [ref=e463]: Bucher et al., 2024
                      - text: ","
                      - link "Stewart and Stanford, 2022" [ref=e464] [cursor=pointer]:
                        - /url: "#bib107"
                        - generic [ref=e465]: Stewart and Stanford, 2022
                      - text: ). In countries like India, there is also concern that government policies do not adequately address the needs of Corporate DLP workers, such as ensuring the payment of a minimum wage or a pension (
                      - link "Malhotra & Agrawal, 2025" [ref=e466] [cursor=pointer]:
                        - /url: "#bib69"
                        - generic [ref=e467]: Malhotra & Agrawal, 2025
                      - text: ). As a result, platform workers have developed various alternative forms of voice, notably ‘grassroots’ practices like public demonstrations and strikes, as well as communities and forums focused on networking and peer support (
                      - link "Dasgupta et al., 2025" [ref=e468] [cursor=pointer]:
                        - /url: "#bib26"
                        - generic [ref=e469]: Dasgupta et al., 2025
                      - text: ","
                      - link "Novianto, 2025" [ref=e470] [cursor=pointer]:
                        - /url: "#bib88"
                        - generic [ref=e471]: Novianto, 2025
                      - text: ). There has also been some, more or less successful, movement in various jurisdictions aimed at granting platform workers access to formal voice mechanisms like works councils and labor unions (
                      - link "Johnston and Land-Kazlauskas, 2018" [ref=e472] [cursor=pointer]:
                        - /url: "#bib57"
                        - generic [ref=e473]: Johnston and Land-Kazlauskas, 2018
                      - text: ","
                      - link "Stewart and Stanford, 2022" [ref=e474] [cursor=pointer]:
                        - /url: "#bib107"
                        - generic [ref=e475]: Stewart and Stanford, 2022
                      - text: ), which many platform workers desire even when they are classified as being self-employed (
                      - link "Martindale et al., 2024" [ref=e476] [cursor=pointer]:
                        - /url: "#bib78"
                        - generic [ref=e477]: Martindale et al., 2024
                      - text: ). However, these efforts to increase platform workers’ voice often face significant headwinds. In some cases, corporate platforms use their control over the platform to disrupt nascent forms of communication and voice among workers (
                      - link "Kougiannou & Mendonça, 2021" [ref=e478] [cursor=pointer]:
                        - /url: "#bib64"
                        - generic [ref=e479]: Kougiannou & Mendonça, 2021
                      - text: ) and, in other cases, they use their political and economic clout to advocate for policies that are detrimental to worker voice, such as misclassification as independent contractors (
                      - link "Bogg, 2022" [ref=e480] [cursor=pointer]:
                        - /url: "#bib10"
                        - generic [ref=e481]: Bogg, 2022
                      - text: ).
                  - generic [ref=e482]:
                    - heading "2.2. Implications for worker harms and entrepreneurial risks" [level=3] [ref=e483]
                    - generic [ref=e484]:
                      - text: Prioritization of workers’ interests is weak in Corporate DLPs, and adherence to shareholder wealth maximization remains the norm for both startup Corporate DLPs and Corporate DLPs that have gone public (
                      - link "Pollman, 2019" [ref=e485] [cursor=pointer]:
                        - /url: "#bib91"
                        - generic [ref=e486]: Pollman, 2019
                      - text: ). This can be attributed, in large part, to how Corporate DLPs are financed and, in turn, owned and governed. As the DLP business model involves operational and regulatory disruption, it is not easy to finance through traditional means, such as bank loans. To be able to subsidize the bonuses, discounts, and other incentives needed to draw workers and consumers to a match-making platform, financiers with deep pockets and appetites for large risks are required (
                      - link "Zwick, 2022" [ref=e487] [cursor=pointer]:
                        - /url: "#bib122"
                        - generic [ref=e488]: Zwick, 2022
                      - text: ). In exchange for the financial risk they take, they expect a significant role in the governance of Corporate DLPs, which frequently includes board seats and veto rights on key decisions. This arrangement can create perverse incentives to make choices that favor short-term revenue generation (e.g., questionable data use practices, unregulated expansion to new markets), while harming workers’ rights and the long-term sustainability of the business. For example, Corporate DLPs have been found to use their near-exclusive control over the platform and working conditions to reduce communication options between workers, intimidate workers into performing desired tasks, and terminate workers without due process (
                      - link "Taylor et al., 2023" [ref=e489] [cursor=pointer]:
                        - /url: "#bib109"
                        - generic [ref=e490]: Taylor et al., 2023
                      - text: ). Thus, workers on Corporate DLPs have a
                      - emphasis [ref=e491]: high
                      - text: risk of being harmed.
                    - generic [ref=e492]:
                      - text: Workers on Corporate DLPs also have a
                      - emphasis [ref=e493]: high
                      - text: exposure to entrepreneurial risks arising from the uncertainty about the status of platform workers as employees or self-employed persons. Many Corporate DLPs seek to contractually assert the default presumption that platform workers are self-employed, thereby requiring them to bear the costs of insurance, obtaining and maintaining the equipment they use, and paying into social security and pension contributions (when required)—and the attendant risks of failing to bear these costs (see e.g.,
                      - link "Harpur & Blanck, 2020" [ref=e494] [cursor=pointer]:
                        - /url: "#bib48"
                        - generic [ref=e495]: Harpur & Blanck, 2020
                      - text: ). In the urban gig economy, this can typically take the form of platform workers taking on debt to pay for the vehicles they use for work (
                      - link "The App-Based Drivers Union of Bangladesh, 2022" [ref=e496] [cursor=pointer]:
                        - /url: "#bib110"
                        - generic [ref=e497]: The App-Based Drivers Union of Bangladesh, 2022
                      - text: ). This status quo is possible in large part because of the regulatory gaps and deficiencies that corporate platforms can exploit. The experience of Uber, in particular, demonstrates a willingness to operate in jurisdictions in the absence of—or even in spite of—relevant licensing regimes. Deeming Uber drivers as being self-employed—and intensively and opaquely harvesting data from them as well as consumers—may aid in revenue generation but may risk violations of employment laws (
                      - link "Adams-Prassl, 2022" [ref=e498] [cursor=pointer]:
                        - /url: "#bib1"
                        - generic [ref=e499]: Adams-Prassl, 2022
                      - text: ). The judgments in the
                      - emphasis [ref=e500]: Aslam and Farrar
                      - text: case against Uber, the Deliveroo cases in the U.K. and the Netherlands, and the
                      - emphasis [ref=e501]: Heller
                      - text: case in Canada are just four high-profile examples concerning employment law violations that led to financial harm for platform workers (
                      - link "Sagel et al., 2023" [ref=e502] [cursor=pointer]:
                        - /url: "#bib97"
                        - generic [ref=e503]: Sagel et al., 2023
                      - text: ).
                - generic [ref=e504]:
                  - heading "3. Cooperative DLPs" [level=2] [ref=e505]
                  - generic [ref=e506]:
                    - text: Increased awareness of the abovementioned risks and harms workers are exposed to on Corporate DLPs has been pivotal in the rise of our next archetype, the Cooperative DLP, which refers to DLPs owned and operated by member-owned and -governed cooperatives that include platform workers as a member category (
                    - link "Mannan and Pek, 2024" [ref=e507] [cursor=pointer]:
                      - /url: "#bib75"
                      - generic [ref=e508]: Mannan and Pek, 2024
                    - text: ). Cooperative DLPs, which can be seen as a sub-type of ‘platform cooperative’, are associated with the platform cooperativism movement that began gaining momentum in 2014 through a series of publications and conferences as a response to the harms posed by platform capitalism to workers and communities (
                    - link "Mannan, 2022" [ref=e509] [cursor=pointer]:
                      - /url: "#bib71"
                      - generic [ref=e510]: Mannan, 2022
                    - text: ). The people who came to be part of the platform cooperativism movement drew inspiration from earlier cooperative movements, social movements for economic democracy and social justice, and efforts at translating lessons from commons governance, open source and peer-to-peer technology governance, and distributed trading networks to digital networks (
                    - link "Ghirlanda and Kirov, 2024" [ref=e511] [cursor=pointer]:
                      - /url: "#bib44"
                      - generic [ref=e512]: Ghirlanda and Kirov, 2024
                    - text: ","
                    - link "Mannan et al., 2023" [ref=e513] [cursor=pointer]:
                      - /url: "#bib76"
                      - generic [ref=e514]: Mannan et al., 2023
                    - text: ). As early as 2011, members of the Spanish cyberpunk community, Las Indias, had identified platforms as a type of cooperative, and an Italian cooperative federation recognized the need for users to have greater control over the data they share with digital platforms through the use of cooperative structures (
                    - link "Schneider, 2018" [ref=e515] [cursor=pointer]:
                      - /url: "#bib100"
                      - generic [ref=e516]: Schneider, 2018
                    - text: ). The structure of Cooperative DLPs draws heavily on the earlier experience of structuring worker cooperatives and, in some cases, multi-stakeholder cooperatives. Cooperative DLPs, like earlier worker cooperatives, typically have worker-members, managers, and directors drawn from their members, and occasionally non-member workers and other categories of members (e.g., user members) (
                    - link "Burdin and Dean, 2009" [ref=e517] [cursor=pointer]:
                      - /url: "#bib17"
                      - generic [ref=e518]: Burdin and Dean, 2009
                    - text: ","
                    - link "Mannan and Pek, 2024" [ref=e519] [cursor=pointer]:
                      - /url: "#bib75"
                      - generic [ref=e520]: Mannan and Pek, 2024
                    - text: ","
                    - link "OECD, 2023" [ref=e521] [cursor=pointer]:
                      - /url: "#bib89"
                      - generic [ref=e522]: OECD, 2023
                    - text: ). While some Cooperative DLPs have members who are also software developers, in some cases, the software developers are non-member workers distinct from the worker-members of the cooperative (e.g., The Drivers Cooperative in
                    - link "Khafagy, 2024" [ref=e523] [cursor=pointer]:
                      - /url: "#bib61"
                      - generic [ref=e524]: Khafagy, 2024
                    - text: ).
                  - generic [ref=e525]:
                    - text: Cooperative DLPs offer their members a voice in business governance, strive to offer their worker-members and non-member workers better working terms and conditions than on other digital platforms, and, in some cases, a voice in the design and data governance of platforms (
                    - link "Muldoon, 2022" [ref=e526] [cursor=pointer]:
                      - /url: "#bib85"
                      - generic [ref=e527]: Muldoon, 2022
                    - text: ). Since 2013, a significant number of Cooperative DLPs have been formed. These include a global stock photographers’ cooperative (Stocksy United), immigrant women’s cleaning cooperatives (e.g., Up&Go), delivery cooperatives (e.g., CoopCycle), business consultancy cooperatives (Perú Tres i Coop), and ride-hailing cooperatives (e.g., the Driver’s Cooperative) (
                    - link "Scholz, 2023" [ref=e528] [cursor=pointer]:
                      - /url: "#bib101"
                      - generic [ref=e529]: Scholz, 2023
                    - text: ). Many Cooperative DLPs are legally registered as cooperatives; however, a few are not due to limitations in local cooperative law or because a particular jurisdiction allows a cooperative to choose among a variety of legal forms (e.g., the UK) (
                    - link "Mannan, 2022" [ref=e530] [cursor=pointer]:
                      - /url: "#bib71"
                      - generic [ref=e531]: Mannan, 2022
                    - text: ). These Cooperative DLPs instead strive to conform to the seven internationally-recognized cooperative principles developed by the International Cooperative Alliance (e.g., the waste-pickers’ platform, Cataki, built and managed by an NGO; the delivery Cooperative DLP, York Collective, formed as a Private Company Limited by Guarantee) (
                    - link "Mannan, 2022" [ref=e532] [cursor=pointer]:
                      - /url: "#bib71"
                      - generic [ref=e533]: Mannan, 2022
                    - text: ","
                    - link "Wegner et al., 2024" [ref=e534] [cursor=pointer]:
                      - /url: "#bib120"
                      - generic [ref=e535]: Wegner et al., 2024
                    - text: ). What all these Cooperative DLPs have in common is that they are labor-managed firms (LMFs), in which ultimate control over the business rests with labor providers (
                    - link "Dow, 2018" [ref=e536] [cursor=pointer]:
                      - /url: "#bib32"
                      - generic [ref=e537]: Dow, 2018
                    - text: ).
                  - generic [ref=e538]:
                    - heading "3.1. Cooperative DLPs’ governance and financing" [level=3] [ref=e539]
                    - generic [ref=e540]:
                      - text: As indicated by the examples above, in our conception of Cooperative DLPs, these organizations need not be registered as cooperatives—which may not be possible in all jurisdictions—but must be “structured in line with the International Cooperative Alliance Statement on the Cooperative Identity” with one set of its members being platform workers (
                      - link "Mayo, 2019" [ref=e541] [cursor=pointer]:
                        - /url: "#bib79"
                        - generic [ref=e542]: Mayo, 2019
                      - text: ", p. 20). Compliance with the Statement on the Cooperative Identity means adherence to the seven cooperative principles advanced by the"
                      - link "International Cooperative Alliance (n.d.)" [ref=e543] [cursor=pointer]:
                        - /url: "#bib54"
                        - generic [ref=e544]: International Cooperative Alliance (n.d.)
                      - text: ": 1. Voluntary and Open Membership; 2. Democratic Member Control; 3. Member Economic Participation; 4. Autonomy and Independence; 5. Education, Training, and Information; 6. Cooperation among Cooperatives; 7. Concern for Community. The principle of democratic member control stipulates that cooperatives are governed based on a ‘one member, one vote’ basis. Consequently, because the capital contributed by members typically does not affect voting power, when it comes to forms of governance, Cooperative DLPs can be described as having"
                      - emphasis [ref=e545]: democratic governance
                      - text: .
                    - generic [ref=e546]:
                      - text: If Corporate DLPs centralize decision-making power over platform design, the decision-making power of members of Cooperative DLPs in this domain varies on a case-by-case basis. In some Cooperative DLPs, decision-making about platform design rests with cooperative management and non-member workers (
                      - link "Khafagy, 2024" [ref=e547] [cursor=pointer]:
                        - /url: "#bib61"
                        - generic [ref=e548]: Khafagy, 2024
                      - text: ), whereas in others, worker-members are also software developers and/or have a decisive say in platform design (
                      - link "Mannan, 2022" [ref=e549] [cursor=pointer]:
                        - /url: "#bib71"
                        - generic [ref=e550]: Mannan, 2022
                      - text: ). There are still constraints, however, on who can contribute to platform design, with Cooperative DLPs not allowing fully permissionless contributions like DAOs do, as we will elaborate in our overview of DAO DLPs. Cooperative laws do occasionally provide for worker-members to be able to make direct interventions in business policy through member resolutions (e.g., in Portugal) or delegate all the decision-making powers of the board of directors to the general assembly of worker-members in a collective structure (e.g., in the United Kingdom) (
                      - link "Meira, 2023" [ref=e551] [cursor=pointer]:
                        - /url: "#bib80"
                        - generic [ref=e552]: Meira, 2023
                      - text: ). Even if a cooperative has investor members, ultimate control of the business is typically held by labor-providing members. The members of the Cooperative DLP appoint and remove a board of directors and are the ultimate deciders of whether to wind up and dissolve the cooperative.
                    - generic [ref=e553]:
                      - text: While Cooperative DLPs have several formal mechanisms for workers to exercise their voice and thus have a
                      - emphasis [ref=e554]: very high
                      - text: degree of worker voice in principle, empirical research provides a somewhat more complex picture of how worker voice operates in practice.
                      - link "Bunders and de Moor (2024)" [ref=e555] [cursor=pointer]:
                        - /url: "#bib16"
                        - generic [ref=e556]: Bunders and de Moor (2024)
                      - text: highlight an important tension between maintaining robust member participation and efficient decision-making.
                      - link "Mannan and Pek (2024)" [ref=e557] [cursor=pointer]:
                        - /url: "#bib75"
                        - generic [ref=e558]: Mannan and Pek (2024)
                      - text: found some perceived successes when it comes to worker-members’ democratic participation, but also important challenges, such as low and uneven levels of participation and difficulties or inabilities to voice on certain topics. These challenges can be influenced by individual-level factors, like members’ affective commitment (
                      - link "Bunders, 2024" [ref=e559] [cursor=pointer]:
                        - /url: "#bib14"
                        - generic [ref=e560]: Bunders, 2024
                      - text: ), in addition to factors relevant to the entire platform-worker cooperative sector, like the tendency for workers to multi-home and work outside of a physical workplace (
                      - link "Mannan & Pek, 2024" [ref=e561] [cursor=pointer]:
                        - /url: "#bib75"
                        - generic [ref=e562]: Mannan & Pek, 2024
                      - text: ).
                    - generic [ref=e563]:
                      - text: Additionally, it is important to note that there are barriers to entry and exit to cooperative membership, and, as such, contributions of code to Cooperative DLPs are not permissionless or fully decentralized. For example, the ride-hailing software of The Drivers Cooperative, which includes software applications for both drivers and riders, does not allow users to modify or reproduce these applications (clause 7(b),
                      - link "The Drivers Cooperative Terms of Service, n.d." [ref=e564] [cursor=pointer]:
                        - /url: "#bib112"
                        - generic [ref=e565]: The Drivers Cooperative Terms of Service, n.d.
                      - text: ). CoopCycle—a federation of delivery cooperatives—develops order management software for cooperatives and restaurants as well as a consumer-facing application, but this software is deliberately developed for, and by, worker cooperatives exclusively (
                      - link "Jones et al., 2021" [ref=e566] [cursor=pointer]:
                        - /url: "#bib58"
                        - generic [ref=e567]: Jones et al., 2021
                      - text: ) using a ‘CoopyLeft’ license (
                      - link "CoopCycle CoopyLeft License, n.d." [ref=e568] [cursor=pointer]:
                        - /url: "#bib24"
                        - generic [ref=e569]: CoopCycle CoopyLeft License, n.d.
                      - text: ). This license means that modifications to the software for commercial use cannot be made freely by the wider public beyond worker cooperatives. In addition, there are Cooperative DLPs that license and use corporate third-party software, with limited to no role for cooperative members in design choices (
                      - link "Estima & Lemos, 2025" [ref=e570] [cursor=pointer]:
                        - /url: "#bib39"
                        - generic [ref=e571]: Estima & Lemos, 2025
                      - text: ). As there are often deliberate restrictions on
                      - emphasis [ref=e572]: who
                      - text: can contribute to the technical design of a platform, we consider decision-making over platform design in Cooperative DLPs to be
                      - emphasis [ref=e573]: moderately centralized
                      - text: .
                    - generic [ref=e574]:
                      - text: When it comes to financing, Cooperative DLPs face significant challenges as they are either unable to attract the same risk-seeking venture capital that is attracted to Corporate DLPs (
                      - link "Borkin, 2019" [ref=e575] [cursor=pointer]:
                        - /url: "#bib11"
                        - generic [ref=e576]: Borkin, 2019
                      - text: ), or unwilling to attract external investor finance as it may involve trading off their social mission in favor of the commercial imperatives of those investors (
                      - link "Bunders & De Moor, 2024" [ref=e577] [cursor=pointer]:
                        - /url: "#bib16"
                        - generic [ref=e578]: Bunders & De Moor, 2024
                      - text: ). Instead, Cooperative DLPs seek funding through alternative sources, including capital from value-aligned investors, crowdfunding, philanthropic donations, government grants, and worker-members’ contributions (
                      - link "Kasparian and Súnico, 2023" [ref=e579] [cursor=pointer]:
                        - /url: "#bib60"
                        - generic [ref=e580]: Kasparian and Súnico, 2023
                      - text: ","
                      - link "Scholz, 2023" [ref=e581] [cursor=pointer]:
                        - /url: "#bib101"
                        - generic [ref=e582]: Scholz, 2023
                      - text: ). Context plays an important role in the financing of Cooperative DLPs. As
                      - link "Bunders and colleagues (2022)" [ref=e583] [cursor=pointer]:
                        - /url: "#bib15"
                        - generic [ref=e584]: Bunders and colleagues (2022)
                      - text: point out, worker-members’ ability to contribute is intrinsically connected to the level of skill required for the work, which ultimately influences workers’ income. Additionally, the amount of capital required to create platform cooperatives varies depending on the technology’s complexity and its prior availability, such as through open-source licenses or in existing organizations prior to conversion to cooperatives (
                      - link "Bunders et al., 2022" [ref=e585] [cursor=pointer]:
                        - /url: "#bib15"
                        - generic [ref=e586]: Bunders et al., 2022
                      - text: ).
                  - generic [ref=e587]:
                    - heading "3.2. Implications for worker harms and entrepreneurial risks" [level=3] [ref=e588]
                    - generic [ref=e589]:
                      - text: In contrast with Corporate DLPs, given that workers are the ultimate controllers of Cooperative DLPs, their governance and decisions about platform design prioritize workers’ interests and aim to achieve favorable outcomes for them. As the voice of investors is limited in Cooperative DLPs, the perverse incentives that exist for Corporate DLPs are diminished. These dynamics have been borne out in some empirical research.
                      - link "Kasparian and colleagues (2023)" [ref=e590] [cursor=pointer]:
                        - /url: "#bib60"
                        - generic [ref=e591]: Kasparian and colleagues (2023)
                      - text: undertook a comparative study between a Corporate DLP and a Cooperative DLP in the domestic cleaning industry. They found that the latter garnered significant improvements for workers, such as sick leave provisions, freedom from individual performance ratings from customers, and a greater proportion of the revenues from their services. These improvements stemmed from the influence worker-members had over decisions left to investor-appointed managers and, increasingly, algorithms. In a similar vein,
                      - link "Kasparian (2025)" [ref=e592] [cursor=pointer]:
                        - /url: "#bib59"
                        - generic [ref=e593]: Kasparian (2025)
                      - text: ", writing on platform worker cooperatives of couriers, concluded that “these cooperatives enable workers to transform a precarious and lonely job into one that is more stable, protected, shared, and self-managed.”"
                    - generic [ref=e594]: However, Cooperative DLPs do not address all concerns that might arise regarding worker harms or entrepreneurial risks. This is complicated by the lack of clarity about the employment status of Cooperative DLP members, an issue that has received scant attention compared to that of corporate platform workers. While Cooperative DLPs seek to avoid harm to workers by giving them greater control over their working terms and conditions, there are many open questions about the applicability of labor and employment law to platform worker members. This is because, depending on how the work relationship and cooperative are structured, and the jurisdiction(s) applicable to this relationship, these members may be either self-employed, employees, or worker-members with a distinct membership relationship with the cooperative.
                    - generic [ref=e595]:
                      - text: For instance, Article 5(1) of the EU’s new Platform Work Directive introduces a rebuttable legal presumption that platform workers are employees of the digital labor platforms if “facts indicating direction and control are found” and places the burden on the operator of the digital labor platform to “prove that the contractual relationship in question is not an employment relationship as defined by the law, collective agreements or practice in force in the Member States, with consideration to the case-law of the [European] Court of Justice” (
                      - link "Directive (EU) 2024/2831 of the European Parliament and of the Council of 23 October 2024 on Improving Working Conditions in Platform Work (Text with EEA Relevance), 2024" [ref=e596] [cursor=pointer]:
                        - /url: "#bib31"
                        - generic [ref=e597]: Directive (EU) 2024/2831 of the European Parliament and of the Council of 23 October 2024 on Improving Working Conditions in Platform Work (Text with EEA Relevance), 2024
                      - text: ", article 5(1)). While worker cooperatives may enter into employment contracts with their cooperative members (e.g., in France, see"
                      - link "Hiez, 2017" [ref=e598] [cursor=pointer]:
                        - /url: "#bib50"
                        - generic [ref=e599]: Hiez, 2017
                      - text: ), this is not universally the case as the working relationship with a worker cooperative may be governed by a distinct legal regime on worker-members (e.g., in Spain, see
                      - link "Law 27/1999 of 16 July 1999, n.d." [ref=e600] [cursor=pointer]:
                        - /url: "#bib66"
                        - generic [ref=e601]: Law 27/1999 of 16 July 1999, n.d.
                      - text: ", Section 20.1; in Italy, see"
                      - link "Law No. 142/2001, n.d." [ref=e602] [cursor=pointer]:
                        - /url: "#bib67"
                        - generic [ref=e603]: Law No. 142/2001, n.d.
                      - text: ) or simply be structured to be self-employment (
                      - link "Footprint Workers’ Co-o operative Ltd & Seeds for Change Lancaster Co-operative Ltd, 2015" [ref=e604] [cursor=pointer]:
                        - /url: "#bib42"
                        - generic [ref=e605]: Footprint Workers’ Co-o operative Ltd & Seeds for Change Lancaster Co-operative Ltd, 2015
                      - text: ) in some countries. The rebuttable presumption may create unique dilemmas for Cooperative DLPs in the European Union and European Economic Area that wish their members to be self-employed. On the one hand, these members may already have the information rights and communication channels mandated by the Platform Work Directive making compliance relatively trivial as a practical matter, but on the other hand, compliance may burden the Cooperative DLP with mandatory employer contributions to insurances, pensions, and social security that previously did not exist (depending on the jurisdiction concerned) (
                      - link "Directive (EU) 2024/2831 of the European Parliament and of the Council of 23 October 2024 on Improving Working Conditions in Platform Work (Text with EEA Relevance), 2024" [ref=e606] [cursor=pointer]:
                        - /url: "#bib31"
                        - generic [ref=e607]: Directive (EU) 2024/2831 of the European Parliament and of the Council of 23 October 2024 on Improving Working Conditions in Platform Work (Text with EEA Relevance), 2024
                      - text: ", articles 14, 20)."
                    - generic [ref=e608]:
                      - text: From the perspective of Cooperative DLP members as workers, a harm that arises from the employment status issue is uncertainty about
                      - emphasis [ref=e609]: who
                      - text: needs to pay into insurance, pensions, and social security schemes—whether the worker-member or the cooperative— which will turn on how the cooperative is structured and the law applicable to this work relationship (see, e.g.,
                      - link "Equal Care, n.d." [ref=e610] [cursor=pointer]:
                        - /url: "#bib38"
                        - generic [ref=e611]: Equal Care, n.d.
                      - text: ). This uncertainty also relates to the scope of traditional employment protections, such as wrongful dismissal protections and inclusion in collective bargaining agreements. In Italy, for instance, where there is a distinct legal regime governing the work relationship between a worker cooperative and a worker-member, members who are excluded from a worker cooperative do not enjoy statutory protection from wrongful dismissal (
                      - link "Law No. 142/2001, n.d." [ref=e612] [cursor=pointer]:
                        - /url: "#bib67"
                        - generic [ref=e613]: Law No. 142/2001, n.d.
                      - text: ","
                      - link "Section 5" [ref=e614] [cursor=pointer]:
                        - /url: "#sec0080"
                        - generic [ref=e615]: Section 5
                      - text: (2)). This distinct legal regime also allows some derogations from collective bargaining agreements, provided that members comply with the minimum economic treatment set out in those agreements (
                      - link "Dueñas Herrero & Tonelli, 2022" [ref=e616] [cursor=pointer]:
                        - /url: "#bib34"
                        - generic [ref=e617]: Dueñas Herrero & Tonelli, 2022
                      - text: ). This gives rise to the ominous possibility that Cooperative DLPs are used to create weaker workplace protections, a phenomenon that has already been seen with worker cooperatives in countries like Italy (
                      - link "Dueñas Herrero & Tonelli, 2022" [ref=e618] [cursor=pointer]:
                        - /url: "#bib34"
                        - generic [ref=e619]: Dueñas Herrero & Tonelli, 2022
                      - text: ). Thus, in view of the above, workers on Cooperative DLPs have a
                      - emphasis [ref=e620]: moderate
                      - text: risk of being harmed.
                    - generic [ref=e621]:
                      - text: Workers on Cooperative DLPs also have a
                      - emphasis [ref=e622]: moderate
                      - text: exposure to entrepreneurial risks given the possibility that platform workers who seek to take collective action would be considered as engaging in illegal price-fixing or cartel-like behavior. However, at least in the EU, this risk appears to be diminishing as EU policymakers have clearly indicated that they will protect such dependent solo self-employed people’s rights to undertake collective action (
                      - link "Communication from the Commission Guidelines on the Application of Union Competition Law to Collective Agreements Regarding the Working Conditions of Solo Self-Employed Persons 2022/C 374/02, 2022" [ref=e623] [cursor=pointer]:
                        - /url: "#bib23"
                        - generic [ref=e624]: Communication from the Commission Guidelines on the Application of Union Competition Law to Collective Agreements Regarding the Working Conditions of Solo Self-Employed Persons 2022/C 374/02, 2022
                      - text: ). As Cooperative DLPs are typically second, third, or fourth movers in a market, they typically enter after a rudimentary legal framework/regulatory clarity has been introduced for a new sector. Nevertheless, as the material risk disclosures of The Drivers Cooperative indicate, Cooperative DLPs themselves are wary about the fast-evolving and unpredictable nature of regulatory developments in their sector and how these regulations may affect their operations and commercial viability (
                      - link "The Drivers Cooperative, 2022" [ref=e625] [cursor=pointer]:
                        - /url: "#bib111"
                        - generic [ref=e626]: The Drivers Cooperative, 2022
                      - text: ), potentially jeopardizing the work opportunities of their members and the service provided to clients in New York City. One approach that has sought to bypass these harms and risks, while enabling new forms of collaboration at scale, is the formation of the blockchain-based Decentralized Autonomous Organization (DAO).
                - generic [ref=e627]:
                  - heading "4. DAO DLPs" [level=2] [ref=e628]
                  - generic [ref=e629]:
                    - text: The third organizational archetype is the
                    - emphasis [ref=e630]: DAO DLP
                    - text: ", which refers to DLPs that are owned and operated by DAOs. The corporate entities behind the archetypes discussed so far—corporations and cooperatives—have long histories, particularly compared to DAOs, which were first launched in 2016. As such, a few words are needed about DAOs before introducing DAO DLPs. A DAO is a “blockchain-based system that enables people to coordinate and govern themselves mediated by a set of self-executing rules deployed on a public blockchain, and whose governance is decentralized (i.e., independent from central control)” ("
                    - link "Hassan & De Filippi, 2021" [ref=e631] [cursor=pointer]:
                      - /url: "#bib49"
                      - generic [ref=e632]: Hassan & De Filippi, 2021
                    - text: ", p. 2). Some have described DAOs as an evolution of the cooperative form ("
                    - link "Thomas, 2024" [ref=e633] [cursor=pointer]:
                      - /url: "#bib114"
                      - generic [ref=e634]: Thomas, 2024
                    - text: ), with claims that DAOs can potentially overcome the democratic governance and financing challenges that larger cooperatives (including Cooperative DLPs) encounter, by introducing new governance systems (e.g., reputation-based voting) and novel financing instruments (e.g., issuing crypto-tokens to community members) (
                    - link "Amend et al., 2024" [ref=e635] [cursor=pointer]:
                      - /url: "#bib3"
                      - generic [ref=e636]: Amend et al., 2024
                    - text: ","
                    - link "Gurkov, 2022" [ref=e637] [cursor=pointer]:
                      - /url: "#bib46"
                      - generic [ref=e638]: Gurkov, 2022
                    - text: ","
                    - link "Mannan, 2018" [ref=e639] [cursor=pointer]:
                      - /url: "#bib70"
                      - generic [ref=e640]: Mannan, 2018
                    - text: ). But as the definition of a DAO indicates, there are key differences with earlier legal entities. DAOs do not by default have a board of directors like in a corporation or cooperative, but instead involve the automated ‘self-execution’ of certain transactions (e.g., payments from the DAO) and direct human involvement in certain decisions, typically through the use of a native crypto-token (e.g., choosing and voting on projects to financially support). DAOs typically manage a shared ‘treasury’, which pools assets from capital suppliers and makes donations/grants to projects based on proposals voted upon by the capital suppliers. As we will see below, however, DAOs, including the DAO DLPs that are the subject of this article, often use legal entities for structuring purposes.
                  - generic [ref=e641]:
                    - text: "As DAOs are, at their core, a collection of smart contracts deployed on a public, permissionless blockchain, they share five distinguishing characteristics with their underlying technology: (a) decentralization, (b) transnationality, (c) tamper-resistance, (d) pseudonymity, and (e) operational autonomy ("
                    - link "De Filippi et al., 2022" [ref=e642] [cursor=pointer]:
                      - /url: "#bib28"
                      - generic [ref=e643]: De Filippi et al., 2022
                    - text: ). This requires some elaboration, as these features are markedly different from both corporations and cooperatives. DAOs are globally dispersed by default, existing on the copies of the blockchain maintained by blockchain nodes. The human members of DAOs are usually similarly globally dispersed, as there are no nationality requirements for membership. Exceptionally, there are some local or regional DAOs that, for instance, organize in-person events (
                    - link "Viano et al., 2023" [ref=e644] [cursor=pointer]:
                      - /url: "#bib118"
                      - generic [ref=e645]: Viano et al., 2023
                    - text: ). Because members only require a public-private key pair to generate a public address and interact with the DAO, members are pseudonymous by default. DAOs cannot be shut down through unilateral action by a public or private actor, because a copy of the underlying blockchain is maintained by every node and shutting down one or more nodes will not disable the entire network. Finally, it is possible to deploy rules on a blockchain that ‘self-execute’ when certain conditions are met, enabling the operational autonomy of the blockchain without requiring human involvement for execution or enforcement (
                    - link "De Filippi et al., 2022" [ref=e646] [cursor=pointer]:
                      - /url: "#bib28"
                      - generic [ref=e647]: De Filippi et al., 2022
                    - text: ).
                  - generic [ref=e648]:
                    - text: The first DAO emerged as a decentralized alternative to the Kickstarter crowdfunding platform, enabling a distributed crowd to fund and vote on projects that need financing. Unlike corporate platforms like Kickstarter, where the corporate platform operator intermediates transactions between funders and the projects, The DAO offered the ability for peers to directly support and substantially control projects, including whether a new employee was hired by the project or not (
                    - link "DuPont, 2018" [ref=e649] [cursor=pointer]:
                      - /url: "#bib36"
                      - generic [ref=e650]: DuPont, 2018
                    - text: ), as well as control the governance of The DAO itself. In doing so, it removed the need for DAO contributors to trust any single central organization, unlike in corporations and cooperatives. The DAO was quickly able to raise about $250 million from 10,000 to 20,000 people (
                    - link "DuPont, 2018" [ref=e651] [cursor=pointer]:
                      - /url: "#bib36"
                      - generic [ref=e652]: DuPont, 2018
                    - text: ) before it suffered a cyberattack that scuttled its long-term future. Despite the travails of the first DAO, the allure of a fully decentralized, peer-to-peer mode of exchange did not dissipate, rendering intermediary corporate or cooperative entities redundant. Around the same time, La’Zooz offered the promise of a decentralized Uber, and OpenBazaar enabled the payment of e-commerce transactions with cryptocurrency on a decentralized marketplace. These projects drew considerable media attention but were ultimately short-lived.
                  - generic [ref=e653]:
                    - text: "In contrast, a project that has been far more long-lived is a collaboration of software developers to build a tool to launch DAOs. In 2018, the collaboration that came to be dOrg sought a way to coordinate a globally distributed network of developers. Here, they found a DAO structure useful for their purposes: instead of a DAO being used to coordinate crowdfunding, it could be used to coordinate the governing power a member has in the DAO. Members of dOrg receive REP tokens based on every US dollar they earn, as well as for performing certain internal functions, with the amount of REP determining the member’s voting power ("
                    - link "Mannan, 2023" [ref=e654] [cursor=pointer]:
                      - /url: "#bib72"
                      - generic [ref=e655]: Mannan, 2023
                    - text: "). While non-blockchain systems could be used to dynamically record and track members’ voting power, the advantage of a blockchain-based system is that it is transparent to the public and resistant to censorship and other forms of abuse. More fundamentally, this experiment in governance by a software developers’ collective represents an evolution of a third archetype beyond Corporate DLPs and Cooperative DLPs: the DAO DLP. These come in two main variants, which we discuss below."
                  - generic [ref=e656]:
                    - 'heading "4.1. DAO DLP variants: non-cooperative DAO DLPs and cooperative DAO DLPs" [level=3] [ref=e657]'
                    - generic [ref=e658]:
                      - text: DAO DLPs are used to intermediate transactions between workers and clients to provide goods and/or services. While DAOs are most commonly used for decentralized financial services, with attendant sector-specific risks that are currently being addressed globally (
                      - link "Bodellini et al., 2025" [ref=e659] [cursor=pointer]:
                        - /url: "#bib9"
                        - generic [ref=e660]: Bodellini et al., 2025
                      - text: ), DAO DLPs have begun to emerge. dOrg is a software developers’ collective and Developer DAO educates blockchain developers, builds software tools, and provides consulting services. Friends with Benefits has been described as a ‘social club’ (
                      - link "Schiller, 2025" [ref=e661] [cursor=pointer]:
                        - /url: "#bib99"
                        - generic [ref=e662]: Schiller, 2025
                      - text: ), but as one of its functions is to help its 5500 + members build a global creative community, develop art and software applications, and learn more about blockchain tools, it would fit the definition of a DAO DLP as well.
                    - generic [ref=e663]:
                      - text: "These DAO DLPs did not initially use a legal entity to ‘wrap’ their activities and gain the benefits of legal personality and limited liability. However, by the time of writing, they began using a legal entity (known as a ‘legal wrapper’ in the industry), which we classify into two main variants: the DAO DLP wrapped in a non-cooperative legal form and the DAO DLP wrapped in a cooperative legal form. We will refer to them subsequently as Non-Cooperative DAO DLPs and Cooperative DAO DLPs. Future DAO DLPs are also likely to eventually use a legal entity, although regulatory developments may come to support the legal personality and limited liability of ‘unwrapped’ DAO DLPs (unwrapped is an industry term used to describe DAO DLPs that do not use a legal entity) ("
                      - link "Moore, 2021" [ref=e664] [cursor=pointer]:
                        - /url: "#bib83"
                        - generic [ref=e665]: Moore, 2021
                      - text: ).
                    - generic [ref=e666]:
                      - heading "4.1.1. Non-cooperative DAO DLPs" [level=4] [ref=e667]
                      - generic [ref=e668]:
                        - text: The key features of a DAO DLP, applied to a sample Non-Cooperative DAO DLP (dOrg), are provided in
                        - link "Table 1" [ref=e669] [cursor=pointer]:
                          - /url: "#sec0090"
                          - generic [ref=e670]: Table 1
                        - text: .
                      - generic [ref=e671]:
                        - heading "4.1.1.1. Non-Cooperative DAO DLP’s Governance and Financing" [level=5] [ref=e672]
                        - generic [ref=e673]:
                          - text: Among Non-Cooperative DAO DLPs, the blockchain-based limited liability company (BBLC), the unincorporated nonprofit association (UNA), and the foundation are popular legal forms. When it comes to their governance, unlike the ‘one share, one vote’ standard of corporations and the ‘one member, one vote’ standard of cooperatives, many Non-Cooperative DAO DLPs have ‘one token, one vote’, sometimes coupled with the delegation of votes to other members and mechanisms to dynamically diminish the voting power of a member relative to other members should they stop actively contributing to the organization for an extended period (e.g., dOrg) (
                          - link "Mannan, 2023" [ref=e674] [cursor=pointer]:
                            - /url: "#bib72"
                            - generic [ref=e675]: Mannan, 2023
                          - text: ). While the ownership structures of DAOs are very diverse, and many are KMFs, Non-Cooperative DAO DLPs are distinct as they are typically LMFs (e.g., dOrg) or hybrid firms (e.g., Friends With Benefits), with both capital and labor suppliers sharing ultimate control (
                          - link "Dow, 2018" [ref=e676] [cursor=pointer]:
                            - /url: "#bib32"
                            - generic [ref=e677]: Dow, 2018
                          - text: ). There are many channels through which Non-Cooperative DAO DLP contributors, including Non-Cooperative DAO DLP workers, can use their voice on governance and operational issues, for instance, through online public forums, gated social media (e.g., Discord servers, X), instant messaging platforms (e.g., Telegram, Signal), and in-person gatherings and community conferences. These discussions can range from the decision to create a new legal entity to facilitate the Non-Cooperative DAO DLP’s activities to creating new structures for the Non-Cooperative DAO DLP’s accountability to operational matters like the hiring of a new employee to sponsoring community events. Importantly, these channels of communication are complemented by voting mechanisms that allow these workers to cast votes on proposals relating to this matter (e.g., proposals allocating funding to hire a new employee). We therefore consider Non-Cooperative DAO DLPs to enable a
                          - emphasis [ref=e678]: moderate
                          - text: degree of worker voice. However, ultimate control over these decisions is made by labor suppliers or a combination of capital and labor suppliers, depending on the relative amount and weight of their tokens. As such, there are risks that token-weighted voting (i.e., one token, one vote) can lead to concentrations of wealth and power in the hands of a few token holders (referred to as ‘whales’), raising the specter of plutocratic and oligarchic governance in Non-Cooperative DAO DLPs (
                          - link "Augustin et al., 2023" [ref=e679] [cursor=pointer]:
                            - /url: "#bib5"
                            - generic [ref=e680]: Augustin et al., 2023
                          - text: ), as in Corporate DLPs (
                          - link "Dunlavy, 2004" [ref=e681] [cursor=pointer]:
                            - /url: "#bib35"
                            - generic [ref=e682]: Dunlavy, 2004
                          - text: ).
                        - generic [ref=e683]:
                          - text: Admittedly, alternatives to token-weighted voting that also maintain members’ pseudonymity are difficult to design. Pseudonymity is seen as an important feature of DAOs generally for many members, but ensuring pseudonymous participation creates the risk of users generating multiple fake identities and sabotaging governance processes, i.e., conducting Sybil attacks (e.g., members not casting the one vote they are entitled to but 100 votes through 100 fake profiles or with a 100 separate crypto-wallets) (
                          - link "Swathi et al., 2019" [ref=e684] [cursor=pointer]:
                            - /url: "#bib108"
                            - generic [ref=e685]: Swathi et al., 2019
                          - text: ). Furthermore, many DAOs use a multi-signature wallet (‘multisig’) to record off-chain decisions onto a blockchain, which requires a majority of multisig members (e.g., 5-of-7) to ‘sign’ with their public keys. While multi-sig members are typically bound to execute members’ approved proposals and decisions, there is the potential for this important function to be abused through behind-the-scenes, off-chain coordination (
                          - link "Kumar et al., 2022" [ref=e686] [cursor=pointer]:
                            - /url: "#bib65"
                            - generic [ref=e687]: Kumar et al., 2022
                          - text: ). Consequently, Non-Cooperative DAO DLPs—without necessary counter-measures—are vulnerable to both plutocratic and oligarchic governance. A few Non-Cooperative DAO DLPs, like dOrg, as explained above and in
                          - link "Table 1" [ref=e688] [cursor=pointer]:
                            - /url: "#sec0090"
                            - generic [ref=e689]: Table 1
                          - text: ", have meritocratic governance as members’ voting power is contingent on the quality of their recent work. We therefore conclude that the Non-Cooperative DAO DLPs have forms of governance ranging from the"
                          - emphasis [ref=e690]: meritocratic to the plutocratic and oligarchic
                          - text: .
                        - generic [ref=e691]:
                          - text: Finally, in contrast to Corporate DLPs and Cooperative DLPs, exit and entry requirements for membership in a Non-Cooperative DAO DLP are generally low, as members are pseudonymous and transnationally dispersed. Moreover, as open-source technologies, anyone can comment on or duplicate the interfaces and codebase of the DAO in a permissionless manner, meaning that anyone can create and deploy a near-identical DAO with only a few technical alterations. While this does not mean that members will inevitably move to the newly created DAO, this ‘forking’ offers a novel form of exit to DAO members who wish to avail themselves of it. As such, we deem Non-Cooperative DAO DLPs to be
                          - emphasis [ref=e692]: highly decentralized
                          - text: in terms of decisions about platform design.
                        - generic [ref=e693]:
                          - text: When it comes to financing, many DAOs have been described as new, global venture capital vehicles (
                          - link "Alon et al., 2025" [ref=e694] [cursor=pointer]:
                            - /url: "#bib2"
                            - generic [ref=e695]: Alon et al., 2025
                          - text: ), with the difference being that instead of general partners investing through the VC fund,
                          - emphasis [ref=e696]: anyone
                          - text: can in principle invest in DAOs in exchange for cryptocurrencies (e.g., Eth), usually issued during an Initial Coin Offering (ICO) in the past or other token sale event. In return, the DAO member receives governance tokens that give them the right to draft and vote on proposals concerning the DAO’s governance and operations. In addition, venture capital funds such as a16z crypto (the crypto arm of the major VC fund, Andreessen Horowitz) also invest in a vast range of DAOs, thereby mirroring the strategy of Corporate DLPs to receive investment from actors that have a high-risk tolerance. Non-Cooperative DAO DLPs, in particular, have also been known to raise funds through selling non-fungible tokens (NFTs) or receiving venture capital investment (e.g.,
                          - link "Nabben, 2024" [ref=e697] [cursor=pointer]:
                            - /url: "#bib86"
                            - generic [ref=e698]: Nabben, 2024
                          - text: ).
                      - generic [ref=e699]:
                        - heading "4.1.1.2. Implications for worker harms and entrepreneurial risks" [level=5] [ref=e700]
                        - generic [ref=e701]:
                          - text: To fully appreciate the impact of Non-Cooperative DAO DLPs on its members
                          - emphasis [ref=e702]: qua
                          - text: workers and members
                          - emphasis [ref=e703]: qua
                          - text: entrepreneurs, it is first necessary to recognize that there are many questions about both the legal classification of DAOs and the lawfulness of their financing methods. If a DAO is not registered as a legal entity, no jurisdiction confers legal personality and limited liability onto DAOs without at least meeting certain minimum conditions. For instance, some courts in California have held that DAOs are general partnerships by default (e.g.,
                          - link "Sarcuni v. bZx Dao, 2023" [ref=e704] [cursor=pointer]:
                            - /url: "#bib98"
                            - generic [ref=e705]: Sarcuni v. bZx Dao, 2023
                          - text: ). For unwrapped DAO DLPs whose worker-members are classified as partners in a general partnership, this means that the default presumption is that they are self-employed—unless they can prove their work relationship with the unwrapped DAO DLP indicates otherwise. As discussed earlier with Corporate DLPs, this can exclude worker-members from the statutory protections and benefits that employees (or ‘third-category’ dependent workers) receive. Instead, worker-members of unwrapped DAO DLPs would have to secure, for e.g., their own health insurance at their own cost from organizations tailored to the distinct nature of their work (
                          - link "Mannan & De Filippi, 2026a" [ref=e706] [cursor=pointer]:
                            - /url: "#bib73"
                            - generic [ref=e707]: Mannan & De Filippi, 2026a
                          - text: ). This can be particularly cumbersome for the worker-member if the unwrapped DAO DLP seeks to operate in an otherwise highly regulated sector, such as the care sector. Wrapping the DAO DLP in a non-cooperative legal form provides greater legal certainty as the Non-Cooperative DAO DLP has legal personality and can enter into contracts as an employer. However, as discussed earlier, DAOs, including both unwrapped and Non-Cooperative DAO DLPs, typically tie voting power to tokens acquired on a one token, one vote basis (e.g., Friends With Benefits), thereby creating an incentive for plutocracy and centralized control (
                          - link "Nabben, 2024" [ref=e708] [cursor=pointer]:
                            - /url: "#bib86"
                            - generic [ref=e709]: Nabben, 2024
                          - text: ). As such, despite professions of social interests and commitments, there is a risk that at least some Non-Cooperative DAO DLPs will privilege financial interests over those of, e.g., workers or other stakeholders. With VC funds such as a16z crypto indicating that they wish to be active governance participants in the Friends with Benefits DAO (i.e., a Non-Cooperative DAO DLP), the risk of such a compromise is all too real. As a result, workers on Non-Cooperative DAO DLPs have a
                          - emphasis [ref=e710]: high
                          - text: risk of being harmed.
                        - generic [ref=e711]:
                          - text: In terms of entrepreneurial risks, classification as a general partnership presents the risk that worker-members of an unwrapped DAO DLP will be held jointly and severally liable for the offenses of the unwrapped DAO DLP. It is also possible that, as general partners, courts will interpret unwrapped DAO DLP members as owing fiduciary duties to one another by default (e.g., the duty of loyalty) (
                          - link "Mannan & De Filippi, 2026b" [ref=e712] [cursor=pointer]:
                            - /url: "#bib74"
                            - generic [ref=e713]: Mannan & De Filippi, 2026b
                          - text: ), which may be out of step with how DAOs operate in practice. A default presumption that developers or other members of an unwrapped DAO DLP are fiduciaries could create the risk that they have a legal duty to perform an act they either cannot do or cannot do without jeopardizing the fundamental features of this type of organization.
                        - generic [ref=e714]:
                          - text: Not having a legal personality impairs an unwrapped DAO’s capacity to enter into contracts in its own name or file lawsuits. The treatment of unwrapped DAOs under tax law also remains contentious (
                          - link "Brunson, 2023" [ref=e715] [cursor=pointer]:
                            - /url: "#bib12"
                            - generic [ref=e716]: Brunson, 2023
                          - text: ). The modes of financing that were used early on by unwrapped DAOs also presented entrepreneurial risks. These entities went through a period of offering crypto-tokens to a crowd of investors as a way of raising millions (and, in some cases, billions) of dollars. Despite the seeming novelty of such tokens, courts and regulators in the U.S. and elsewhere deemed many of them to be unregistered securities that were illegally offered to the public. This has led to the imposition of stiff penalties and the shuttering of multiple DAOs, thereby destroying community confidence, decimating savings, and leaving a tarnished reputation. While the second Trump administration in the United States has adopted a pro-crypto policy, including a commitment to abandon ‘regulation by prosecution’ of unintentional unregistered securities offering violations (
                          - link "Blanche, 2025" [ref=e717] [cursor=pointer]:
                            - /url: "#bib8"
                            - generic [ref=e718]: Blanche, 2025
                          - text: ), there is still a lack of clarity over the status of unregistered DAOs globally. We can therefore conclude that workers involved in unwrapped DAO DLPs have a
                          - emphasis [ref=e719]: very high
                          - text: exposure to entrepreneurial risks, which is why we see the use of legal wrappers. The use of a non-cooperative legal entity somewhat reduces Non-Cooperative DAO DLP workers’ exposure to entrepreneurial risk to
                          - emphasis [ref=e720]: high
                          - text: ", as it opens up possibilities for the Non-Cooperative DAO DLP to receive traditional forms of debt or equity investment. However, this shift in entrepreneurial risk does not necessarily reduce members’ exposure to harm as workers, as these non-cooperative legal forms are not inherently worker friendly."
                    - generic [ref=e721]:
                      - heading "4.1.2. Cooperative DAO DLPs" [level=4] [ref=e722]
                      - generic [ref=e723]: Recently, some DAO DLPs have begun using the limited co-operative association (LCA) as a legal wrapper. This choice goes further than the Non-Cooperative DAO DLP variant in mitigating worker harms and entrepreneurial risks, but does not ameliorate all of them. These Cooperative DAO DLPs are a variant of DAO DLP that can have far-reaching implications. They are not just a strategic choice but often reflect the democratic and egalitarian inclinations of their founders.
                      - generic [ref=e724]:
                        - heading "4.1.2.1. Cooperative DAO DLP’s governance and financing" [level=5] [ref=e725]
                        - generic [ref=e726]:
                          - text: "Recognizing the risks of plutocratic and oligarchic governance in Non-Cooperative DAO DLPs, the adoption of the cooperative form is intended to counteract such tendencies by embracing democratic governance (i.e., one member, one vote). Examples of Cooperative DAO DLPs include: Indie LCA (a multi-stakeholder cooperative that enables independent contractors to provide goods and services to clients and to collectively bid for client work), SongADAO Co-op LCA (a multi-stakeholder cooperatives that shares the daily music composed and performed by Jonathan Mann since 2008, as well as the financial rewards from this effort), and The Platform DAO Limited (a multi-stakeholder cooperative that serves as a publishing platform and provides open-source blockchain-based tools for artists and creators). As with other cooperatives, Cooperative DAO DLPs typically have"
                          - emphasis [ref=e727]: democratic
                          - text: governance (one member, one vote) but some Cooperative DAO DLPs like Indie LCA have a
                          - emphasis [ref=e728]: meritocratic
                          - text: one token, one vote model. What is distinctive about this specific one token, one vote model is that the tokens issued to independent contractors (i.e., $INDIE) are not purchased but earned through work or contributions to Indie LCA—thereby tying patronage to voting power. This choice of cooperative legal structure requires curtailing the inherent pseudonymity of DAOs, as the identities of members are typically revealed to the cooperative or even the state. This ameliorates the risk of Sybil attacks on governance processes through the creation of fake anonymous identities. While members can continue to have online personas that are distinct from their legal identities, particularly in public interactions, this does not necessarily hamper the generation of social capital or trust within a wider community. Web3 communities, of which Cooperative DAO DLPs are a part, have their own approaches to building social capital and trust among a combination of pseudonymous and identifiable persons within their distinct culture, from transparent metrics about a person’s reputation, contributions and token-holdings to tools for deliberation and decision-making that are less reliant on ‘real-world’ identities (
                          - link "Chen et al., 2025" [ref=e729] [cursor=pointer]:
                            - /url: "#bib19"
                            - generic [ref=e730]: Chen et al., 2025
                          - text: ","
                          - link "Estorick, 2022" [ref=e731] [cursor=pointer]:
                            - /url: "#bib40"
                            - generic [ref=e732]: Estorick, 2022
                          - text: ","
                          - link "Merk, 2024" [ref=e733] [cursor=pointer]:
                            - /url: "#bib81"
                            - generic [ref=e734]: Merk, 2024
                          - text: ). As such, the community at the heart of the seventh cooperative principle may look different for Cooperative DAO DLPs than Cooperative DLPs or cooperatives generally.
                        - generic [ref=e735]:
                          - text: Cooperative DAO DLPs have provisions in their internal rules that prohibit non-user investor members from dominating non-investor members. In the UK, the Financial Conduct Authority requires this for ‘bona fide’ cooperatives to be registered (paragraph 6.32,
                          - link "Financial Conduct Authority, 2015" [ref=e736] [cursor=pointer]:
                            - /url: "#bib41"
                            - generic [ref=e737]: Financial Conduct Authority, 2015
                          - text: ). These include not allowing non-user investor-members to have a decisive say over key strategic decisions, such as conversion into a company or amalgamation with another cooperative (e.g., clauses 66(e), 70(b)(i)-(ii) and 128–129, (
                          - link "The Rules of the Platform DAO Limited, 2023" [ref=e738] [cursor=pointer]:
                            - /url: "#bib113"
                            - generic [ref=e739]: The Rules of the Platform DAO Limited, 2023
                          - text: ). As such, Cooperative DAO DLPs are either LMFs or hybrid firms that prevent worker interests from being trumped by the interests of external capital. Cooperative DAO DLPs are thus financed in a variety of ways, including token sales to non-worker investors and grants. SongADAO, in addition, mints and auctions NFTs that are tied to the music produced by Jonathan Mann, which give the NFT purchaser the opportunity to vote in non-binding polls on the creative direction of this Cooperative DAO DLP (
                          - link "SongADAO Co-op Ltd., 2023" [ref=e740] [cursor=pointer]:
                            - /url: "#bib105"
                            - generic [ref=e741]: SongADAO Co-op Ltd., 2023
                          - text: ).
                        - generic [ref=e742]:
                          - text: On this note, Cooperative DAO DLPs vary in terms of how much voice they give workers and other stakeholders in the design of the platform. While SongADAO does allow for decentralized creative direction (e.g., on introducing new incentive systems for collecting their NFTs), choices and decisions on platform design decisions appear to be more centralized in Indie LCA and The Platform DAO Limited, as there isn’t a formal mechanism for ordinary users to weigh in on choices made about the platform’s user interface and software. Consequently, the design of Cooperative DAO DLP platforms is
                          - emphasis [ref=e743]: moderately decentralized.
                        - generic [ref=e744]:
                          - text: While Cooperative DAO DLPs have several channels for workers to express their voice over governance and operational matters like Cooperative DLPs, they are confronted with the dilemma of categorizing many forms of value creation (including labor) as ‘contributions’ (
                          - link "Rennie & Potts, 2024" [ref=e745] [cursor=pointer]:
                            - /url: "#bib94"
                            - generic [ref=e746]: Rennie & Potts, 2024
                          - text: ). This can simultaneously recognize several forms of value creation for a collective endeavor and allow the exploration of new worker identities (
                          - link "Rennie, 2023" [ref=e747] [cursor=pointer]:
                            - /url: "#bib93"
                            - generic [ref=e748]: Rennie, 2023
                          - text: ), while making the creation of solidarity relationships between workers
                          - emphasis [ref=e749]: qua
                          - text: workers and association with workers’ organizations more difficult. Consequently, we consider Cooperative DAO DLPs to have a
                          - emphasis [ref=e750]: high
                          - text: degree of worker voice, yet comparatively less voice than Cooperative DLPs where worker identities are clearer.
                      - generic [ref=e751]:
                        - heading "4.1.2.2. Implications for worker harms and entrepreneurial risks" [level=5] [ref=e752]
                        - generic [ref=e753]:
                          - text: Although a Cooperative DAO DLP would still have the same issues regarding employment status as a Cooperative DLP and workers would still have a
                          - emphasis [ref=e754]: moderate
                          - text: risk of being harmed, this legal structure strikes a balance between technical decentralization and democratic governance. From a more entrepreneurial perspective, by using a cooperative legal structure, these archetypes can benefit from a separate legal personality, and the members enjoy the protection of limited liability. The tax treatment of the entity becomes clearer due to this legal structure. In view of the US’s earlier crackdown on securities law violations by unwrapped DAOs, forming a Limited Cooperative Association in Colorado or several other US state jurisdictions enables the Cooperative DAO DLP to issue crypto-tokens that are units of account tied to patronage and democratic member control to obtain limited exemptions from securities registration requirements (
                          - link "Orrick et al., 2023" [ref=e755] [cursor=pointer]:
                            - /url: "#bib90"
                            - generic [ref=e756]: Orrick et al., 2023
                          - text: ","
                          - link "Radebaugh and Muchnik, 2021" [ref=e757] [cursor=pointer]:
                            - /url: "#bib92"
                            - generic [ref=e758]: Radebaugh and Muchnik, 2021
                          - text: ).
                        - generic [ref=e759]:
                          - text: Nevertheless, some entrepreneurial risks for workers remain. There are assumptions about how courts and regulators will perceive interests in a Cooperative DAO DLP based on how regulators and courts have assessed traditional cooperatives in the past (e.g., that as members jointly participate in the organization, they do not profit from the efforts of others) (
                          - link "Orrick et al., 2023" [ref=e760] [cursor=pointer]:
                            - /url: "#bib90"
                            - generic [ref=e761]: Orrick et al., 2023
                          - text: ), but there is no assurance that the transactions and patronage dynamics within a Cooperative DAO DLP will, in fact, be evaluated in that way. This could, for instance, be the case if the crypto-token or NFT representing the membership interest is transferable rather than non-transferable, as with a typical cooperative share. Hence, we see in the US the call for a regulatory ‘safe harbor’ protecting membership interests from securities registration requirements if such interests are non-transferable, dividends are tied to patronage of the cooperative, members are verified as patrons, and memberships are offered through a SEC-registered intermediary (
                          - link "Coalition of Cooperative Blockchain Organizations, 2025" [ref=e762] [cursor=pointer]:
                            - /url: "#bib22"
                            - generic [ref=e763]: Coalition of Cooperative Blockchain Organizations, 2025
                          - text: ). Even if the Cooperative DAO DLP’s membership is not deemed to be an unregistered security, the use of the cooperative legal structure does not eliminate the possibility of a securities law violation occurring because the Cooperative DAO DLP issued NFTs for other purposes. Take, for instance, the enforcement actions that the US SEC has taken against NFT projects like Stoner Cats, charging these projects with offering unregistered securities through their NFTs. This led the founder of SongADAO and a fellow claimant to seek a declaratory judgment from the SEC that their NFT art works were not securities (
                          - link "Klein, 2024" [ref=e764] [cursor=pointer]:
                            - /url: "#bib62"
                            - generic [ref=e765]: Klein, 2024
                          - text: ), an outcome that would not only help avoid significant financial penalties (including for worker-members) and reputational damage—it would also protect them from having to destroy unsold art NFTs like in earlier cases. Thus, on balance, workers on Cooperative DAO DLPs have a
                          - emphasis [ref=e766]: high
                          - text: exposure to entrepreneurial risk, even if that exposure is lower than if the DAO DLP was unwrapped.
                - generic [ref=e767]:
                  - heading "5. Discussion and conclusion" [level=2] [ref=e768]
                  - generic [ref=e769]:
                    - text: "DLPs are rapidly transforming the nature of work worldwide. While they provide workers with many benefits, they often expose them to significant harms and entrepreneurial risks. To better understand the causes of these harms and entrepreneurial risks and, in turn, improve our understanding of how they could be addressed, we analyzed three archetypes of DLPs that have emerged progressively in recent years: Corporate DLPs, Cooperative DLPs, and DAO DLPs (including two variants: those that are wrapped in a non-cooperative legal form and those that are wrapped in the cooperative legal form). Each archetype has a distinctive approach to governance and financing and, in turn, grants workers different degrees of voice and exposes them to different degrees and types of harms and entrepreneurial risks. We summarize our takeaways in"
                    - link "Table 2" [ref=e770] [cursor=pointer]:
                      - /url: "#sec0090"
                      - generic [ref=e771]: Table 2
                    - text: .
                  - generic [ref=e772]:
                    - text: Our analysis enables us to make two overarching theoretical contributions to research on the emerging digital solidarity economy (
                    - link "Souza & Flor, 2025" [ref=e773] [cursor=pointer]:
                      - /url: "#bib106"
                      - generic [ref=e774]: Souza & Flor, 2025
                    - text: ). First, we advance our understanding of
                    - emphasis [ref=e775]: how
                    - text: different configurations of ownership and governance shape the harms and entrepreneurial risks workers are exposed to. While much of the attention in this nascent body of literature has focused on Corporate DLPs and, increasingly, Cooperative DLPs, we shed light on a newer set of DAO DLPs when comparing these archetypes in terms of their financing, ownership, and governance, as well as their prioritization of worker voice and the extent to which they expose workers to harm and entrepreneurial risk. For example, each is distinct in its prioritization of worker voice, with Corporate DLPs and Cooperative DLPs showing the greatest variation between them. The former’s weak prioritization is driven by the fact that ownership and ultimate control are in the hands of investor-owners who tend to have a risk profile that emphasizes the potential for exponential returns, combined with the fact that decision-making about platform design is fully centralized. In contrast, the latter’s very high prioritization of worker voice stems from workers’ significant ownership stakes and their ability to exert influence on organizational decisions in a democratic manner and platform design in a relatively less centralized manner. For those interested in tracking the evolution of work in the digital economy and cultivating a digital solidarity economy, the DAO DLP, especially the emerging Cooperative DAO DLP variant, are important to be mindful of as they present new opportunities and challenges to enact collaborative governance at scale and raise financing. Weighing the relative merits and demerits of Cooperative DAO DLPs with Cooperative DLPs will not only be important for the viability and sustainability of this type of DLP, but can advance our overall understanding of the role that cooperatives can have in the digital solidarity economy.
                  - generic [ref=e776]:
                    - text: Second, and relatedly, our article deepens our knowledge about
                    - emphasis [ref=e777]: why
                    - text: DLPs are legally structured in particular ways and how these structuring choices prompt the evolution of organizational archetypes. We demonstrate how legal entities are used to manage entrepreneurial risks in the digital economy, with liability mitigation being a key, but not the sole, driver of how these archetypes are organized and the legal entities chosen. Our analysis of the Cooperative DAO DLP sheds light on how the cooperative legal structure may be used in a new, burgeoning sector of the digital economy (i.e., the web3 industry) for
                    - emphasis [ref=e778]: strategic
                    - text: and
                    - emphasis [ref=e779]: value-driven
                    - text: reasons, such as adherence to the ICA’s cooperative principles or practicing solidarity. While unwrapped DAO DLPs have sought to mitigate some entrepreneurial risks and worker harms by wrapping as Non-Cooperative DAO DLPs and Cooperative DAO DLPs, the latter choice has distinct advantages. Cooperative DAO DLPs benefit from centuries of knowledge and experience from the cooperative movement and may, in turn, be attractive for a cooperative movement that is showing growing interest in new and emerging technologies. Turning to policy contributions, while the limited cooperative association may be a suitable cooperative legal entity for DAO DLPs with a connection to the US, potential cooperators in other parts of the world will be interested in exploring how local cooperative laws can accommodate Cooperative DAO DLPs. This is of particular relevance to the EU and EU Member States, where there have been calls for registering DAOs as cooperatives (
                    - link "Rosenstiel, 2025" [ref=e780] [cursor=pointer]:
                      - /url: "#bib96"
                      - generic [ref=e781]: Rosenstiel, 2025
                    - text: ) or even creating a new legal entity form (
                    - link "Möslein & Ostrovski, 2025" [ref=e782] [cursor=pointer]:
                      - /url: "#bib84"
                      - generic [ref=e783]: Möslein & Ostrovski, 2025
                    - text: ). Policymakers in these other jurisdictions should consider how the cooperative legal entity can be adapted to fit the needs of DAOs while still preserving the core cooperative principles. Issues with respect to permitting governance activities through digital means, enabling alternative voting systems (e.g., patronage voting, quadratic voting, etc.), or including non-user investor members had arisen with Cooperative DLPs in the past. The more novel challenges presented by a burgeoning class of Cooperative DAO DLPs concern enabling pseudonymous membership and tying crypto-tokens to membership interests in the cooperative when the regulation of such tokens is unclear. With regard to the former, users in the web3 industry are often privacy-conscious, and cooperative legislation often requires disclosing identifying information to the cooperative and/or state. With regard to the latter, the aforementioned safe harbor proposal may also be useful for regulators and policymakers elsewhere to consider as they seek to encourage DAOs to use their cooperative laws.
                  - generic [ref=e784]:
                    - text: In many jurisdictions, DAO DLPs in general and the Cooperative DAO DLP variant in particular are hindered by a lack of supportive legislation, which either prevents their creation or forces adaptations to fit existing regulations that reduce their contributions. As such, advocates of alternatives to Corporate DLPs should closely monitor the status of relevant regulations across jurisdictions and pursue amendments as needed to ensure these alternatives are attainable in practice and free of unintended consequences. As we have argued, several jurisdictions worldwide are beginning to pioneer innovative and promising regulatory interventions that can serve as templates or, more promisingly, as inspiration for further innovation. The opportunities are particularly promising when it comes to Cooperative DLPs and Cooperative DAO DLPs. Incipient regulations show promise in terms of both enabling the creation of these entities and addressing longstanding challenges like sufficient access to capital (
                    - link "Van Doorn, 2017" [ref=e785] [cursor=pointer]:
                      - /url: "#bib117"
                      - generic [ref=e786]: Van Doorn, 2017
                    - text: ), through novel ways of enabling members, including non-user investor members and community members to participate in decision-making about organizational and platform issues (e.g.,
                    - link "COALA, 2021" [ref=e787] [cursor=pointer]:
                      - /url: "#bib21"
                      - generic [ref=e788]: COALA, 2021
                    - text: ).
                  - generic [ref=e789]:
                    - text: A key insight stemming from our paper, therefore, is that researchers, policymakers, and managers concerned with the risks and harms created by DLPs, and those interested in the dynamics of DLPs more broadly, ought to consider a plurality of organizational archetypes. While, to date, only a handful of researchers have heeded
                    - link "Davis (2016)" [ref=e790] [cursor=pointer]:
                      - /url: "#bib27"
                      - generic [ref=e791]: Davis (2016)
                    - text: call to explicitly consider alternatives to Corporate DLPs, we hope our paper prompts others to engage more closely with the burgeoning interdisciplinary research on alternative ways of owning and governing DLPs and other platforms. There are several ways they could do this. For example, researchers analyzing the worker harms and entrepreneurial risks created by DLPs could use our three archetypes to undertake more comparative empirical work, for instance, on workers’ efforts at collective action or resistance (
                    - link "Cameron & Rahman, 2022" [ref=e792] [cursor=pointer]:
                      - /url: "#bib18"
                      - generic [ref=e793]: Cameron & Rahman, 2022
                    - text: ). Those interested in DAOs on the one hand (
                    - link "Hsieh & Vergne, 2023" [ref=e794] [cursor=pointer]:
                      - /url: "#bib52"
                      - generic [ref=e795]: Hsieh & Vergne, 2023
                    - text: ) and alternative forms of organizing on the other hand (
                    - link "Mair & Rathert, 2021" [ref=e796] [cursor=pointer]:
                      - /url: "#bib68"
                      - generic [ref=e797]: Mair & Rathert, 2021
                    - text: ) could join forces to study novel alternatives like Cooperative DAO DLPs, which are poised to become more common in the coming years. More generally, those creating or studying interventions to address the risks and harms of DLPs could create more comprehensive regulatory frameworks that incorporate multiple organizational archetypes rather than focus primarily on regulation of a single archetype, as has traditionally been the case (e.g.,
                    - link "International Labour Office, 2021" [ref=e798] [cursor=pointer]:
                      - /url: "#bib55"
                      - generic [ref=e799]: International Labour Office, 2021
                    - text: ).
                  - generic [ref=e800]: In conclusion, embracing a plurality of organizational archetypes of DLPs will help researchers and policymakers develop more effective and comprehensive interventions, particularly in addressing the longstanding risks and harms workers have been experiencing in the digital economy.
