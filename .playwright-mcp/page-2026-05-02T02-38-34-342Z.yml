                - list [ref=e171]:
                  - listitem [ref=e172]:
                    - generic [ref=e173]: •
                    - generic [ref=e175]: Calls for regulating a plurality of organisational archetypes in the digital economy to mitigate harms and risks to workers.
                  - listitem [ref=e176]:
