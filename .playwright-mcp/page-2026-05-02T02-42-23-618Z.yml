                    - generic [ref=e166]:
                      - heading "1 INTRODUCTION" [level=2] [ref=e167]
                      - paragraph [ref=e168]:
                        - text: Climate change is real and, without any doubt, a serious threat. The evidence of its extensive and unprecedented outcomes has mounted, leading scholars to express an immense degree of concern about resultant climate risks over the past two decades (Hausfather & Moore,
                        - link "2022" [ref=e170] [cursor=pointer]:
                          - /url: "#bse3750-bib-0055"
                        - text: ; Nieto,
                        - link "2022" [ref=e172] [cursor=pointer]:
                          - /url: "#bse3750-bib-0088"
                        - text: ). One of the key triggers of climate change has been the release of carbon dioxide (CO
                        - subscript [ref=e173]: "2"
                        - text: ) into the atmosphere, leading to global calls for decarbonization and achieving carbon neutrality (Talwar et al.,
                        - link "2023" [ref=e175] [cursor=pointer]:
                          - /url: "#bse3750-bib-0118"
                        - text: ). With the transportation sector being one of the major carbon emitters, electric vehicles (EVs) have emerged as a cleaner alternative to conventional combustion-powered vehicles, offering a promising solution to mitigate pollution and climate change (Khurana et al.,
                        - link "2019" [ref=e177] [cursor=pointer]:
                          - /url: "#bse3750-bib-0066"
                        - text: ; Richter,
                        - link "2022" [ref=e179] [cursor=pointer]:
                          - /url: "#bse3750-bib-0099"
                        - text: ; Siragusa et al.,
                        - link "2020" [ref=e181] [cursor=pointer]:
                          - /url: "#bse3750-bib-0116"
                        - text: ; Zhao et al.,
                        - link "2021" [ref=e183] [cursor=pointer]:
                          - /url: "#bse3750-bib-0140"
                        - text: ).
                      - paragraph [ref=e184]:
                        - text: Scholars and industry professionals have duly acknowledged several benefits offered by EVs, including lowering emissions and decreasing fuel expenses (Ercan et al.,
                        - link "2022" [ref=e186] [cursor=pointer]:
                          - /url: "#bse3750-bib-0043"
                        - text: ; Guo et al.,
                        - link "2023" [ref=e188] [cursor=pointer]:
                          - /url: "#bse3750-bib-0054"
                        - text: ; Xia et al.,
                        - link "2022" [ref=e190] [cursor=pointer]:
                          - /url: "#bse3750-bib-0135"
                        - text: ). It is becoming increasingly clear that a shift to EVs is imminent and inevitable to achieve climate goals (Binsted,
                        - link "2022" [ref=e192] [cursor=pointer]:
                          - /url: "#bse3750-bib-0023"
                        - text: ; Breschi et al.,
                        - link "2023" [ref=e194] [cursor=pointer]:
                          - /url: "#bse3750-bib-0026"
                        - text: ; Richter,
                        - link "2022" [ref=e196] [cursor=pointer]:
                          - /url: "#bse3750-bib-0099"
                        - text: ). However, the present status of the adoption and diffusion of EVs globally is rather skewed. While Europe and China account for 85% of global electric car sales, the pattern of EV sales is quite dismal for developing and emerging countries, wherein acceptance and adoption of EVs is low (Krishna,
                        - link "2021" [ref=e198] [cursor=pointer]:
                          - /url: "#bse3750-bib-0068"
                        - text: ; Kumar & Alok,
                        - link "2020" [ref=e200] [cursor=pointer]:
                          - /url: "#bse3750-bib-0070"
                        - text: ; Tarei et al.,
                        - link "2021" [ref=e202] [cursor=pointer]:
                          - /url: "#bse3750-bib-0119"
                        - text: ). Although colloquially it is argued that the low diffusion of EVs in developing and emerging countries is primarily due to cost consideration, a comprehensive understanding of what has driven the adoption of EVs to the current level and what has impeded the anticipated extent of adoption is essential to formulate viable solutions to improve adoption.
                      - paragraph [ref=e203]:
                        - text: We reviewed the literature to acquire a keener grasp of drivers and barriers to EV adoption in developing and emerging countries. Our investigation revealed several visible gaps in the extant literature, both at the conceptual and methodological levels. Conceptually, we observed that despite being voluminous, the literature offers shallow insights with routine elucidations. In particular, past findings have remained confined to a specific set of factors, such as the role of consumer perception (Asadi et al.,
                        - link "2021" [ref=e205] [cursor=pointer]:
                          - /url: "#bse3750-bib-0009"
                        - text: ; Austmann & Vigne,
                        - link "2021" [ref=e207] [cursor=pointer]:
                          - /url: "#bse3750-bib-0011"
                        - text: ), demographic profiles (Huang et al.,
                        - link "2021" [ref=e209] [cursor=pointer]:
                          - /url: "#bse3750-bib-0058"
                        - text: ; Jou et al.,
                        - link "2022" [ref=e211] [cursor=pointer]:
                          - /url: "#bse3750-bib-0063"
                        - text: ), vehicle attributes (Bansal et al.,
                        - link "2021" [ref=e213] [cursor=pointer]:
                          - /url: "#bse3750-bib-0016"
                        - text: ; Benzidia et al.,
                        - link "2021" [ref=e215] [cursor=pointer]:
                          - /url: "#bse3750-bib-0021"
                        - text: ), and environmental awareness (Beak et al.,
                        - link "2020" [ref=e217] [cursor=pointer]:
                          - /url: "#bse3750-bib-0018"
                        - text: ; Das & Bhat,
                        - link "2022" [ref=e219] [cursor=pointer]:
                          - /url: "#bse3750-bib-0036"
                        - text: ; Shanmugavel & Balakrishnan,
                        - link "2023" [ref=e221] [cursor=pointer]:
                          - /url: "#bse3750-bib-0109"
                        - text: ; Singh et al.,
                        - link "2021" [ref=e223] [cursor=pointer]:
                          - /url: "#bse3750-bib-0112"
                        - text: ). Given the multiple conversations and complexities associated with EVs, such a simplistic rendition of factors driving the adoption of EVs is unsatisfactory. Several dimensions of the EV adoption/non-adoption debate have not been fully probed, and as a result, we currently lack a comprehensive understanding of the current position of multiple stakeholders, to EVs, including the end users.
                      - paragraph [ref=e224]:
                        - text: Our review also indicated that not only are the insights limited, but they are also largely based on limited methodological approaches. Specifically, we observed that most prior studies rely on primary data reflecting consumer's perception of EVs (e.g., Globisch et al.,
                        - link "2018" [ref=e226] [cursor=pointer]:
                          - /url: "#bse3750-bib-0050"
                        - text: ; Masiero et al.,
                        - link "2016" [ref=e228] [cursor=pointer]:
                          - /url: "#bse3750-bib-0077"
                        - text: ). Although these studies based on primary data have significantly advanced our understanding of the subject under consideration, there are inherent issues and biases associated with primary data that cannot be overlooked. For instance, prior consumer behavior studies have shown that consumers often do not foresee or anticipate the future of a given technology when interviewed (Hausman,
                        - link "2000" [ref=e230] [cursor=pointer]:
                          - /url: "#bse3750-bib-0056"
                        - text: ; Sahi et al.,
                        - link "2013" [ref=e232] [cursor=pointer]:
                          - /url: "#bse3750-bib-0104"
                        - text: ) or surveyed (Crotts et al.,
                        - link "2008" [ref=e234] [cursor=pointer]:
                          - /url: "#bse3750-bib-0033"
                        - text: ; Singh et al.,
                        - link "2011" [ref=e236] [cursor=pointer]:
                          - /url: "#bse3750-bib-0115"
                        - text: ), making their responses less insightful. Finally, products like EVs, which arouse substantial public interest and debate, are frequently discussed in depth in the media. These media discussions, which cover a wide range of publications, including opinion pieces and news stories, reflect and capture the perspectives of various relevant and prominent stakeholders. As a result, they hold a wealth of knowledge that can be very useful strategically. However, there has yet to be a study on EVs using popular media publications as a potential data source.
                      - paragraph [ref=e237]: "Taking note of the narrowness of the existing academic literature at the conceptual level, we propose to extensively probe different dimensions of the EV adoption/non-adoption dynamics in developing/and emerging countries, for example, India. At the methodological level, we propose to undertake a qualitative study to analyze articles published on EVs in the popular media. Exploring EVs through a popular media lens represents a novel and valuable research endeavor, which will not only add to the current body of literature but also yield a fresh perspective on the EV ecosystem based on public perception, industry trends, and the policy landscape. We formalized our primary research objectives through three key research questions: RQ1. What factors positively influence the diffusion of EVs? RQ2. What factors have a negative bearing on the adoption of EVs? RQ3. What future-oriented initiatives have been introduced to catalyze the wider diffusion and faster adoption of EVs?"
                      - paragraph [ref=e238]:
                        - text: Specifically, we employed critical discourse analysis (CDA) to respond to the above-mentioned research questions. Our choice of CDA as a methodological anchor is motivated by its proven efficacy in examining opaque relationships underlying complex social phenomena (Fairclough,
                        - link "1995" [ref=e240] [cursor=pointer]:
                          - /url: "#bse3750-bib-0044"
                        - text: ; Wodak & Meyer,
                        - link "2009" [ref=e242] [cursor=pointer]:
                          - /url: "#bse3750-bib-0131"
                        - text: ). Operationally, the study used the Gioia approach (Gioia et al.,
                        - link "2012" [ref=e244] [cursor=pointer]:
                          - /url: "#bse3750-bib-0047"
                        - text: ) to inductively analyze 718 media articles and identify key concepts, themes, and dimensions.
                      - paragraph [ref=e245]:
                        - text: The study contributes to the literature by comprehensively mapping the drivers and barriers affecting EV adoption and green initiatives in both the government and private sectors that play a significant role in the formulation of strategies and innovation of new technologies conducive to the environment (Awan et al.,
                        - link "2020a" [ref=e247] [cursor=pointer]:
                          - /url: "#bse3750-bib-0013"
                        - text: ; Awan et al.,
                        - link "2020b" [ref=e249] [cursor=pointer]:
                          - /url: "#bse3750-bib-0012"
                        - text: ; Awan et al.,
                        - link "2021" [ref=e251] [cursor=pointer]:
                          - /url: "#bse3750-bib-0014"
                        - text: ; Begum et al.,
                        - link "2021" [ref=e253] [cursor=pointer]:
                          - /url: "#bse3750-bib-0020"
                        - text: ; Begum et al.,
                        - link "2023" [ref=e255] [cursor=pointer]:
                          - /url: "#bse3750-bib-0019"
                        - text: ).
                    - generic [ref=e256]:
                      - heading "2 LITERATURE REVIEW" [level=2] [ref=e257]
                      - paragraph [ref=e258]:
                        - text: A comparatively large body of literature exists on EVs discussing barriers and drivers affecting consumers' adoption drivers (e.g., Asadi et al.,
                        - link "2021" [ref=e260] [cursor=pointer]:
                          - /url: "#bse3750-bib-0009"
                        - text: ; Austmann & Vigne,
                        - link "2021" [ref=e262] [cursor=pointer]:
                          - /url: "#bse3750-bib-0011"
                        - text: ; Corradi et al.,
                        - link "2023" [ref=e264] [cursor=pointer]:
                          - /url: "#bse3750-bib-0032"
                        - text: ; Konstantinou & Gkritza,
                        - link "2023" [ref=e266] [cursor=pointer]:
                          - /url: "#bse3750-bib-0067"
                        - text: ), government and private sector initiatives to promote EV adoption (Decrinis et al.,
                        - link "2023" [ref=e268] [cursor=pointer]:
                          - /url: "#bse3750-bib-0039"
                        - text: ; Rostad Sæther,
                        - link "2022" [ref=e270] [cursor=pointer]:
                          - /url: "#bse3750-bib-0101"
                        - text: ; Zheng et al.,
                        - link "2022" [ref=e272] [cursor=pointer]:
                          - /url: "#bse3750-bib-0142"
                        - text: ), and policy direction to encourage EV penetration (Jiang et al.,
                        - link "2022" [ref=e274] [cursor=pointer]:
                          - /url: "#bse3750-bib-0061"
                        - text: ; Zhang & Huang,
                        - link "2021" [ref=e276] [cursor=pointer]:
                          - /url: "#bse3750-bib-0139"
                        - text: ). In particular, past literature has discussed the role of government incentives, consumer perceptions, demographic profiles, and vehicle attributes in influencing purchase decisions (Asadi et al.,
                        - link "2021" [ref=e278] [cursor=pointer]:
                          - /url: "#bse3750-bib-0009"
                        - text: ; Decrinis et al.,
                        - link "2023" [ref=e280] [cursor=pointer]:
                          - /url: "#bse3750-bib-0039"
                        - text: ; Munshi et al.,
                        - link "2022" [ref=e282] [cursor=pointer]:
                          - /url: "#bse3750-bib-0085"
                        - text: ; Rostad Sæther,
                        - link "2022" [ref=e284] [cursor=pointer]:
                          - /url: "#bse3750-bib-0101"
                        - text: ; Singh et al.,
                        - link "2023" [ref=e286] [cursor=pointer]:
                          - /url: "#bse3750-bib-0113"
                        - text: ; Zhao et al.,
                        - link "2022" [ref=e288] [cursor=pointer]:
                          - /url: "#bse3750-bib-0141"
                        - text: ).
                      - generic [ref=e289]:
                        - heading "2.1 Drivers of EV adoption" [level=3] [ref=e290]
                        - paragraph [ref=e291]:
                          - text: The transition to e-mobility has led to a plethora of initiatives by governments all over the world, including providing producer and consumer subsidies, setting up EV infrastructure, offering ownership tax benefits, and enhancing production capabilities (Altenburg et al.,
                          - link "2022" [ref=e293] [cursor=pointer]:
                            - /url: "#bse3750-bib-0006"
                          - text: ; Rostad Sæther,
                          - link "2022" [ref=e295] [cursor=pointer]:
                            - /url: "#bse3750-bib-0101"
                          - text: ; Zheng et al.,
                          - link "2022" [ref=e297] [cursor=pointer]:
                            - /url: "#bse3750-bib-0142"
                          - text: ). Government initiatives for producers and consumers—especially the human-centric policies (Breschi et al.,
                          - link "2023" [ref=e299] [cursor=pointer]:
                            - /url: "#bse3750-bib-0026"
                          - text: )—have facilitated EV penetration (Rostad Sæther,
                          - link "2022" [ref=e301] [cursor=pointer]:
                            - /url: "#bse3750-bib-0101"
                          - text: ; Zheng et al.,
                          - link "2022" [ref=e303] [cursor=pointer]:
                            - /url: "#bse3750-bib-0142"
                          - text: ); however, the impact on the two groups of stakeholders has varied from country to country. For instance, a strong policy push by the Chinese government helped the country lead in some segments, including electric buses and lithium batteries, and catch up in passenger vehicle segments (Altenburg et al.,
                          - link "2022" [ref=e305] [cursor=pointer]:
                            - /url: "#bse3750-bib-0006"
                          - text: ). At the same time, comparing producer-oriented and consumer-oriented policies reveals that some policies are relatively effective in some countries than others. For example, the producer-centric policy of setting up charging infrastructure has played an important role in the penetration of Plug-in-EVs in the EU (Rostad Sæther,
                          - link "2022" [ref=e307] [cursor=pointer]:
                            - /url: "#bse3750-bib-0101"
                          - text: ), and policies such as specialized lanes and reserved parking slots have expedited consumer preference for EVs in India (Bansal et al.,
                          - link "2021" [ref=e309] [cursor=pointer]:
                            - /url: "#bse3750-bib-0016"
                          - text: ). Similarly, consumer subsidies have encouraged respondents in emerging economies like Indonesia (Murtiningrum et al.,
                          - link "2022" [ref=e311] [cursor=pointer]:
                            - /url: "#bse3750-bib-0086"
                          - text: ) and India (Munshi et al.,
                          - link "2022" [ref=e313] [cursor=pointer]:
                            - /url: "#bse3750-bib-0085"
                          - text: ) to purchase EVs. The private sector has also provided several initiatives to influence purchase decisions and investment in the EV industry (Decrinis et al.,
                          - link "2023" [ref=e315] [cursor=pointer]:
                            - /url: "#bse3750-bib-0039"
                          - text: ; Melander & Wallström,
                          - link "2022" [ref=e317] [cursor=pointer]:
                            - /url: "#bse3750-bib-0080"
                          - text: ; Wu,
                          - link "2022" [ref=e319] [cursor=pointer]:
                            - /url: "#bse3750-bib-0133"
                          - text: ).
                        - paragraph [ref=e320]:
                          - text: Moving to the consumers' perspective, perceived usefulness, attitudes, peer feedback, personal norms, perceived consumer effectiveness, technology readiness, convenience, and the country of residence have all been found to have a substantial effect on people's EV purchase decisions (Asadi et al.,
                          - link "2021" [ref=e322] [cursor=pointer]:
                            - /url: "#bse3750-bib-0009"
                          - text: ; Ashfaq et al.,
                          - link "2022" [ref=e324] [cursor=pointer]:
                            - /url: "#bse3750-bib-0010"
                          - text: ; Austmann & Vigne,
                          - link "2021" [ref=e326] [cursor=pointer]:
                            - /url: "#bse3750-bib-0011"
                          - text: ; Bas et al.,
                          - link "2021" [ref=e328] [cursor=pointer]:
                            - /url: "#bse3750-bib-0017"
                          - text: ; Benzidia et al.,
                          - link "2021" [ref=e330] [cursor=pointer]:
                            - /url: "#bse3750-bib-0021"
                          - text: ; Jaiswal et al.,
                          - link "2021" [ref=e332] [cursor=pointer]:
                            - /url: "#bse3750-bib-0060"
                          - text: ; Murtiningrum et al.,
                          - link "2022" [ref=e334] [cursor=pointer]:
                            - /url: "#bse3750-bib-0086"
                          - text: ; Salari,
                          - link "2022" [ref=e336] [cursor=pointer]:
                            - /url: "#bse3750-bib-0105"
                          - text: ; Shanmugavel & Balakrishnan,
                          - link "2023" [ref=e338] [cursor=pointer]:
                            - /url: "#bse3750-bib-0109"
                          - text: ; Zhao et al.,
                          - link "2022" [ref=e340] [cursor=pointer]:
                            - /url: "#bse3750-bib-0141"
                          - text: ). Existing scholarship argues that the demographic profile of consumers is also an important factor influencing their purchase decisions. Age is essential in determining purchase decisions, as observed in the case of China and Taiwan, where the younger generation was found to prefer EVs (Jou et al.,
                          - link "2022" [ref=e342] [cursor=pointer]:
                            - /url: "#bse3750-bib-0063"
                          - text: ; Zhao et al.,
                          - link "2022" [ref=e344] [cursor=pointer]:
                            - /url: "#bse3750-bib-0141"
                          - text: ). In addition to age, income, education, and family size are considered as other key factors affecting EV demand. For instance, in China, high-net-worth consumers prefer to buy EVs while people with large families do not (Yang et al.,
                          - link "2023" [ref=e346] [cursor=pointer]:
                            - /url: "#bse3750-bib-0137"
                          - text: ; Zhao et al.,
                          - link "2022" [ref=e348] [cursor=pointer]:
                            - /url: "#bse3750-bib-0141"
                          - text: ). Also, highly educated women in China prefer to adopt EVs (Huang et al.,
                          - link "2021" [ref=e350] [cursor=pointer]:
                            - /url: "#bse3750-bib-0058"
                          - text: ).
                        - paragraph [ref=e351]:
                          - text: Although environmental gains arising from EVs are known, the evidence on the effect of any such gains on consumers' EV purchase decision is mixed (Murtiningrum et al.,
                          - link "2022" [ref=e353] [cursor=pointer]:
                            - /url: "#bse3750-bib-0086"
                          - text: ; Salari,
                          - link "2022" [ref=e355] [cursor=pointer]:
                            - /url: "#bse3750-bib-0105"
                          - text: ; Shanmugavel & Balakrishnan,
                          - link "2023" [ref=e357] [cursor=pointer]:
                            - /url: "#bse3750-bib-0109"
                          - text: ; Singh et al.,
                          - link "2021" [ref=e359] [cursor=pointer]:
                            - /url: "#bse3750-bib-0112"
                          - text: ). Again, country-related differences can be observed, with environmental awareness playing a positive role in driving consumers' EV purchase decisions in countries such as India (Shanmugavel & Balakrishnan,
                          - link "2023" [ref=e361] [cursor=pointer]:
                            - /url: "#bse3750-bib-0109"
                          - text: ; Singh et al.,
                          - link "2021" [ref=e363] [cursor=pointer]:
                            - /url: "#bse3750-bib-0112"
                          - text: ) and Indonesia (Murtiningrum et al.,
                          - link "2022" [ref=e365] [cursor=pointer]:
                            - /url: "#bse3750-bib-0086"
                          - text: ) but not in the UK (Salari,
                          - link "2022" [ref=e367] [cursor=pointer]:
                            - /url: "#bse3750-bib-0105"
                          - text: ).
                        - paragraph [ref=e368]:
                          - text: Vehicular attributes and EV infrastructure have also been found to positively influence consumers' purchase decisions (Bansal et al.,
                          - link "2021" [ref=e370] [cursor=pointer]:
                            - /url: "#bse3750-bib-0016"
                          - text: ; Benzidia et al.,
                          - link "2021" [ref=e372] [cursor=pointer]:
                            - /url: "#bse3750-bib-0021"
                          - text: ; Cabigiosu,
                          - link "2022" [ref=e374] [cursor=pointer]:
                            - /url: "#bse3750-bib-0028"
                          - text: ; Jaiswal et al.,
                          - link "2022" [ref=e376] [cursor=pointer]:
                            - /url: "#bse3750-bib-0059"
                          - text: ; Li et al.,
                          - link "2023" [ref=e378] [cursor=pointer]:
                            - /url: "#bse3750-bib-0074"
                          - text: ; Munshi et al.,
                          - link "2022" [ref=e380] [cursor=pointer]:
                            - /url: "#bse3750-bib-0085"
                          - text: ; Paradies et al.,
                          - link "2023" [ref=e382] [cursor=pointer]:
                            - /url: "#bse3750-bib-0090"
                          - text: ). For instance, an analysis of e-rickshaw adoption in India by Singh et al. (
                          - link "2021" [ref=e384] [cursor=pointer]:
                            - /url: "#bse3750-bib-0112"
                          - text: ) showed that specific characteristics such as reliability, safety, affordability, last-mile connectivity, accessibility, employability, comfort, healthfulness, and profitability were major drivers in the acceptance of e-rickshaws in the country.
                      - generic [ref=e385]:
                        - heading "2.2 Barriers to EV adoption" [level=3] [ref=e386]
                        - paragraph [ref=e387]:
                          - text: Although EV adoption has shown a consistent upward trajectory, the adoption curve has not been as steep as interested stakeholders would like it to be. The diffusion and subsequent adoption of EVs have been hindered by various barriers that continue to impede their expected proliferation. A review of past literature reveals several hindering factors identified by scholars in the area including high initial cost (Chhikara et al.,
                          - link "2021" [ref=e389] [cursor=pointer]:
                            - /url: "#bse3750-bib-0030"
                          - text: ; Paradies et al.,
                          - link "2023" [ref=e391] [cursor=pointer]:
                            - /url: "#bse3750-bib-0090"
                          - text: ; Virmani et al.,
                          - link "2023" [ref=e393] [cursor=pointer]:
                            - /url: "#bse3750-bib-0129"
                          - text: ), limited driving range (Paradies et al.,
                          - link "2023" [ref=e395] [cursor=pointer]:
                            - /url: "#bse3750-bib-0090"
                          - text: ), issues with the charging infrastructure (Corradi et al.,
                          - link "2023" [ref=e397] [cursor=pointer]:
                            - /url: "#bse3750-bib-0032"
                          - text: ; Tarei et al.,
                          - link "2021" [ref=e399] [cursor=pointer]:
                            - /url: "#bse3750-bib-0119"
                          - text: ; Wu et al.,
                          - link "2023" [ref=e401] [cursor=pointer]:
                            - /url: "#bse3750-bib-0134"
                          - text: ), long charging times (Konstantinou & Gkritza,
                          - link "2023" [ref=e403] [cursor=pointer]:
                            - /url: "#bse3750-bib-0067"
                          - text: ), resale value concerns (Tarei et al.,
                          - link "2021" [ref=e405] [cursor=pointer]:
                            - /url: "#bse3750-bib-0119"
                          - text: ), regulatory hurdles (Chhikara et al.,
                          - link "2021" [ref=e407] [cursor=pointer]:
                            - /url: "#bse3750-bib-0030"
                          - text: ; Gonzalez Venegas et al.,
                          - link "2021" [ref=e409] [cursor=pointer]:
                            - /url: "#bse3750-bib-0051"
                          - text: ), high battery costs (Candra,
                          - link "2022" [ref=e411] [cursor=pointer]:
                            - /url: "#bse3750-bib-0029"
                          - text: ), and multiple socio-economic factors (Yang et al.,
                          - link "2023" [ref=e413] [cursor=pointer]:
                            - /url: "#bse3750-bib-0137"
                          - text: ). At the same time, perceptions of EV risks and a lack of awareness also act as obstacles preventing EV adoption (Almansour,
                          - link "2022" [ref=e415] [cursor=pointer]:
                            - /url: "#bse3750-bib-0005"
                          - text: ; Jaiswal et al.,
                          - link "2021" [ref=e417] [cursor=pointer]:
                            - /url: "#bse3750-bib-0060"
                          - text: ).
                        - paragraph [ref=e418]:
                          - text: To elucidate, the lack of adequate charging infrastructure, particularly in public places and rural regions, gives rise to range anxiety and poses challenges for prospective EV buyers (Anosike et al.,
                          - link "2021" [ref=e420] [cursor=pointer]:
                            - /url: "#bse3750-bib-0007"
                          - text: ; Tarei et al.,
                          - link "2021" [ref=e422] [cursor=pointer]:
                            - /url: "#bse3750-bib-0119"
                          - text: ; Virmani et al.,
                          - link "2023" [ref=e424] [cursor=pointer]:
                            - /url: "#bse3750-bib-0129"
                          - text: ). Similarly, the initial expense associated with EVs may discourage cost-conscious buyers from considering them as a feasible choice (Paradies et al.,
                          - link "2023" [ref=e426] [cursor=pointer]:
                            - /url: "#bse3750-bib-0090"
                          - text: ; Virmani et al.,
                          - link "2023" [ref=e428] [cursor=pointer]:
                            - /url: "#bse3750-bib-0129"
                          - text: ). In addition, the limited appeal and decelerated adoption rate of EVs have been attributed by scholars to the presence of inconsistent or insufficient government incentives, subsidies, and tax refunds (Gonzalez Venegas et al.,
                          - link "2021" [ref=e430] [cursor=pointer]:
                            - /url: "#bse3750-bib-0051"
                          - text: ; Li et al.,
                          - link "2023" [ref=e432] [cursor=pointer]:
                            - /url: "#bse3750-bib-0074"
                          - text: ; Peng & Bai,
                          - link "2023" [ref=e434] [cursor=pointer]:
                            - /url: "#bse3750-bib-0091"
                          - text: ).
                        - paragraph [ref=e435]:
                          - text: Bringing the preceding discussion together, we recognize that scholars have indeed expended extensive efforts to unpack the drivers of and barriers to EV adoption. The findings are quite informative when seen in aggregate. However, despite acknowledging country-specific differences, an in-depth analysis of key geographies is missing in the past literature. Particularly, even though it is apparent that EV diffusion has been limited in developing/emerging countries, wide-ranging efforts to diagnose country-specific motivators and inhibitors are missing. For instance, although India is an emerging economy at the center of the pollution debate as one of the highest global carbon emitters (Garrett,
                          - link "2022" [ref=e437] [cursor=pointer]:
                            - /url: "#bse3750-bib-0046"
                          - text: ), the literature exploring the country's low EV adoption lacks the contours essential to make it more informative and useful. Existing studies on India have analyzed the EV industry using policy documents (Singh et al.,
                          - link "2021" [ref=e439] [cursor=pointer]:
                            - /url: "#bse3750-bib-0112"
                          - text: ), a survey of the literature (Singh et al.,
                          - link "2021" [ref=e441] [cursor=pointer]:
                            - /url: "#bse3750-bib-0112"
                          - text: ), surveys of consumers (Bansal et al.,
                          - link "2021" [ref=e443] [cursor=pointer]:
                            - /url: "#bse3750-bib-0016"
                          - text: ; Jaiswal et al.,
                          - link "2021" [ref=e445] [cursor=pointer]:
                            - /url: "#bse3750-bib-0060"
                          - text: ), a survey of automobile dealers (Shanmugavel & Balakrishnan,
                          - link "2023" [ref=e447] [cursor=pointer]:
                            - /url: "#bse3750-bib-0109"
                          - text: ), and a survey of experts from industry and academia (Digalwar et al.,
                          - link "2022" [ref=e449] [cursor=pointer]:
                            - /url: "#bse3750-bib-0041"
                          - text: ). As mentioned above, the insights from such studies are largely based on self-report surveys and, therefore, are limited in robustness. In comparison to these survey-based studies, we found no prior research drawing upon the wealth of knowledge and information amassed in popular media articles to map the current status of drivers and barriers to EV adoption in India. As a result, our study makes the dual effort of (a) adding depth to the conversation on drivers of and barriers to EV adoption in India and (b) capturing the qualitative data in the available media articles to present a comprehensive view of the drivers of and barriers to EV adoption in India the country that is robust and useful from a policy perspective.
                    - generic [ref=e450]:
                      - heading "3 DATA AND METHODOLOGY" [level=2] [ref=e451]
                      - generic [ref=e452]:
                        - heading "3.1 Methodological choices" [level=3] [ref=e453]
                        - paragraph [ref=e454]: The primary objective of this study is to present an exhaustive perspective on the various facets surrounding the adoption or non-adoption of EVs. Towards this end, we navigated several macro and micro contours of the EV debate unfolding in the popular media. Specifically, we endeavored to untangle the interplay of multiple actors, policies, strategies, and individual perceptions to present an evocative portrayal of the enabling factors and impeding forces that cumulatively shape the EV ecosystem.
                        - paragraph [ref=e455]:
                          - text: From the methodological standpoint, we employed CDA to address the proposed research questions embodying the objective of our study. In simple words, CDA is an approach that fundamentally entails a systematic examination of opaque relationships underlying complex social phenomena to determine their holistic implications, discursive practices, and wider structures and processes (Fairclough,
                          - link "1995" [ref=e457] [cursor=pointer]:
                            - /url: "#bse3750-bib-0044"
                          - text: ; Wodak & Meyer,
                          - link "2009" [ref=e459] [cursor=pointer]:
                            - /url: "#bse3750-bib-0131"
                          - text: ). Although CDA is an approach primarily intended to analyze discourse in social and political contexts, it has been applied in several multi-disciplinary settings, comprising a variety of analyses (Jorgensen & Phillips,
                          - link "2002" [ref=e461] [cursor=pointer]:
                            - /url: "#bse3750-bib-0062"
                          - text: ; Van Dijk,
                          - link "2009" [ref=e463] [cursor=pointer]:
                            - /url: "#bse3750-bib-0126"
                          - text: ). For instance, it was used recently to analyze online discourse on crowdfunded systems development projects (Gleasure et al.,
                          - link "2019" [ref=e465] [cursor=pointer]:
                            - /url: "#bse3750-bib-0049"
                          - text: ).
                        - paragraph [ref=e466]:
                          - text: Our choice of CDA is predominantly motivated by the notion that EVs are not just a mobility solution. Rather, they have sustainability implications that make them relevant from not only economic but also social and environmental perspectives. Since CDA inherently aims to build larger social discourses on the studied phenomenon by uncovering atypical or prevailing discourses in addition to the obvious ones (Gleasure et al.,
                          - link "2019" [ref=e468] [cursor=pointer]:
                            - /url: "#bse3750-bib-0049"
                          - text: ), we consider it suitable for probing the complexities that underlie the EV adoption/non-adoption dynamics. Methodologically, discourse analysis makes our findings robust against researcher and participant biases. Furthermore, since CDA subsumes a multitude of approaches for discourse analysis depending on the research issues at hand (Fairclough,
                          - link "2005" [ref=e470] [cursor=pointer]:
                            - /url: "#bse3750-bib-0045"
                          - text: ), it allows us the flexibility to make data-related and analysis-related choices.
                        - generic [ref=e471]:
                          - heading "3.1.1 The source of data" [level=4] [ref=e472]
                          - paragraph [ref=e473]:
                            - text: "We operationalized our broad philosophical choice of CDA by making two further choices: one related to the data and its source and the other to the method of analysis. CDA is appreciably cosmopolitan in regard to what documents may be applicable, and it can be applied to text and speech available in both the public and private domains. Given the objectives of our study, we chose to analyze articles published in popular media sources. Our choice of popular media is motivated by the fact that it is known for its faster dissemination of news compared to traditional print media (Mitchelstein & Boczkowski,"
                            - link "2009" [ref=e475] [cursor=pointer]:
                              - /url: "#bse3750-bib-0082"
                            - text: ) and its rational and critical presentation (Schweinsberg et al.,
                            - link "2017" [ref=e477] [cursor=pointer]:
                              - /url: "#bse3750-bib-0108"
                            - text: ). Over the years, popular media has become a significant source for expediting data (Mitchelstein & Boczkowski,
                            - link "2009" [ref=e479] [cursor=pointer]:
                              - /url: "#bse3750-bib-0082"
                            - text: ; Piselli et al.,
                            - link "2022" [ref=e481] [cursor=pointer]:
                              - /url: "#bse3750-bib-0092"
                            - text: ). It is also acknowledged to play a vital role in decision-making by customers and suppliers and is given serious consideration by governments.
                        - generic [ref=e482]:
                          - heading "3.1.2 Data analysis method" [level=4] [ref=e483]
                          - paragraph [ref=e484]:
                            - text: Since the data set under study comprises qualitative data, we used an inductive approach to analyze content. By compressing and categorizing textual data using the abstraction process, the inductive content analysis method enables researchers to use concepts, categories, or topics to accomplish their research goals (Graneheim et al.,
                            - link "2017" [ref=e486] [cursor=pointer]:
                              - /url: "#bse3750-bib-0053"
                            - text: ; Kyngäs,
                            - link "2019" [ref=e488] [cursor=pointer]:
                              - /url: "#bse3750-bib-0071"
                            - text: ; Lindgren et al.,
                            - link "2020" [ref=e490] [cursor=pointer]:
                              - /url: "#bse3750-bib-0075"
                            - text: ; Vears & Gillam,
                            - link "2022" [ref=e492] [cursor=pointer]:
                              - /url: "#bse3750-bib-0128"
                            - text: ). Specifically, we used the Gioia method (Gioia et al.,
                            - link "2012" [ref=e494] [cursor=pointer]:
                              - /url: "#bse3750-bib-0047"
                            - text: ), which is affiliated with the grounded theory approach and has become a popular method of qualitative data analysis, as seen in many recent studies (e.g., Dhir et al.,
                            - link "2023" [ref=e496] [cursor=pointer]:
                              - /url: "#bse3750-bib-0040"
                            - text: ).
                      - generic [ref=e497]:
                        - heading "3.2 Data collection" [level=3] [ref=e498]
                        - paragraph [ref=e499]:
                          - text: The current study explores articles on EVs in India published in popular media from January 2020 through July 2023; 2020 was used as the starting year since the usage of online platforms has gained the desired depth and traction in the post-COVID-19 period (De’ et al.,
                          - link "2020" [ref=e501] [cursor=pointer]:
                            - /url: "#bse3750-bib-0037"
                          - text: ; OECD,
                          - link "2021" [ref=e503] [cursor=pointer]:
                            - /url: "#bse3750-bib-0089"
                          - text: ; UNCTAD,
                          - link "2021" [ref=e505] [cursor=pointer]:
                            - /url: "#bse3750-bib-0122"
                          - text: "). The data were acquired from Google News, media house websites (e.g., Economic Times and LiveMint), and Google platforms (including magazines, online news channels, and online auto news portals). Using multiple sources enabled broader access since most of the news available on Google News covered the ongoing year (2023) only. A search of headlines was executed using the following keywords: “electric vehicle India,” “EV,” “E-vehicle,” “vehicles,” “green mobility,” “green vehicles,” “electric vehicle,” “e-vehicle,” “e-two wheeler,” “e-four wheeler,” “e-three wheelers,” “e-cars,” “electric cars,” and “sustainable vehicle.” We found a total of 718 articles published across the chosen time horizon, as presented in Table"
                          - link "1" [ref=e506] [cursor=pointer]:
                            - /url: "#bse3750-tbl-0001"
                          - text: . The source-wise distribution of articles is presented in Table
                          - link "2" [ref=e507] [cursor=pointer]:
                            - /url: "#bse3750-tbl-0002"
                          - text: .
                        - generic [ref=e508]:
