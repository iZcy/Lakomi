                        - text: "Based on the content analysis of popular media articles on EVs, we identified four main themes: industry-level enabling cues for EV adoption, economy-level motivations and motivators, impediments to the diffusion of EVs, and harbingers of change. Each aggregate dimension had underlying second-order themes and first-order concepts, as illustrated in the data structure diagram of each aggregate dimension (see Figures"
