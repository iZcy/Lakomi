                      - generic [ref=e588]:
                        - heading "3.4 Validity and reliability" [level=3] [ref=e589]
                        - paragraph [ref=e590]:
                          - text: Validity and reliability are as important in CDA as they are in any other empirical research methodology. While CDA primarily concentrates on the critical investigation of power relations, ideologies, and social structures inside discourse, guaranteeing the validity and trustworthiness of its conclusions is essential to upholding the analysis's integrity (Meyer,
                          - link "2001" [ref=e592] [cursor=pointer]:
                            - /url: "#bse3750-bib-0081"
                          - text: ). To establish credibility, the current study followed systematic and rigorous analytical procedures.
                        - paragraph [ref=e593]:
                          - text: In order to augment the validity of the current research, various data sources (117 media units) were employed to triangulate the results and authenticate research findings. Triangulation entails scrutinizing diverse forms of discourse, such as written texts, interviews, and visual materials, while also seeking insights from multiple viewpoints to establish coherence and agreement in the interpretations. CDA encompasses comprehensive descriptions of texts, coding frameworks, standards for recognizing discursive components, and guidelines for making findings. These elements provide transparency and lead to the attainment of data saturation, which involves rigorously analyzing the data until no further novel insights or themes can be extracted. The CDA methodology aids in guaranteeing a thorough and dependable analysis by reducing the likelihood of disregarding pertinent elements of discourse (Wodak,
                          - link "2004" [ref=e595] [cursor=pointer]:
                            - /url: "#bse3750-bib-0130"
                          - text: ). Hence, CDA ensures that the analysis is exhaustive and dependable, as it reduces the likelihood of disregarding relevant elements of discourse. It is noteworthy that CDA is predominantly a qualitative research methodology that prioritizes critical interpretation. Although validity and reliability are important factors, the emphasis of CDA lies in comprehending power dynamics and social structures (Rogers,
                          - link "2011" [ref=e597] [cursor=pointer]:
                            - /url: "#bse3750-bib-0100"
                          - text: ). This approach prioritizes critical insights obtained through thorough contextual analysis over statistical measures of reliability.
                        - paragraph [ref=e598]: "We used three approaches: (i) data source triangulation by extracting data from 117 media units to ensure that no data points were missed and there was not a skew towards a small number of sources; (ii) careful documentation and transparency along with adherence to systematic and rigorous analytical procedures to offer robust results; and (iii) independent coding by two authors at each step followed by discussions to converge on a consensus view and eliminate researcher bias."
                    - generic [ref=e599]:
