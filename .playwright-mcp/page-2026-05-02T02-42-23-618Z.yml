                          - list [ref=e557]:
                            - listitem [ref=e558]: "Note: News articles are obtained mainly from the Economic Times and LiveMint. Magazine-published articles on EVs include The Print, Business Insider, and Business Today. News channels include Times Drive, ABC News, and CNBC. Online portals from where information was collected are E-Vehicles Info and Inc42. Online auto-news portals include Express Mobility and The Auto Car."
                      - generic [ref=e559]:
                        - heading "3.3 Data analysis" [level=3] [ref=e560]
                        - paragraph [ref=e561]:
                          - text: The corpus of 718 articles, representing a set of 1002 pages and approximately 388,866 words, was analyzed inductively to identify themes and dominant discourses. To elaborate, each popular media article was coded individually, and the findings were then compared and contrasted (Leung et al.,
                          - link "2019" [ref=e563] [cursor=pointer]:
                            - /url: "#bse3750-bib-0073"
                          - text: ). Basic information such as the article's title, the name of the media entity, publication date, the names of the authors (wherever mentioned), and weblinks were collated in an Excel spreadsheet. Thereafter, the Gioia approach was used to analyze the data through open, axial, and aggregate coding (Adu,
                          - link "2019" [ref=e565] [cursor=pointer]:
                            - /url: "#bse3750-bib-0003"
                          - text: ; Azungah,
                          - link "2018" [ref=e567] [cursor=pointer]:
                            - /url: "#bse3750-bib-0015"
                          - text: ; Glaser & Strauss,
                          - link "2017" [ref=e569] [cursor=pointer]:
                            - /url: "#bse3750-bib-0048"
                          - text: ).
                        - paragraph [ref=e570]:
                          - text: As the first step of the manual coding process, two authors independently read the articles line-by-line, generating open codes. The entire author team then met to discuss the open codes thus generated, ironing out the differences to reach a consensus on 61 open codes, called first-order concepts in the Gioia approach. Thereafter, two authors clubbed the codes based on their understanding formed through the review of prior literature, moving back and forth between codes and theoretical insights (Schreieck et al.,
                          - link "2022" [ref=e572] [cursor=pointer]:
                            - /url: "#bse3750-bib-0107"
                          - text: ) while simultaneously comparing the codes to generate axial codes, or second-order themes in Gioia parlance. Repeating the practice of taking a consensus view, all authors met again to discuss the generated axial codes, deciding to take 16 axial codes forward. Finally, we generated aggregate codes, called aggregate dimensions in the Gioia approach, by consolidating the 16 axial codes to synthesize four aggregate dimensions.
                        - paragraph [ref=e573]:
                          - text: An overview of methodological steps is provided in Figure
                          - link "1" [ref=e574] [cursor=pointer]:
                            - /url: "#bse3750-fig-0001"
                          - text: .
                        - figure "FIGURE 1 Open in figure viewer PowerPoint Overview of methodological steps." [ref=e576]:
