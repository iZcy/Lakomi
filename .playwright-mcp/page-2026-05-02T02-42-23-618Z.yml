                      - generic [ref=e656]:
                        - heading "4.1 Industry-level enabling cues for EV adoption" [level=3] [ref=e657]
                        - paragraph [ref=e658]:
                          - text: "EVs are more than just a consumer product since they are seen as a plausible mobility solution to counter emissions and the resultant climate risk. As a result, the efforts to drive EV sales have a larger motivation of manifesting pro-environmental behavior. The reviewed media articles confirm the private sector's keen awareness of the environmental aspect of EV adoption, in addition to looking at EVs as a commercial opportunity. More specifically, content analysis of selected popular media articles published since 2020 uncovered several enabling cues emanating from the private sector, including not only the sub-sectors involved directly in the manufacture and sale of EVs but also other sectors. These enabling cues can be categorized as follows: product-centric improvements by manufacturers, customer-centric initiatives of manufacturers, sustainability-oriented impetus by the private sector, and consumers' positive disposition towards EVs, as presented in Figure"
                          - link "2" [ref=e659] [cursor=pointer]:
                            - /url: "#bse3750-fig-0002"
                          - text: .
                        - paragraph [ref=e660]: "First and foremost, EVs perform the important function of meeting the mobility needs of their owners. Naturally, EV manufacturers are cognizant of this and have devoted substantial time and effort to making product-centric improvements to their vehicles, which has driven their adoption noticeably. Coding of the narrative indicates that product-centric improvements can be largely captured through the following activities: EV manufacturers working together to reduce cost, launching new products with improved battery range, reducing ownership costs within the supply chain, and lowering prices to reflect a fall in the cost of raw materials."
                        - paragraph [ref=e661]:
                          - text: EV manufacturers' efforts have been focused on providing technologically superior products, launching new variants in different segments, improving battery range and ease of charging, and lowering maintenance costs. Price has been a central theme of many discussions on EVs in the past, and the media articles included in our study have noted several efforts made by manufacturers to lower prices by reducing costs. The approaches used for this purpose include collaborating with other EV manufacturers, improving supply chain efficiency, and controlling the cost of raw materials. Discussing the efforts of EV manufacturers to work together to reduce costs, Dalvi (
                          - link "2023" [ref=e663] [cursor=pointer]:
                            - /url: "#bse3750-bib-0034"
                          - text: ") noted that:"
                        - blockquote [ref=e665]:
                          - paragraph [ref=e666]: Concurrently, recognizing its enormous commercial potential, component manufacturers are stepping up their efforts to localize EV parts, either by granting technical licenses or by conducting comprehensive ground-up development, leading to reduced cost and increased affordability of EVs.
                        - paragraph [ref=e667]:
                          - text: Similarly, Blenkinsop (
                          - link "2023" [ref=e669] [cursor=pointer]:
                            - /url: "#bse3750-bib-0024"
                          - text: ") has observed the efforts expended by manufacturers to reduce the cost of batteries and related raw materials:"
                        - blockquote [ref=e671]:
                          - paragraph [ref=e672]: With the cost of raw materials like lithium used in battery manufacture falling, the price of batteries, which once made up as much as 40% of the cost of an electric car, is also going down. This benefit is being passed on to customers by automakers.
                        - paragraph [ref=e673]: EV manufacturers have also shown an equal and opposite outward orientation by introducing several customer-centric initiatives to better engage with potential EV buyers. To ensure ease of buying, EV manufacturers have made significant efforts to facilitate online sales and have tried to boost sales through promotional activities such as buyback options that allow consumers to trade in their existing vehicles, attractive pricing, and GPS services to locate charging stations.
                        - paragraph [ref=e674]:
                          - text: Highlighting the anticipated hyperactivity by online platforms selling e-cars, Mukherjee (
                          - link "2022" [ref=e676] [cursor=pointer]:
                            - /url: "#bse3750-bib-0084"
                          - text: ") shared the following:"
                        - blockquote [ref=e678]:
                          - paragraph [ref=e679]: Given the momentum in the local market, the business anticipates electric cars to account for roughly two-thirds of its sales in the next three years, up from less than 2% currently, according to founder and CEO Sandeep Aggarwal. For sales on its platform, the firm has agreements with 45 EV manufacturers, including Hero Electric, Okinawa, and Kinetic.
                        - paragraph [ref=e680]:
                          - text: Analysis of selected articles revealed a clear sustainability-oriented impetus given to the adoption of EVs by the private sector. There appears to be a distinct effort by the private sector at large to adopt EVs themselves and to encourage their vendors and employees to do the same. This apparent affection for EVs as mobility solutions is an expression of the entire private sector's heightened sustainability orientation and conscious effort to mitigate climate risk. Private firms have underlined their intent in this regard by launching EV policies that include not only recommendations for their employees to use EVs for their mobility but also several incentives to encourage their purchase. Some companies have gone to the extent of mandating that a certain proportion of their vendors' fleets to be electric. At the same time, most private sector players have transitioned to EVs as cleaner solutions for their cargo movement. In this regard, the movement of e-commerce firms to green mobility has been visibly extensive, successfully showcasing the efforts of corporations to incorporate sustainability in their operations. Citing Amazon as an example, Vankipuram (
                          - link "2020" [ref=e682] [cursor=pointer]:
                            - /url: "#bse3750-bib-0127"
                          - text: ") made the following observation:"
                        - blockquote [ref=e684]:
                          - paragraph [ref=e685]: By deploying electric cars, Amazon India hopes to lower carbon emissions and the negative effects of delivery operations on the environment.
                        - paragraph [ref=e686]:
                          - text: "EV adoption has also been driven by the enabling cues emanating from changing consumer dispositions and profiles. Analysis of discourse in the selected media articles indicates two main enablers in this context: consumers' growing awareness of climate change issues and rising consumer buying power. The media has also observed a pent-up demand for EVs that is riding on the back of a healthy appetite for new technology in the premium segment and a desire for cost-effective transportation in the face of rising fossil fuel prices in the economy segment. Media articles have underscored this aspect as a key driver of EV adoption, as is apparent from the following text penned by Dalvi ("
                          - link "2023" [ref=e688] [cursor=pointer]:
                            - /url: "#bse3750-bib-0034"
                          - text: "):"
                        - blockquote [ref=e690]:
                          - paragraph [ref=e691]: The adoption of electric mobility is being greatly accelerated by rising consumer awareness of the importance of using environmentally friendly transportation and the long-term affordability of EV ownership.
                      - generic [ref=e692]:
                        - heading "4.2 Economy-level motivations and motivators" [level=3] [ref=e693]
                        - paragraph [ref=e694]:
                          - text: Governments across the world have shown a deep commitment to promoting electric mobility and related renewable energy solutions. As a result, they have instituted several policy-level reforms and promulgated various regulatory measures to establish an ecosystem that supports responsible EV manufacturing and use. A tertiary, albeit significant motivation for governments to encourage EV manufacturing and promotion is the macroeconomic gain in terms of economic growth. Analysis of selected articles indicated a significant set of economy-level motivations and motivators that have driven the adoption of EVs so far—and can be expected to drive it further. These factors, presented in Figure
                          - link "3" [ref=e695] [cursor=pointer]:
                            - /url: "#bse3750-fig-0003"
                          - text: ", encompass the efforts of the government to create a supportive and well-regulated environment fostered through funding support, infrastructural support, and policy and regulatory thrust. These efforts encapsulate the motivators that governments use to promote EVs. In addition, positive economy-wide outcomes that are anticipated to accrue from the widespread adoption of EVs have served as a motivation for policymakers to create a conducive environment for EV diffusion."
                        - paragraph [ref=e696]:
                          - text: The economy-level motivation via funding support has manifested through multi-pronged measures that the media have noted. These include several national and cross-border funding facilities such as a $1 billion USD tripartite partnership, a migration fund to reduce borrowing costs for non-banking finance companies, attractive loan schemes offered by banks, lease financing solutions, World Bank support for EV financing, and a priority sector lending policy formulated by the central bank to reduce financing costs. A very encouraging element of the efforts to make the necessary funds available is the private sector's attempts to collaborate for internal and external funding. The highlight of these funding efforts is the success of EV start-ups in raising capital through IPOs and agreements between private banks, finance retailers, and EV dealers. Such partnerships have emerged as a go-to solution, as shared by Das (
                          - link "2023" [ref=e698] [cursor=pointer]:
                            - /url: "#bse3750-bib-0035"
                          - text: "):"
                        - blockquote [ref=e700]:
                          - paragraph [ref=e701]: The collaboration between the Government of India with the World Bank, the Asian Development Bank, and the Small Industries Development Bank of India aims to foster the adoption of electric vehicles in commercial and fleet operations by reducing the cost of financing.
                        - paragraph [ref=e702]:
                          - text: In addition to the phenomenal facilitation provided by varied funding options, economy-level enabling cues also emerge from creating the right infrastructural support, which can ease the way for EV manufacturers and users. Content analysis of the selected media articles reveals that the infrastructural support created for EVs rests on the tripod of charging infrastructure, battery and testing infrastructure, and infrastructure for promoting private investment. With regard to charging infrastructure, charging stations using solar panels have been constructed along with several new charging hubs housing both fast and slow chargers. The government has also introduced key initiatives for the installation of battery swapping stations and standing chargers for various EV segments. Specifically, a provision has been created for fast DC connectors at charging stations, and public chargers have been provided on highways and at bus depots. Plans for setting up charging stations at airports have also been unveiled. An excerpt from Raghuvanshi's (
                          - link "2023" [ref=e704] [cursor=pointer]:
                            - /url: "#bse3750-bib-0093"
                          - text: ") article showcases the targeted efforts made in this direction:"
                        - blockquote [ref=e706]:
                          - paragraph [ref=e707]: To strengthen the battery infrastructure in the country, the government has taken multiple actions. One of those initiatives is the PLI-Advanced Chemistry Cell Battery Storage scheme, under which the government has allocated US$ 2.45 billion in funds, which will be distributed to recipients for five years after the establishment of the manufacturing unit.
                        - paragraph [ref=e708]: Parallel to the efforts to boost charging infrastructure, the government has introduced several schemes for promoting battery infrastructure and announced plans to set up facilities for testing EVs. In addition to these direct measures to improve infrastructural support, the government has also eased procedural aspects and funded infrastructure to encourage the flow of private investment into the EV sector. A significant step in this direction has been the opening up of the sector to 100% foreign direct investment.
                        - paragraph [ref=e709]:
                          - text: While funding and infrastructural support have also been propelled by several policy initiatives, we have identified policy and regulatory thrust as separate themes to provide a more nuanced elucidation of economy-level motivations and motivators. Herein, we have encapsulated all policy measures and regulatory enforcements that strongly underscore the government's commitment to not only promote EVs but to ensure that as a relatively new technology, EVs meet all quality and safety requirements, as well as fulfill the climate risk-countering potential they are perceived to have. The objective of policy initiatives from this perspective is to inspire the confidence of consumers and investors in EVs, and the focus of regulatory thrust is to ensure compliance with norms and standards by EV manufacturers. Many regulatory requirements in this regard are related to charging infrastructure and battery swapping. The government has mandated battery certification, required the recall of vehicles from the market in the case of any fire accidents, and ensured a high degree of vigilance to check EVs with a high battery capacity. Several norms have also been introduced for performance, and testing criteria have been laid out. Moreover, guidelines have been issued mandating that all EVs comply with established noise standards. As an additional safety measure, regulations preventing the registration of vehicles without pre-installed batteries have been released. Unni and Shah (
                          - link "2023" [ref=e711] [cursor=pointer]:
                            - /url: "#bse3750-bib-0123"
                          - text: ") discussed further initiatives in their article:"
                        - blockquote [ref=e713]:
                          - paragraph [ref=e714]: In the budget 23-24, one of the focus areas was the EV mobility. In addition to the extension of the subsidy amount for one more year, the government also focused on vehicle scrappage policy for the replacement of old polluting vehicles with electric vehicles. The move will accelerate the transition towards electric vehicles.
                        - paragraph [ref=e715]: Not only has the government been proactive in floating initiatives, but it has also been firm in enforcing compliance. There is a clearly spelled-out provision for legal action against EVs that do not follow the guidelines. The violating EV manufacturers are also liable to be suspended from the government scheme after violating the norms, and subsidies would also be withdrawn.
                        - paragraph [ref=e716]:
                          - text: Finally, our analysis indicates that an important part of the government's all-encompassing efforts to advance EV diffusion has been its interest in using the entire EV ecosystem to drive its globally strategic and domestically high-priority objectives. In this regard, we have categorized macro-level positive outcomes. Herein, the globally strategic outcomes come from aligning EVs with the climate-related priority of progressive decarbonization and the ultimate achievement of net zero. The key idea here is that the transition to EVs at the institutional and individual levels can help the country deliver on its international pledges to battle global climate change and address the challenges of sustainable urbanization. Over and above the attractiveness of EVs for reducing carbon emissions, they also present the government with an opportunity to promote economic growth by (a) replacing expensive fossil fuels to improve the balance of payment situation, (b) making the country a manufacturing hub, (c) generating employment opportunities, and (d) creating business opportunities. The following thoughts expressed by Bhardwaj (
                          - link "2022" [ref=e718] [cursor=pointer]:
                            - /url: "#bse3750-bib-0022"
                          - text: ") highlight the positive outcomes of EV adoption:"
                        - blockquote [ref=e720]:
                          - paragraph [ref=e721]: Transitioning to electric vehicles not only reduces carbon emissions and thus helps the country to meet its commitment towards climate change but also positively contributes towards economic growth. In case India maintains steady progress towards its 2030 target, the EV market in India will be a US$206 billion opportunity. The industry has attracted investment from private equity/venture capital investors.
                      - generic [ref=e722]:
                        - heading "4.3 Impediments to the diffusion of EVs" [level=3] [ref=e723]
                        - paragraph [ref=e724]:
                          - text: "EVs have received significant attention and a seemingly intensive effort on the part of all stakeholders to support their diffusion and adoption. As discussed in the preceding two themes, comprehensive industry-level and economy-level measures have been taken to make EVs attractive as a technologically advanced product that offers a win-win situation by also delivering on the carbon neutrality dimension. However, these efforts notwithstanding, the diffusion of EVs has been sluggish and has trailed expectations. As a result, popular media has focused substantial attention on what could be the potential reasons behind the less-than-anticipated adoption of EVs. Analysis of shortlisted articles revealed several factors that have obstructed the desired diffusion of EVs. We have identified four key sources of such obstruction: buy-side barriers, evolving technology, sell-side barriers, and systemic bottlenecks. These factors, as presented in Figure"
                          - link "4" [ref=e725] [cursor=pointer]:
                            - /url: "#bse3750-fig-0004"
                          - text: ", represent the issues and challenges that create friction in the EV ecosystem and impede their diffusion."
                        - paragraph [ref=e726]:
                          - text: The buy-side barriers are an expression of consumers' resistance towards EVs based on their perceptions of EVs as a mobility solution. The key sources of consumers' resistance towards EVs include their high price, limited choice in terms of variants and customization, long waiting times for the vehicles to be delivered, unestablished resale value, and operational issues related to charging. These broad factors can be unpacked to reveal a host of intricacies. For instance, concern for high prices has been expressed in many articles trying to diagnose the underlying causes, which include EV manufacturers not being able to reap the benefits of economies of scale, the suspension of government schemes, third-party motor insurance, and imported battery components. For example, Rawat (
                          - link "2022" [ref=e728] [cursor=pointer]:
                            - /url: "#bse3750-bib-0095"
                          - text: ") observed that:"
                        - blockquote [ref=e730]:
                          - paragraph [ref=e731]: The high price of electric vehicles is a barrier to adoption. The consumers, however, choose EVs for other factors, including low maintenance cost, high prices of other fuels, lower registration cost and Goods and Service Tax (GST) for EV buyers, and low cost of electricity.
                        - paragraph [ref=e732]: In addition to the above, barriers constituting consumer resistance towards EVs arise from issues with charging infrastructure and the time required for charging. In exploring the reasons, the media articles observe reasons such as issues with distribution companies involved in charger installation, investment challenges in creating the required charging infrastructure, and limited facilities in rural areas. Furthermore, barriers to EV adoption arise from a lack of variety in the product range from low to premium segments. Prospective buyers are also discouraged by the limited number of customization possibilities and the fact that they have to book their EV and wait for quite some time for its delivery.
                        - paragraph [ref=e733]: The fact that EVs are still an outcome of evolving technology acts as a barrier to their diffusion due to both perception-related concerns and tangible issues. The media articles analyzed herein have largely noted that the nascence of the technology has raised concerns about the reliability and safety of EVs; allowed testing to not be as rigorous as required; caused several issues related to efficiency, performance, and costs; and raised challenges related to the lack of development of bigger batteries and battery capacity.
                        - paragraph [ref=e734]:
                          - text: In unpacking these barriers created by the newness of the technology, it is apparent that EV makers have not been able to master the reliability and safety of their products. There are reports of accidents involving battery fires, especially when atmospheric temperatures are high, leading to overheating batteries. Batteries have been in the eye of the storm, not only due to safety concerns but also due to challenges related to developing batteries with a higher capacity. The fears about safety are further compounded by news that many manufacturers, particularly start-ups, do not have the facilities to conduct testing as rigorously as required and expected. Furthermore, due to the technology still being new, issues related to vehicle efficiency and performance on several parameters coupled with high initial costs and maintenance costs arise. For example, Kumar (
                          - link "2023" [ref=e736] [cursor=pointer]:
                            - /url: "#bse3750-bib-0069"
                          - text: ") brought forth some of the related issues:"
                        - blockquote [ref=e738]:
                          - paragraph [ref=e739]: The main reason EVs are expensive is the high cost of batteries, which constitute 40–50% of the overall cost of production. Batteries are made up of several materials which are imported from several countries like Australia, Chile, Russia, etc. In order to make India self-reliant in battery manufacturing, the government offers a scheme, and only three players are selected to receive those incentives.
                        - paragraph [ref=e740]: The sell-side barriers encompass the challenges faced by EV manufacturers that prevent them from stepping up production and quality. These include raw material shortages, lack of availability of skilled manpower, battery-related issues, difficulties in complying with strictly reinforced norms, and inconsistent and delayed subsidies. Discussing the underlying challenges in detail, the media articles analyzed in our study have uncovered wide-ranging impediments arising from internal and external factors, as well as from the micro and macro environments. Resource shortfalls stand out as a critical challenge, whether in terms of raw materials, manpower, or funding. Specifically, EV manufacturers have faced a shortage of chips, semiconductors, and lithium. Battery-related problems again acted as a major bottleneck in production due to a shortage of good-quality vendors. Operationally, there have been production delays, and the volume of pending orders has risen due to supply chain disruptions, first by the COVID-19 pandemic and then by the Ukraine war. Demand for battery swapping has further impacted logistics and last-mile delivery.
                        - paragraph [ref=e741]:
                          - text: In addition to the above-mentioned operational challenges, the sell-side challenges have become more complex due to policy developments, which have resulted in the withdrawal of several benefits and subsidies announced to support EVs. Even where the schemes are not withdrawn, there are delays resulting in pending subsidies. At the same time, the government has been tightening the norms by the day to enforce quality and safety standards, which are becoming difficult for manufacturers to follow. This increases the impediments multi-fold since a stringent legal and regulatory stance is taken for any violation. Subsidies are also not released on time due to compliance issues, causing a financial crunch. Dinakar (
                          - link "2023" [ref=e743] [cursor=pointer]:
                            - /url: "#bse3750-bib-0042"
                          - text: ") noted:"
                        - blockquote [ref=e745]:
                          - paragraph [ref=e746]: Subsidies are inconsistent and irregular. The government has reduced the subsidies, and the subsidy provided under FAME-II will be discontinued in the year 2024. In addition, the subsidy is pending due to which small producers have shut down the manufacturing units.
                        - paragraph [ref=e747]:
                          - text: Finally, there are persistent systemic bottlenecks that impede the diffusion of EVs. One of the bottlenecks mentioned in the articles included in our analysis is that EVs might never reach a larger scale of production since they are considered less fit for public transport and commercial vehicles by regulators. At the same time, in the wake of the COVID-19 pandemic, the economy, particularly the rural part, is still weak, and inflation is rising. Buying an expensive EV, which will bring with it challenges of charging, is unlikely to be a preference for a large population spread over rural geographies. Last-mile connectivity is another systemic hurdle impeding EV diffusion in rural areas. Another systemic impediment that has substantially affected EV diffusion is concern about its environmentally friendly claims. End-of-life options, handling e-waste, and battery recycling are issues that the government is worried about, causing it to be cautious in lending too much support and motivation to EV manufacturers. Lastly, a major and perhaps insurmountable barrier is that the funds available to drive growth in the sector are drying up, with the government providing inadequate fiscal support. On the one hand, financial institutions are hesitant to provide funds due to concerns about resale value or durability, and on the other, the government is suspending subsidy-related schemes. The fund crunch has become a serious problem for start-ups and micro, small, and medium-sized enterprises operating in the sector. In their article, Sampath (
                          - link "2022" [ref=e749] [cursor=pointer]:
                            - /url: "#bse3750-bib-0106"
                          - text: ") expressed concern about the state of the rural economy:"
                        - blockquote [ref=e751]:
                          - paragraph [ref=e752]: A weak rural economy and rising inflation negatively impacted demand for electric two-wheelers. Although electric two-wheeler sales have increased, the overall demand has remained muted. The rise in rural income due to a normal monsoon is expected to boost the demand for electric two-wheelers.
                      - generic [ref=e753]:
                        - heading "4.4 Harbingers of change" [level=3] [ref=e754]
                        - paragraph [ref=e755]:
                          - text: Being mindful of the potential of EVs to offer a climate-friendly mobility solution, media articles included in this CDA have given sufficient and commensurate attention to how the positive forces driving EV diffusion and adoption so far can be strengthened and the impeding factors can be potentially countered. We have categorized the recurrent themes in this regard under the umbrella term/aggregate dimension of harbingers of change. To elaborate, content analysis of shortlisted media articles published since 2020 has revealed several initiatives and actions at the policy level as well as at the private sector level that are planned, initiated, or recommended for ensuring broad-based adoption of EVs by individuals and organizations. Specifically, the factors that can propel change can be categorized as focused policy support, strategic green shoots, collaborative mindset, and technological innovations, as presented in Figure
                          - link "5" [ref=e756] [cursor=pointer]:
                            - /url: "#bse3750-fig-0005"
                          - text: .
                        - paragraph [ref=e757]: One of the key factors in the entire EV adoption dynamics is the extensive need for funding support through loans and subsidies. This is corroborated by the media discourse and is evident in the preceding discussions on how the initial announcements and grant of subsidies acted as a strong enabling cue for EV adoption whereas their subsequent withdrawal acted as an impediment to EV diffusion. In their discussions on the path ahead, media articles have strongly argued the need for a well-functioning and frictionless fiscal incentivization system through low-cost financing, timely subsidies, and rationalization of taxes.
                        - paragraph [ref=e758]:
                          - text: Fiscal incentives are critical to increase EV adoption. Suggesting that EV financing should be treated as a priority sector, the articles have strongly emphasized the importance of low-cost financing for accelerating the transition to e-mobility. At the same time, subsidies are unavoidable and need to be granted as well as disbursed on time. A substantial majority of articles have highlighted subsidies as a key imperative to forging an accelerated path for the diffusion and adoption of EVs. Not only are more subsidies required, but there is also a need to extend them to all segments, including micro-mobility vehicles, benefiting low-income groups. There is also debate on the rationalization of taxes on batteries and battery swapping infrastructure to incentivize the concerned stakeholders. At the same time, it is suggested that taxes should be uniform for all EVs, with some rebate on capital expenditures for creating charging infrastructure. Several steps in the right direction have been introduced, as noted by Rudra (
                          - link "2023" [ref=e760] [cursor=pointer]:
                            - /url: "#bse3750-bib-0102"
                          - text: "):"
                        - blockquote [ref=e762]:
                          - paragraph [ref=e763]: India has opened up the ecosystem to international investors and EV firms while supporting domestic EV players with a range of subsidies and incentives. Foreign players have already begun to invest in domestic talents.
                        - paragraph [ref=e764]: Equal emphasis has been given to evolving a comprehensive, long-term, and uniform EV policy covering all vehicles, passenger and commercial, with extensive coverage of safety norms. The discussion herein spans several aspects that require policy attention, such as the extension of guarantees for different segments of commercial vehicles, the coordinated effort of different departments to build the required infrastructure, leveraging digitalization for enhancing the sustainability of EV processes, the provision of parking incentives, and logistics services for a smoother supply chain.
                        - paragraph [ref=e765]: Furthermore, the articles on policy perspective have underscored the need for promoting advances in battery technology, battery-swapping, second-life batteries, scrappage policies, and the recycling of batteries to address one of the most burning issues impeding the adoption of EVs.
                        - paragraph [ref=e766]:
                          - text: Another issue highlighted for concentrated policy attention is facilitating charging infrastructure, planning parking incentives, and battery-swapping infrastructure. The relevant articles also offer interesting commentary on several strategic green shoots that are harbingers of positive changes in the EV sector. Some forerunners in this regard are the active involvement of start-ups in the EV space, cross-border green investment, and business model innovations. A very encouraging feature of the EV market has been the role of start-ups in driving the sector. Many start-ups in this space have already challenged the monopoly of large firms. They have shown initiative to manufacture e-vans, set up solar-powered battery swapping stations, develop the charging segment through battery swapping and manufacturing, and manufacture retrofitting kits. Trivedi's (
                          - link "2022" [ref=e768] [cursor=pointer]:
                            - /url: "#bse3750-bib-0121"
                          - text: ") article offers a lucid narrative of the expanding role of start-ups:"
                        - blockquote [ref=e770]:
                          - paragraph [ref=e771]: Battery swapping has gained momentum thanks to Indian entrepreneurs. Electric autorickshaw drivers can pay for their usage of the batteries up front or at retail establishments by using the technological platform Sheru. It collaborates with several energy storage value chain parties. Additionally, in the state of Maharashtra, which is home to Mumbai, the financial hub, Sun Mobility is collaborating with Amazon India to install switching stations at its warehouses.
                        - paragraph [ref=e772]:
                          - text: At the same time, cross-border green investment has started flowing into the sector, indicating positive sentiment and upcoming expansion. Foreign investment has taken several forms, including setting up production units, the acquisition of domestic firms, foreign direct investment, and joint ventures. The focus of foreign investments has been all-encompassing, covering manufacturing lines, charging stations, and R&D centers. As Rekhi (
                          - link "2023" [ref=e774] [cursor=pointer]:
                            - /url: "#bse3750-bib-0097"
                          - text: ) mentioned in their article,
                        - blockquote [ref=e776]:
                          - paragraph [ref=e777]: The company Foxconn, well known for creating the renowned Apple iPhone, wants to get into the Indian EV production market. This is the first time the Taiwanese corporation has made it clear that it intends to pursue its goals of expanding electric vehicle manufacturing in India.
                        - paragraph [ref=e778]: Finally, the articles discussing strategic green shots have noted some business model innovations that are a portent of positive developments in the sector. The notable efforts in this direction include the diversification of source companies, aggregators, and target players working together to establish charging stations, the development of second-life battery solutions, and the movement towards sustainable mobility. Some successful initiatives include the subscription model of battery swapping, which has generated higher revenue, and the pay-per-use model.
                        - paragraph [ref=e779]: The collaborative mindset is the next prominent stream in the discussion on harbingers of change. The articles included in our analysis have discussed the collaborative mindset of multiple stakeholders in the EV sector to bring forth their willingness to work together synergistically for the growth and expansion of the sector. The key collaborative relationships that have fruition in the sector are public and private sector collaborations, private–private partnerships through alliances and joint ventures, and a memorandum of understanding (MOU) for charging infrastructure and battery swapping.
                        - paragraph [ref=e780]:
                          - text: Public–private collaborations have been undertaken to evolve a symbiotic relationship. Such link-ups have been mainly forged for installing charging stations. Collaborative initiatives are more visible and in higher volume within the private sector. Herein, collaborations take the form of partnerships, alliances, and joint ventures for swapping and recycling batteries, providing shared mobility services, setting up charging zones, and supporting components. Some typical partnerships have also evolved, such as that of e-commerce companies with EV suppliers, multi-brand small EV dealerships, distribution companies with real estate developers, and so on. The last form of collaborative association, MOUs for charging infrastructure and battery swapping, have been witnessed in both public–private and private–private settings. Highlighting the importance of collaborations, Rana (
                          - link "2023" [ref=e782] [cursor=pointer]:
                            - /url: "#bse3750-bib-0094"
                          - text: ") opined:"
                        - blockquote [ref=e784]:
                          - paragraph [ref=e785]: The installation of EV charging infrastructure and the provision of incentives for fleet electrification can be facilitated by public organizations such as municipal corporations and transportation agencies. It is important for EV manufacturers, utility companies, and suppliers of charging infrastructure to collaborate to build a strong nationwide charging network.
                        - paragraph [ref=e786]:
                          - text: We have classified the last significant stream of discussion on harbingers of change under the heading of technological innovation. Technological innovations encompass all efforts initiated or planned to be initiated for the evolution of EVs as a novel technology, improvements in batteries, and possibilities of enhancing charging speed and efficiency. The key initiatives identified by the media articles include technology hubs and innovations to develop lithium-ion cells, smaller, longer-lasting, and more affordable batteries, premium features in EVs, a one-stop app for charging stations, and testing of the feasibility of solar-powered charging and electric highways. These initiatives encapsulate many small and unique efforts, such as start-ups working solely on low-cost EV technology development, equipping EVs in public spaces with panic buttons, GPS, and cameras, and policy support for R&D. Mehta (
                          - link "2022" [ref=e788] [cursor=pointer]:
                            - /url: "#bse3750-bib-0079"
                          - text: ") discussed the following regarding the formation of technological clusters:"
                        - blockquote [ref=e790]:
                          - paragraph [ref=e791]: Several months ago, a group of acid battery manufacturers created a technological cluster in Andhra Pradesh with the objective of developing lithium-ion cells and then commencing local production of lithium-ion batteries.
                    - generic [ref=e792]:
                      - heading "5 DISCUSSION" [level=2] [ref=e793]
                      - paragraph [ref=e794]:
                        - text: The primary objective of this study was to examine the contours of the unfolding discussions and actions taken to promote and support the use of EVs, not only as a potentially cost-effective mobility solution in the long run but also as an immediate counter to the mounting climate risk and the failure of the world as a whole to remain on track to achieve its committed carbon neutrality targets. Stated formally, we sought answers to three research questions. In response to RQ1, in which we sought to examine all potential factors that have positively influenced the diffusion of EVs, our comprehensive analysis of 718 popular media articles helped us uncover a comprehensive set of enablers. Broadly speaking, we found two categories of enablers—industry-level enabling cues for EV adoption and economy-level motivations and motivators—presented in Figures
                        - link "2" [ref=e795] [cursor=pointer]:
                          - /url: "#bse3750-fig-0002"
                        - text: and
                        - link "3" [ref=e796] [cursor=pointer]:
                          - /url: "#bse3750-fig-0003"
                        - text: as respective aggregate dimensions. The first dimension captures the facilitating conditions created or supported by the private sector, including EV manufacturers, other sectors, and individual consumers.
                      - paragraph [ref=e797]:
                        - text: With regard to the efforts made by the EV manufacturers, we found a conscious effort to introduce both product-centric improvements and customer-centric initiatives. Our findings corroborate the accumulated evidence on how product features, among other things, drive EV adoption (e.g., Bansal et al.,
                        - link "2021" [ref=e799] [cursor=pointer]:
                          - /url: "#bse3750-bib-0016"
                        - text: ; Benzidia et al.,
                        - link "2021" [ref=e801] [cursor=pointer]:
                          - /url: "#bse3750-bib-0021"
                        - text: ). Moving to findings related to the industry as a whole, we found that manufacturers introduced several measures to promote EV use, proving a tangible sustainability-oriented impetus. Past studies have also noted the role of environmental awareness in driving EV adoption (e.g., Das & Bhat,
                        - link "2022" [ref=e803] [cursor=pointer]:
                          - /url: "#bse3750-bib-0036"
                        - text: ; Shanmugavel & Balakrishnan,
                        - link "2023" [ref=e805] [cursor=pointer]:
                          - /url: "#bse3750-bib-0109"
                        - text: ). Our analysis also revealed how, at an individual level, consumers showed a positive disposition towards EVs, motivated by a diverse set of enablers hinging on environmental concerns as well as perceptions about EVs as a mobility solution. Our findings are aligned with prior studies that have listed several motivators from the consumer perspective (e.g., Liu et al.,
                        - link "2021" [ref=e807] [cursor=pointer]:
                          - /url: "#bse3750-bib-0076"
                        - text: ; Yadlapalli et al.,
                        - link "2022" [ref=e809] [cursor=pointer]:
                          - /url: "#bse3750-bib-0136"
                        - text: ). To elaborate, the findings for consumer behavior are consistent with the green buying behavior research, which suggests that factors like environmental concerns, price, and status consciousness affect consumer purchase decisions (e.g., Adnan et al.,
                        - link "2022" [ref=e811] [cursor=pointer]:
                          - /url: "#bse3750-bib-0002"
                        - text: ; Sharma et al.,
                        - link "2022" [ref=e813] [cursor=pointer]:
                          - /url: "#bse3750-bib-0110"
                        - text: ).
                      - paragraph [ref=e814]:
                        - text: The second set of enablers that were identified through the coding of the media discourse encapsulates the supportive conditions created or encouraged by the government. With regard to the efforts made by the government, we found a strategic mix of provisions for resource support, comprehensive policy initiatives, stringent regulatory enforcement, and efforts to capitalize on the mega growth opportunity that transitioning to EVs represents. Our findings reiterate existing findings on the role of government initiatives in facilitating EV penetration (e.g., Rostad Sæther,
                        - link "2022" [ref=e816] [cursor=pointer]:
                          - /url: "#bse3750-bib-0101"
                        - text: ; Zheng et al.,
                        - link "2022" [ref=e818] [cursor=pointer]:
                          - /url: "#bse3750-bib-0142"
                        - text: ). As revealed by our analysis, past studies have noted how governments encourage the transition to e-mobility by setting up the right infrastructure, subsidies, support for manufacturers, and so on (e.g., Altenburg et al.,
                        - link "2022" [ref=e820] [cursor=pointer]:
                          - /url: "#bse3750-bib-0006"
                        - text: ; Rostad Sæther,
                        - link "2022" [ref=e822] [cursor=pointer]:
                          - /url: "#bse3750-bib-0101"
                        - text: ). However, in contrast with our findings, the existing scholarship has not discussed government schemes, regulatory compliance requirements, and the macroeconomic perspective in the desired depth or projected them as pertinent enablers of EV diffusion.
                      - paragraph [ref=e823]: On the whole, our study goes beyond the existing insights to present a more comprehensive set of enablers compared to that of most past studies. Succinctly, we identified and discussed product-centric improvements by manufacturers, customer-centric initiatives of manufacturers, sustainability-oriented impetus by the private sector, and consumers' positive dispositions as industry-level enabling cues for EV adoption and funding support, infrastructural support, policy and regulatory thrust, and positive economy-wide outcomes as economy-level motivations and motivators.
                      - paragraph [ref=e824]:
                        - text: RQ2 sought to map the factors that can have a negative bearing on the adoption of EVs. Based on our inductive approach to analyzing articles published in popular media, we identified a reasonably exhaustive set of impediments and barriers that have tempered the initial euphoric anticipations about the runaway success and adoption of EVs. Underscoring the seriousness of the impediments, our findings indicated that the barriers obstructing the higher diffusion of EVs exist on the buy-side (i.e., the consumers); the sell-side (i.e., the EV manufacturers); the systemic bottlenecks (i.e., the government policies); and the technology-side (i.e., its nascent state). Our findings build up on the existing literature where scholars have discussed barriers such as poor incentives (e.g., Singh et al.,
                        - link "2021" [ref=e826] [cursor=pointer]:
                          - /url: "#bse3750-bib-0112"
                        - text: ), costs (e.g., Zhuge et al.,
                        - link "2020" [ref=e828] [cursor=pointer]:
                          - /url: "#bse3750-bib-0143"
                        - text: ), charging infrastructure (e.g., Tal et al.,
                        - link "2018" [ref=e830] [cursor=pointer]:
                          - /url: "#bse3750-bib-0117"
                        - text: ), lack of successful business models (e.g., Maybury et al.,
                        - link "2022" [ref=e832] [cursor=pointer]:
                          - /url: "#bse3750-bib-0078"
                        - text: ), non-reliability for long-distance trips (e.g., Murugan & Marisamynathan,
                        - link "2022" [ref=e834] [cursor=pointer]:
                          - /url: "#bse3750-bib-0087"
                        - text: ), and so on.
                      - paragraph [ref=e835]:
                        - text: We responded to RQ3 querying about future-oriented initiatives that have been introduced to catalyze the wider diffusion and faster adoption of EVs by analyzing the short-listed articles to uncover discourse on the steps taken by multiple stakeholders in the EV ecosystem to drive the sector's growth. As a result, we identified several strategic and operational steps already initiated and others that are planned to be introduced by the government as well as the private sector. Under the primary heading of harbingers of change, we found four broad sets of future-oriented initiatives—focused policy support, strategic green shoots, collaborative mindset, and technological innovations. Our findings are in concordance with prior literature, which has discussed factors such as the impact of subsidies (e.g., Zhang & Huang,
                        - link "2021" [ref=e837] [cursor=pointer]:
                          - /url: "#bse3750-bib-0139"
                        - text: ) and government and private sector collaboration (e.g., Melander & Wallström,
                        - link "2022" [ref=e839] [cursor=pointer]:
                          - /url: "#bse3750-bib-0080"
                        - text: ; Wu,
                        - link "2022" [ref=e841] [cursor=pointer]:
                          - /url: "#bse3750-bib-0133"
                        - text: ). However, our study differs from past endeavors in two ways. First, no prior study has discussed the future-oriented initiatives explicitly, and second, no study has curated such an extensive set of initiatives from the perspective of all key players in the EV ecosystem.
                      - generic [ref=e842]:
                        - heading "5.1 Conceptual framework" [level=3] [ref=e843]
                        - paragraph [ref=e844]:
                          - text: Scholars have noted time and again the visible signs of escalating global temperatures, elevating sea levels, thawing glaciers and ice caps, and intensified weather patterns, including but not limited to droughts, floods, and heatwaves, which are ubiquitous and widely experienced (e.g., Leal Filho et al.,
                          - link "2018" [ref=e846] [cursor=pointer]:
                            - /url: "#bse3750-bib-0072"
                          - text: ; Redvers et al.,
                          - link "2022" [ref=e848] [cursor=pointer]:
                            - /url: "#bse3750-bib-0096"
                          - text: ). One of the few options to address the issues of climate change and global warming in the transportation sector is adopting EVs as a cleaner alternative to conventional combustion-powered vehicles (Requia et al.,
                          - link "2018" [ref=e850] [cursor=pointer]:
                            - /url: "#bse3750-bib-0098"
                          - text: ; Zhao et al.,
                          - link "2021" [ref=e852] [cursor=pointer]:
                            - /url: "#bse3750-bib-0140"
                          - text: ). However, the ground reality is that EVs have not been accepted and adopted with alacrity, particularly in developing and emerging countries. Our findings offer an in-depth analysis of factors that impact EV adoption in these economies, both positive and negative. Through a CDA of popular media articles on EVs published in India since 2020, we map the drivers of and barriers to EV adoption, bringing forth the facilitators and the inhibitors from the perspective of manufacturers, government, and consumers. Consolidating our results, we develop a conceptual framework to provide a bird's eye view of critical aspects of the EV adoption/non-adoption dynamics. We visualize the entire debate as a chain of change, starting with a concern that requires a response and ending with a universally sought outcome, calling our framework a C-R-O (concern-response-outcome) chain of change, as presented in Figure
                          - link "6" [ref=e853] [cursor=pointer]:
                            - /url: "#bse3750-fig-0006"
                          - text: .
                        - figure "FIGURE 6 Open in figure viewer PowerPoint C-R-O chain of change." [ref=e855]:
                          - link "Details are in the caption following the image" [ref=e856] [cursor=pointer]:
                            - /url: /cms/asset/73aa8edd-b474-4b1e-8a13-c17672b9d2b6/bse3750-fig-0006-m.jpg
                            - img "Details are in the caption following the image" [ref=e858]
                          - generic [ref=e859]:
                            - generic [ref=e860]:
                              - strong [ref=e861]: FIGURE 6
                              - generic [ref=e862]:
                                - link "Open in figure viewer" [ref=e863] [cursor=pointer]:
                                  - /url: "#"
                                - link "PowerPoint" [ref=e864] [cursor=pointer]:
                                  - /url: /action/downloadFigures?id=bse3750-fig-0006&partId=&doi=10.1002%2Fbse.3750
                                  - generic [ref=e865]: 
                                  - text: PowerPoint
                            - generic [ref=e866]: C-R-O chain of change.
                        - paragraph [ref=e867]: The first part of our framework, concerns, represents the anteceding factors in our chain of change, comprising the issue of resistance to the adoption/acceptance of EVs and the need for a multi-level resolution. This part of our conceptual model essentially underscores the point that the slower-than-anticipated diffusion of EVs, which is driven by several barriers, is not just a consumer phenomenon that requires resolution through resolute action at different levels. It reinforces the notion that EV adoption/non-adoption is not simply the case of consumers' lukewarm response to a disruptive innovation. Rather, several other dimensions and stakeholder groups play substantial roles in the entire dynamics.
                        - paragraph [ref=e868]: "The second part of the framework, a multi-pronged response, is its pivotal part, embodying the actors and actions required to overcome the anteceding concerns. The first set of actors includes manufacturers, who we envisage as initiators of change and responsible for taking the onus to turn things around. While our findings show that several actions are required on the part of manufacturers to spur EV sales; however, three actions stand out distinctly and require urgent response: (a) propelling technological advances to offer better models and customized variants and developing longer-life batteries with shorter charging times; (b) driving business model innovation to achieve revenue targets through a combination of low cost and best value strategies, maneuvering focus on product differentiation while keeping cost under control at all times; and (c) forming symbiotic associations through partnerships and joint ventures for funding, joint marketing, shared charging resources, the supply of raw materials, and shared technical expertise."
                        - paragraph [ref=e869]: The second set of actors includes governments, whom we envision as catalyzers of change, formulating policy guidelines to mandate the changes required to overcome resistance to EV adoption. We consider governments as catalysts since they have the power to facilitate changes in EV-related processes and policies without changing themselves. Our findings revealed the fulcral role that governments can play in shaping the entire EV ecosystem. However, of the several actions that governments can take to stimulate EV adoption, three that are likely to be the most effective are (a) issuance of legally enforceable policy mandates for EV use by government departments and, where possible, by the private sector; (b) fiscal incentives for both manufacturers and consumers from their respective perspectives (e.g., tax breaks for the manufacturers and subsidies for consumers); and (c) the visible creation of extensive infrastructure to overcome the fundamental EV usage apprehensions related to batteries and charging.
                        - paragraph [ref=e870]: "The third set of actors includes consumers, who hold the power to make or break any innovative offering through their resistive or supportive response. We posit consumers as acceptors of change, exhibiting overt motivation to adopt EVs. Herein, we envisage consumers as new-age citizens aware of their responsibility for the greater good without compromising their quality of life. We offer the following suggestions in this regard: (a) with EVs offering a technologically advanced mobility solution, consumers need to consciously condition themselves to overcome the inherent instinct of maintaining the status quo and finding reasons to resist change to EVs; (b) the focus on the environmental aspect of EVs is the key, so efforts should be made to engage consumers and motivate them to fully appreciate the immenseness of the climate challenge and how they can potentially make a significant difference through EV adoption; and (c) consumers need to cultivate a long-term perspective, trying to overcome their apprehensions about the initial cost of EV acquisition and related concerns to accept that EVs are not only an environmentally viable mobility solution but also an economically viable alternative to fossil-fuel-based vehicles."
                        - paragraph [ref=e871]: The third part of our framework, overarching outcomes, formalizes the idea that EVs are mobility game-changers since they are aligned with the ultimate outcomes being pursued globally. We split the overarching outcomes into immediate and anticipated outcomes to suggest that the transition to EVs offers the immediate benefit of reducing climate-changing emissions, which can aggregate over time to tangibly drive the achievement of national carbon neutrality targets.
                    - generic [ref=e872]:
                      - heading "6 CONCLUSION" [level=2] [ref=e873]
                      - paragraph [ref=e874]:
                        - text: Climate change is an unignorable truth resulting from increasing carbon emissions in the atmosphere. One of the main contributors to greenhouse gas emissions is the transport industry (Upadhyay et al.,
                        - link "2021" [ref=e876] [cursor=pointer]:
                          - /url: "#bse3750-bib-0124"
                        - text: ). Therefore, the electrification of the transportation sector is crucial for reducing carbon emissions, with EVs in passenger as well as commercial segments being considered a potentially effective and long-term mobility solution for transitioning away from fossil fuels. Academic research on EVs is voluminous and offers a multitude of perspectives (Asadi et al.,
                        - link "2021" [ref=e878] [cursor=pointer]:
                          - /url: "#bse3750-bib-0009"
                        - text: ; Rostad Sæther,
                        - link "2022" [ref=e880] [cursor=pointer]:
                          - /url: "#bse3750-bib-0101"
                        - text: ). The vast literature encompasses a variety of studies, with many based on primary data (e.g., Beak et al.,
                        - link "2020" [ref=e882] [cursor=pointer]:
                          - /url: "#bse3750-bib-0018"
                        - text: ; Decrinis et al.,
                        - link "2023" [ref=e884] [cursor=pointer]:
                          - /url: "#bse3750-bib-0039"
                        - text: ) offering a piecemeal analysis of issues (e.g., Bohnsack et al.,
                        - link "2020" [ref=e886] [cursor=pointer]:
                          - /url: "#bse3750-bib-0025"
                        - text: ; Cabigiosu,
                        - link "2022" [ref=e888] [cursor=pointer]:
                          - /url: "#bse3750-bib-0028"
                        - text: ; He et al.,
                        - link "2020" [ref=e890] [cursor=pointer]:
                          - /url: "#bse3750-bib-0057"
                        - text: ). A review of the literature, particularly of limitations and future research direction, confirms that despite being wide in breadth, the literature lacks wholesomeness. To elaborate, to our knowledge, there is no prior study offering a comprehensive analysis and 360° perspective of EV adoption. More specifically, the literature is completely devoid of the insights contained in popular media articles, which are high in volume, given the global and mass interest in EVs. These articles have highlighted many critical issues and initiated debates that provide valuable policy inputs for regulators. As a result, the knowledge contained in media discourse and discussions remains fragmented and dispersed. Motivated by the fact that media articles not only give facts but also influence their readers' beliefs through their content (Broadbent et al.,
                        - link "2021" [ref=e892] [cursor=pointer]:
                          - /url: "#bse3750-bib-0027"
                        - text: ; Yin,
                        - link "2018" [ref=e894] [cursor=pointer]:
                          - /url: "#bse3750-bib-0138"
                        - text: ), our study has used the CDA approach to inductively analyze the contents of 718 popular media articles published between January 2020 and July 2023. We executed the process by analyzing 1002 pages and 388,866 words, generating 16 axial codes from 2128 open codes. Given its comprehensive coverage, the study offers useful theoretical and practical insights, as discussed below.
                      - generic [ref=e895]:
                        - heading "6.1 Theoretical implications" [level=3] [ref=e896]
                        - paragraph [ref=e897]:
                          - text: "Our findings offer three theoretical insights: first, the study makes a tangible addition to the literature on EV adoption, which has so far offered almost singular insights on consumer behavior towards EVs that are based on the analysis of primary data (e.g., Globisch et al.,"
                          - link "2018" [ref=e899] [cursor=pointer]:
                            - /url: "#bse3750-bib-0050"
                          - text: ; Masiero et al.,
                          - link "2016" [ref=e901] [cursor=pointer]:
                            - /url: "#bse3750-bib-0077"
                          - text: ). While studies offering empirical comprehension of the given phenomenon through primary data—both quantitative and qualitative—enjoy popularity in the seminal and recent literature, the fundamental issues of bias and questionable universality of findings based on such data cannot be denied. In comparison, there are very few studies that have used sources other than self-report data to study EVs (e.g., Agusdinata & Liu,
                          - link "2023" [ref=e903] [cursor=pointer]:
                            - /url: "#bse3750-bib-0004"
                          - text: ; Debnath et al.,
                          - link "2021" [ref=e905] [cursor=pointer]:
                            - /url: "#bse3750-bib-0038"
                          - text: ). At the same time, the available studies have focused mainly on consumers, leaving other stakeholder groups under-explored in this context. Since past research on consumer behavior has demonstrated that consumers frequently fail to predict or anticipate the future trajectory of a particular technology during interviews (e.g., Hausman,
                          - link "2000" [ref=e907] [cursor=pointer]:
                            - /url: "#bse3750-bib-0056"
                          - text: ; Sahi et al.,
                          - link "2013" [ref=e909] [cursor=pointer]:
                            - /url: "#bse3750-bib-0104"
                          - text: ) or surveys (e.g., Crotts et al.,
                          - link "2008" [ref=e911] [cursor=pointer]:
                            - /url: "#bse3750-bib-0033"
                          - text: ; Singh et al.,
                          - link "2011" [ref=e913] [cursor=pointer]:
                            - /url: "#bse3750-bib-0115"
                          - text: ), the narrowness of research on EV adoption using secondary data constitutes a gap in knowledge. Our study remedies it by undertaking a content analysis of popular media articles and considering the multi-stakeholder perspective.
                        - paragraph [ref=e914]:
                          - text: Second, our findings deepen the understanding of EV adoption and diffusion to counterbalance the skew in the accumulated literature on EVs, which has predominantly concentrated on a limited set of variables or characteristics associated with adoption or acceptance (Das & Bhat,
                          - link "2022" [ref=e916] [cursor=pointer]:
                            - /url: "#bse3750-bib-0036"
                          - text: ; Liu et al.,
                          - link "2021" [ref=e918] [cursor=pointer]:
                            - /url: "#bse3750-bib-0076"
                          - text: ). Despite being rigorous, such a focused approach has created a gap in understanding, indicating a need for a more comprehensive assessment of facilitators and impediments, particularly since the product under consideration, EVs, has a substantial regulatory and policy connection. By covering all aspects of EV adoption in one space and drawing information from credible public sources, we present a valuable comprehensive picture that is unarguably useful for multiple stakeholders, including researchers planning to further examine the unfolding landscape.
                        - paragraph [ref=e919]:
                          - text: Finally, we make methodological contributions, both in terms of data sources and our data analysis approach. With regard to data sources, we collected data for analysis from online news media sources. This helps us capture the rich information offered by popular media, reinforcing the value of narrative analysis (Adams,
                          - link "2008" [ref=e921] [cursor=pointer]:
                            - /url: "#bse3750-bib-0001"
                          - text: ). At the same time, the information contained in popular media is considered a rational and critical presentation of the phenomenon under discussion (Schweinsberg et al.,
                          - link "2017" [ref=e923] [cursor=pointer]:
                            - /url: "#bse3750-bib-0108"
                          - text: ), which has allowed us to offer robust and authentic findings. With regard to data analysis, we utilized the novel method of CDA (Fairclough,
                          - link "1995" [ref=e925] [cursor=pointer]:
                            - /url: "#bse3750-bib-0044"
                          - text: ; Wodak & Meyer,
                          - link "2009" [ref=e927] [cursor=pointer]:
                            - /url: "#bse3750-bib-0131"
                          - text: ) along with the Gioia method (Gioia et al.,
                          - link "2012" [ref=e929] [cursor=pointer]:
                            - /url: "#bse3750-bib-0047"
                          - text: ) for analyzing the content through coding. Our choice of CDA has enabled us to critically consider the popular media discourse surrounding the adoption and diffusion of EVs, and our choice of the Gioia method has allowed us to present the media discourse through a robust data structure interpretation. Given the robustness of our process and the output that the clubbing of the two methods allowed us, future researchers can confidently use them in their respective research contexts.
                      - generic [ref=e930]:
                        - heading "6.2 Practical implications" [level=3] [ref=e931]
                        - paragraph [ref=e932]:
                          - text: "Our study offers three managerial implications: first, we provide a sound argument for why subsidies are important for the sector. Our findings indicate how the initial introduction of subsidies boosted the sector (PTI,"
                          - link "2023" [ref=e934] [cursor=pointer]:
                            - /url: "#bse3750-bib-0083"
                          - text: ; Trade Brains,
                          - link "2023" [ref=e936] [cursor=pointer]:
                            - /url: "#bse3750-bib-0120"
                          - text: ) and their withdrawal/delay has adversely impacted the adoption of EVs (Government move kill India's EV boom,
                          - link "2023" [ref=e938] [cursor=pointer]:
                            - /url: "#bse3750-bib-0052"
                          - text: ; Vadera,
                          - link "2023" [ref=e940] [cursor=pointer]:
                            - /url: "#bse3750-bib-0125"
                          - text: ). Consolidating evidence to show the criticality of subsidies is strategically important not only from the point of view of domestic policy direction but also because subsidies granted to EV manufacturers have taken a controversial turn internationally. Recently, the EU and China had a conflict in this regard (Blenkinsop,
                          - link "2023" [ref=e942] [cursor=pointer]:
                            - /url: "#bse3750-bib-0024"
                          - text: ). Discussion against subsidies and their effect internationally are also a part of the World Trade Organization agreement that calls for the disciplined use of subsidies (WTO,
                          - link "2022" [ref=e944] [cursor=pointer]:
                            - /url: "#bse3750-bib-0132"
                          - text: ).
                        - paragraph [ref=e945]:
                          - text: Second, our findings uncover the growing and pivotal role of start-ups in the sector, in all key activities, including EV manufacturing, charging, and battery swapping stations (Sharma,
                          - link "2023" [ref=e947] [cursor=pointer]:
                            - /url: "#bse3750-bib-0111"
                          - text: ; Singh,
                          - link "2023" [ref=e949] [cursor=pointer]:
                            - /url: "#bse3750-bib-0114"
                          - text: ). The involvement of start-ups can help make low-cost variants and energize the sector by unleashing disruptive innovations and introducing unique business models. Based on our findings, we recommend that the government formulate specific policies to nurture start-ups in the sector through (a) establishing special funding schemes, (b) designating a nodal government agency to support MOUs of start-ups with foreign companies for the supply of raw materials, funding, and the exchange of technology, (c) setting-up special purpose incubators for start-ups in the EV sector, and (d) formulating laws to protect the start-ups against the bigger players with large resources.
                        - paragraph [ref=e950]:
                          - text: Finally, we bring forth the buy-side concerns, which offer inputs for strategic planning by EV manufacturers and policy formulation by the government. The buy-side barriers reveal the resistance that consumers have towards EV adoption. By highlighting limited choices in the product range, customization possibilities, and long waiting times for vehicle delivery (Choudhury,
                          - link "2021" [ref=e952] [cursor=pointer]:
                            - /url: "#bse3750-bib-0031"
                          - text: ; Sachdev,
                          - link "2022" [ref=e954] [cursor=pointer]:
                            - /url: "#bse3750-bib-0103"
                          - text: ) as the key factors influencing consumers' resistance towards EVs, we provide actionable inputs to EV manufacturers to channel their R&D efforts and improve supply chain management. In fact, offering low booking–delivery time intervals can be a potential marketing strategy for manufacturers who are able to ensure production cycle efficiency to support a better speed to market. Operationalizing this strategy would also require them to have their supply chain models oriented to end-to-end efficiency, delivering the right value proposition in a timely manner. Our study also confirmed that consumers had concerns about the safety and reliability of the evolving EV technology, which impeded their EV adoption. We suggest that to address this barrier, manufacturers should not only initiate specific design improvements and rigorous testing and quality check procedures but also ensure that these measures are communicated to the consumers.
                        - paragraph [ref=e955]:
                          - text: Consumers' resistance also arises from inadequate charging infrastructure and the high cost of EVs (Dalvi,
                          - link "2023" [ref=e957] [cursor=pointer]:
                            - /url: "#bse3750-bib-0034"
                          - text: ; Kamath,
                          - link "2023" [ref=e959] [cursor=pointer]:
                            - /url: "#bse3750-bib-0064"
                          - text: ). Based on this finding, we suggest that policy efforts need to be more focused on instituting fiscal and non-fiscal measures that, on the one hand, enable manufacturers to lower the cost and, on the other hand, provide a frictionless boost to the charging infrastructure. Specifically, we suggest that charging infrastructure should be established through the public–private partnership model, which has been very effective in creating infrastructure such as roads, ports, and so on in the recent past.
                      - generic [ref=e960]:
                        - heading "6.3 Limitations and future research directions" [level=3] [ref=e961]
                        - paragraph [ref=e962]:
                          - text: The current study has three key limitations that pave the way for future research. First, the study is focused on India, which is a developing economy. In addition, it has a unique cultural and demographic profile that is different from even other developing countries, as noted by existing scholarship (e.g., Kaur et al.,
                          - link "2021" [ref=e964] [cursor=pointer]:
                            - /url: "#bse3750-bib-0065"
                          - text: ). As a result, the findings of our study are not easily generalizable. However, India-specific insights are in themselves universal in appeal, with India's shift to EVs giving many foreign car manufacturers a second chance after their traditional fossil fuel cars failed to gain market share in India. At the same time, while our study is currently restricted to India, however, future research can expand the scope by evaluating EV adoption in other developing countries and identifying similarities and differences among them.
                        - paragraph [ref=e965]:
                          - text: Second, although popular media articles present an authentic and easily verifiable source of data, the review of such articles is a relatively new phenomenon, which is still being debated by scholars for its usefulness from an academic perspective. However, popular media is well-acknowledged for its rational and critical presentation and accessibility (Piselli et al.,
                          - link "2022" [ref=e967] [cursor=pointer]:
                            - /url: "#bse3750-bib-0092"
                          - text: ; Schweinsberg et al.,
                          - link "2017" [ref=e969] [cursor=pointer]:
                            - /url: "#bse3750-bib-0108"
                          - text: ). Future studies can make methodological contributions by further delving into the usefulness and suitability of such data for products like EVs that are more than just a mobility solution.
                        - paragraph [ref=e970]: Finally, the coding process was undertaken manually by researchers. It is quite possible that due to inadvertent human error or differences in perception, there might be some loss of information. It is also possible that the coding might reflect the researchers' bias, leading to a skewed interpretation and choice of data. However, the risk of such an error is low since we followed all stringent processes recommended for coding data in inductive content analysis.
                        - paragraph [ref=e971]: To conclude, its limitations notwithstanding, the current study provides valuable insights into the evolving interplay between the enablers and impediments that influence the adoption and diffusion of EVs, thereby shaping the entire EV ecosystem. The results of this study emphasize the importance of addressing these factors to expedite the shift towards sustainable transportation and accomplish the ambitious objectives of decreasing greenhouse gas emissions and improving energy self-sufficiency.
