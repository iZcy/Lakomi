                      - paragraph [ref=e316]:
                        - text: Companies associated with crypto exchanges soon became the dominant block producers. Crypto exchanges, which have custody over vast amounts of user cryptocurrency, can vote the tokens of users who do not care to vote. Voting patterns of major exchanges suggested collusive behavior.
                        - link "Note" [ref=e317] [cursor=pointer]:
                          - /url: "#corg70008-note-0015_35"
                          - superscript [ref=e318]: "14"
                        - text: For example, voting data reveal that the top two block producers at the end of the sample in Figure
                        - link "1" [ref=e319] [cursor=pointer]:
                          - /url: "#corg70008-fig-0001"
                        - text: (March 2020) were Newdex (a “decentralized exchange” running on EOS) and OkEx (a large “traditional” crypto exchange). The data show that 90% of Newdex votes went to OkEx and 95% of OkEx votes went to Newdex.
                      - paragraph [ref=e320]: "While EOS still operates, it never fulfilled its initial promise. Crypto enthusiasts will undoubtedly blame flaws in EOS's original governance design. But this misses the deeper point: blockchain governance inevitably depends on off-chain power structures—from conference calls among block producers to exchanges controlling user votes. The case of EOS illustrates that clever on-chain mechanism design is typically no match for the realities of off-chain politics."
                    - generic [ref=e321]:
                      - heading "7 Conclusion" [level=2] [ref=e322]
                      - paragraph [ref=e323]: Despite their failures to deliver on often utopian promises, blockchains remain valuable as governance experiments. They are attempting to solve real problems—reducing transaction costs, eliminating rent-seeking intermediaries, and enabling new forms of organization. Their failures are as instructive as their successes would have been.
                      - paragraph [ref=e324]: "I have argued that blockchains face the same fundamental governance challenges as traditional organizations: collective action problems, principal-agent conflicts, and centralizing tendencies. Cryptography cannot solve these problems any more than constitutions or corporate charters can. They require ongoing negotiation among stakeholders with divergent interests—the very human element that blockchain technology was supposed to eliminate."
                      - paragraph [ref=e325]: "Governance scholars have much to contribute to understanding these systems. Models of voting, contracting, and competition developed for traditional settings can be applied to blockchain contexts. One advantage for researchers is that blockchain governance happens largely in public, providing unprecedented data for empirical study. Every vote, every protocol change, every fork is recorded on-chain or documented in public forums. Yet this transparency has limits: backroom deals, private communications among core developers, and corporate influence often remain hidden."
                      - paragraph [ref=e326]: "The stark reality of crypto governance is the contradiction between the democratic ideals these systems promise and the technocratic structures they embody. Despite claims of decentralization, blockchains remain dependent on small groups of technical elites—core developers who control protocol implementation, mining pools that dominate block production, and foundations that coordinate development. These actors often overlap with traditional corporate structures: hardware manufacturers frequently own mining pools, and for-profit companies fund developers."
                      - paragraph [ref=e327]: As in corporate governance, the mechanisms meant to empower blockchain stakeholders are imperfect. Exit options—the ability to fork or switch chains—are constrained by network effects and coordination failures that make collective action nearly impossible. Voice mechanisms—such as improvement proposals and on-chain voting—suffer from the same participation problems that plague direct democracy, with the added burden of technical complexity that excludes most users from meaningful participation. Token-based voting has devolved into plutocracy, where large holders dictate outcomes while small holders remain rationally apathetic.
                      - paragraph [ref=e328]: "Rather than revolutionary new forms of organization, blockchains have evolved to resemble traditional corporate structures with their own barriers to entry, concentration of power, and reliance on off-chain coordination. Yet this parallel offers opportunity: the extensive literature on corporate governance can illuminate both the failures we observe and potential remedies. The tools developed to analyze board capture, shareholder activism, and regulatory oversight can be adapted to study developer influence, token holder governance, and protocol evolution."
                      - paragraph [ref=e329]: Ultimately, blockchains should be understood not as finished governance solutions but as ongoing experiments—messy, imperfect laboratories that may yet yield valuable lessons for both digital and traditional governance systems. Their value lies not in having solved governance problems but in making them explicit and observable. By stripping away the institutional infrastructure we take for granted, blockchains reveal the fundamental challenges that all governance systems must address. Technology alone cannot solve these challenges, but studying attempts to do so may deepen our understanding of governance itself.
