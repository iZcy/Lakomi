          - generic [ref=e156]:
            - generic [ref=e158]:
              - generic [ref=e159]: "Issue Section:"
              - link "Introduction" [ref=e160] [cursor=pointer]:
                - /url: /policyandsociety/search-results?f_TocHeadingTitleList=Introduction
            - paragraph [ref=e161]:
              - text: Blockchain is a new, emerging technology that is expected to have deep and “disruptive” effects on our economies and societies. It offers a new paradigm for the way in which information is registered, stored, and transacted. Blockchain is actually only one example of distributed ledger technology, which constitutes a physically decentralized and secure database, in the sense data are not held in one central site, rather they are held and updated simultaneously across several sites, theoretically making it more difficult to hack (
              - link "Weiss and Biermann, 2020" [ref=e162] [cursor=pointer]:
                - /url: javascript:;
              - text: ). Blockchain allows generated information to be stored in “blocks,” each of which is “stamped” and linked to the previous one, creating an unchangeable record of transactions (
              - link "Cagigas et al., 2021" [ref=e163] [cursor=pointer]:
                - /url: javascript:;
              - text: ). The process is conducted and verified via a predefined network protocol or “consensus mechanism” that specifies how the system is ruled. This permissions architecture can be used to determine whether, and to what extent, the blockchain itself will be largely left under the control of a centralized entity or authority or whether access and control of the blockchain will be shared among all those interested in participating. For example, depending on the permissions granted, participation in the verification process can be open and free or restricted to a group of users. In addition, the information registered in the blockchain can be more or less openly shared. At the most general level, then, blockchains are secure, immutable, anonymous, and decentralized digital records (or ledgers) of user-verified digital transactions.
            - paragraph [ref=e164]:
              - text: The first well-known blockchain product to emerge was Bitcoin, in 2008, which utilizes the technology for its most familiar usage—“cryptocurrency.” Today, there are thousands of cryptocurrencies that have been launched with different degrees of success.
              - link "1" [ref=e165] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e166]: "1"
              - text: Since cryptocurrency became well known, there has been a second spike in public consciousness about blockchain around non-fungible tokens (NFTs), where one-of-a-kind digital assets are bought and sold every day. These NFTs can be as trivial as a “signed Tweet,” one of which was sold via auction in March 2021 for almost US$3 million.
              - link "2" [ref=e167] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e168]: "2"
              - text: Yet, only 1 year later, the same product was put up for sale again, the highest bid being only US$280, inevitably questioning its intrinsic price.
              - link "3" [ref=e169] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e170]: "3"
              - text: As a result, blockchain is sometimes associated with crypto-criminality, money laundering, or questionable frivolities in the digital art market.
            - paragraph [ref=e171]:
              - text: "Despite these better-known commercial applications, blockchain can also be applied to the public sphere: government, public policy, and public services. Indeed, in recent years, governments and international organizations around the world have started to deploy blockchain in a growing number of services, including digital identity management, health, food and agriculture, land registry, public procurement, defense, aviation, value chains, logistics, and more."
              - link "4" [ref=e172] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e173]: "4"
            - paragraph [ref=e174]:
              - text: So, while the early hype and possibilities of blockchain were grossly inflated (
              - link "Tapscott & Tapscott, 2016" [ref=e175] [cursor=pointer]:
                - /url: javascript:;
              - text: ) and the “blockchain revolution” is still to come in the way that the portable computing, the internet, and cell phones did, there are significant implications to the technology, both as a target and as a tool of public policy and indeed as a possible new form of governance (
              - link "Campbell-Verduyn, 2018" [ref=e176] [cursor=pointer]:
                - /url: javascript:;
              - text: ). Among these implications are higher-order questions on the nature of money, law, and democracy—and even the state itself (
              - link "Atzori, 2015" [ref=e177] [cursor=pointer]:
                - /url: javascript:;
              - text: ). Cryptocurrencies such as Bitcoin have been issued outside of the traditional financial sector and have become a means of financial exchange and wealth-storage beyond the reach of governments—and among their more radical proponents, that is a feature, not a bug. Hence, states are already examining the issue of regulating cryptocurrencies not only because of their potential for being used in illegal transactions and money laundering but also for their potential threat to financial stability (
              - link "FSB, 2021" [ref=e178] [cursor=pointer]:
                - /url: javascript:;
              - text: "). It may be attractive too for financial interests to “tame” crypto and turn it into just another investment vehicle. The implications for the nature of law were first forcefully put forward by Lawrence Lessig: “code is law” ("
              - link "Lessig, 1999" [ref=e179] [cursor=pointer]:
                - /url: javascript:;
              - text: ","
              - link "2006" [ref=e180] [cursor=pointer]:
                - /url: javascript:;
              - text: ). This refers to a species of “algorithmic governance” where the routines and assumptions embedded in computer codes “govern” human behavior (
              - link "Noble, 2018" [ref=e181] [cursor=pointer]:
                - /url: javascript:;
              - text: ;
              - link "Pasquale, 2015" [ref=e182] [cursor=pointer]:
                - /url: javascript:;
              - text: ). More importantly, the code, for example, in the form of a smart contract, can trump the “law” in the sense of legislation or rules determined by state authorities. For example, remote services can be contracted in one part of the world, paid for through an app such as
              - emphasis [ref=e183]: Satoshipay
              - text: ", and governed by a smart contract. The legal and taxation regimes within which those contracting parties reside become irrelevant. In both the arch-examples of currency and law, we see the potentially radical disintermediation that is either lamented or celebrated by promotors of blockchain technologies."
            - paragraph [ref=e184]:
              - text: Blockchain can go further and deeper in upending our conventional concepts of democracy and the state. For example, for most purposes, government-issued ID (passports, driver’s licenses, and birth certificates) are considered the foundation of one’s formal and legal identity. Indeed, a pioneer public case is currently being developed in the European Union (EU) within the realm of self-sovereign identity (SSI), namely the European Self-Sovereign Identity Framework (ESSIF).
              - link "5" [ref=e185] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e186]: "5"
              - text: "Moreover, there are also private initiatives: through"
              - emphasis [ref=e187]: Blockchain Helix
              - text: ", people can establish digital identities that give them an immutable record of who they are. The “national” passport could be eclipsed by the digital ID, which can then be used for borderless transactions. The point of these innovations is sometimes difficult to grasp since they seem to be only “added layers” to existing, secure, and accepted forms of ID. All current forms of ID can be counterfeited, hence the lengths that governments go to protect the security, for example, of a passport. We can see the problem more clearly in the case of academic or professional credentials. As labor markets go global, the barriers to “proving” one’s university or training qualifications (e.g., degrees, certificates, and CVs) rise considerably with requirements for attestation from various “official” bodies. Blockchain potentially upends this. The upending is moderate, a mere tilt, if governments (e.g., the ESSIF above) build the blockchain architecture. The upending is radical if individuals no longer need government and if their digital ID is blockchain-solid and accepted anywhere. The digital ID would supplant the government passport or other state-sanctioned ID. The current value of “citizenship” would be further debased."
            - paragraph [ref=e188]:
              - text: Another example is governance processes, in both private and public spheres. The
              - emphasis [ref=e189]: LiquidFeedback
              - text: platform promises a “unique democracy software” to promote self-organization of units as small as an association or company or as large as municipalities.
              - emphasis [ref=e190]: Bitnation
              - text: goes further still and promises “a blockchain jurisdiction in which communities can be built, contracts made, disputes resolved, and agreements positively enforced through reputation. Within this jurisdiction, governance services such as peer-to-peer security, insurance and education can be accessed via third-party dapps.” You can even start your own “nation” if you like. Of course, this seems absurd—until we interrogate the core functionalities of the modern nation-state and consequently of “citizenship.” A contract between two parties who reside in the same “jurisdiction” is subject to adjudication and enforcement by that jurisdiction. When the parties are from different jurisdictions, the contract usually specifies which of the legal frameworks govern the agreement. Alternatively, there are provisions in international commercial law or treaties that will govern such agreements. Once again, blockchain upends this. A contract between parties in Montreal and Mumbai can be forged in blockchain, with its own self-executing provisions that have nothing to do with the jurisdictions within which the parties reside.
            - paragraph [ref=e191]:
              - text: Some analysts believe blockchain has libertarian and autarkic disintermediation in its DNA,
              - link "6" [ref=e192] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e193]: "6"
              - text: but this has not stopped some governments from embracing the technology as the “next big thing” in governance and policy platforms; Dubai, for example, has a blockchain strategy that it claims will make it the “happiest city on earth.”
              - link "7" [ref=e194] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e195]: "7"
              - text: This is part of the United Arab Emirates (UAE) Emirates Blockchain Strategy 2021, which aims to transform 50% of government transactions to blockchain.
              - link "8" [ref=e196] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e197]: "8"
              - text: Its plan comprises a national system built around a unique digital ID for each citizen/resident, which they can then use to access government documents and services. The EU has a blockchain strategy, which includes the European Blockchain Services Infrastructure that is a joint effort of the EU states, Norway, Liechtenstein, and the European Commission.
              - link "9" [ref=e198] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e199]: "9"
              - text: "The overarching intent is to provide “legal certainty” and avoid “regulatory fragmentation.” Estonia has been the pioneer in digital governance, embracing e-government as early as 1997. It was the first government to use blockchain technology in 2012 with its Succession Registry, maintained by the Ministry of Justice. The blockchain platform now includes the following registries: health care, property, business, succession, digital court system, surveillance tracking information system: official state announcements, and the state gazette."
            - paragraph [ref=e200]:
              - text: Anarchists, drug cartels,
              - link "10" [ref=e201] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e202]: "10"
              - text: financial institutions, and some governments (from the Baltics to Arab emirates) have embraced blockchain, but the policy research community is alarmingly late to the party. Debate and analysis on blockchain have been dominated by computing science and fintech, and more recently by legal scholars, even though the implications for policy science and public policy are potentially staggering. Even if we think of the implications only in terms of blockchain as a “tool” (something to be used in the delivery of public services) for public policy or as a “target” (threats to be managed), the list of services that could be disrupted by blockchain is significant.
            - paragraph [ref=e203]:
              - text: "It is only in the recent period that the lack of attention to blockchain from the policy research community has started to change. This attention to blockchain can be quantified: a systematic review of the academic literature on blockchain in the public sector shows a sharp increase from 2015 onward ("
              - link "Cagigas et al., 2021" [ref=e204] [cursor=pointer]:
                - /url: javascript:;
              - text: ). In parallel, there has been a significant increase in the number of policy documents on blockchain produced by international policy organizations, including the EU,
              - link "11" [ref=e205] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e206]: "11"
              - text: the OECD,
              - link "12" [ref=e207] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e208]: "12"
              - text: the United Nations (United Nations International Children’s Emergency Fund (UNICEF), United Nations Development Programme (UNDP), and UNWOMAN), and the World Bank.
              - link "13" [ref=e209] [cursor=pointer]:
                - /url: javascript:;
                - superscript [ref=e210]: "13"
            - paragraph [ref=e211]: "From the perspective of government and policy, blockchain is being used as a tool, for example, in the following activities:"
            - list [ref=e212]:
              - listitem [ref=e213]:
                - paragraph [ref=e214]: Record-keeping (health records, land registries, and vehicle registration); identity attestation (passports, ID cards, birth certificates, marriage, and divorce)
              - listitem [ref=e215]:
                - paragraph [ref=e216]:
                  - text: Payments and remittances (
                  - link "Rodima‐Taylor & Grimes, 2019" [ref=e217] [cursor=pointer]:
                    - /url: javascript:;
                  - text: )
              - listitem [ref=e218]:
                - paragraph [ref=e219]:
                  - text: Central Bank Digital Currencies, mostly known by their acronym CBDCs (although very few are currently considering using blockchain in their final pilots
                  - link "14" [ref=e220] [cursor=pointer]:
                    - /url: javascript:;
                    - superscript [ref=e221]: "14"
                  - text: )
              - listitem [ref=e222]:
                - paragraph [ref=e223]: Secure and transparent delivery of cash benefits and tokens
              - listitem [ref=e224]:
                - paragraph [ref=e225]: Smart contracts
              - listitem [ref=e226]:
                - paragraph [ref=e227]: Supply chain management (tracking)
              - listitem [ref=e228]:
                - paragraph [ref=e229]:
                  - text: Traceability systems (food safety and conflict minerals) (
                  - link "Muirhead & Porter, 2019" [ref=e230] [cursor=pointer]:
                    - /url: javascript:;
                  - text: )
              - listitem [ref=e231]:
                - paragraph [ref=e232]: Insurance contracts
            - paragraph [ref=e233]: "And, as regards policy targets (threats) associated with blockchain, the following lead the concern:"
            - list [ref=e234]:
              - listitem [ref=e235]:
                - paragraph [ref=e236]: Money laundering (e.g., Financial Action Task Force)
              - listitem [ref=e237]:
                - paragraph [ref=e238]: Financial services regulation (and experimentation)
              - listitem [ref=e239]:
                - paragraph [ref=e240]: Carbon footprint of cryptocurrency “mining”
              - listitem [ref=e241]:
                - paragraph [ref=e242]: Cyber-threats and cyber-warfare
              - listitem [ref=e243]:
                - paragraph [ref=e244]: Tax evasion
            - paragraph [ref=e245]: It is now timely to bring together a collection of articles by leading international experts that focus on what blockchain might mean for the economy and society, the regulatory dilemmas it presents, and possible policy solutions. The articles selected for this special issue all focus on core characteristics or promises of blockchain technology from a societal perspective and contemplate the regulatory challenges and dilemmas therein. For example, at the most generic level, blockchain technology is expected to be disruptive, meaning it is expected that, after initially taking root in simple, specific applications, it will increasingly replace previous technologies and bring about profound changes in the ways in which processes are completed, bringing about increased efficiencies and greater transparency and data security. However, these potential advantages must be considered alongside blockchain’s high-energy consumption needs, processing speed and cost. Blockchain thus presents trade-off dilemmas for policymakers seeking to promote economic growth, innovation, and sustainability. At higher and more abstract levels, we should also contemplate the potential impact of blockchain on our received notions of state sovereignty, citizenship, and governance.
            - paragraph [ref=e246]:
              - text: A key question for policymakers today is how can and should blockchain be regulated?
              - link "De Filippi et al. (2022)" [ref=e247] [cursor=pointer]:
                - /url: javascript:;
              - text: pose the question of how policy can be designed to regulate and legalize a technology like blockchain that is “alegal” by design. The public, permissionless version of blockchain was explicitly designed to be decentralized, anonymous, and beyond the control of government. Some of the uses to which it was consequently put were clearly illegal, but many are “alegal” in the sense that they are simply beyond the scope of government to regulate or even “see” and have a self-regulatory, non-state bounded character of simple facticity. Blockchain is neither legal nor illegal, it just is or at least it “just was” in the moment of its creation/design by Satoshi Nakamoto (possibly a person, possibly a pseudonym). It was a completely new economic and payment system that had not existed before and thus was beyond law. The article shows, with a brief example of the attack on The DAO (a decentralized investment fund deployed as a smart contract on Ethereum in 2016), how far beyond normal legal or governmental interventions it was. However, policymakers are not entirely impotent—they can still regulate intermediaries, commercial operators, or mining pools and establish arbitration regimes, and indeed governments in the USA and in Europe have imposed anti-money laundering regulations and blacklists.
              - link "De Filippi et al. (2022)" [ref=e248] [cursor=pointer]:
                - /url: javascript:;
              - text: register the limits of these approaches and instead argue for the creation of “regulatory sandboxes” (already used by the financial industry) that would permit experimentation leading toward functional and regulatory equivalence and thereby justifying “exemptions” from standard regulatory burdens that nonetheless would still ensure regulatory consistency.
            - paragraph [ref=e249]:
              - text: The article by
              - link "Bodó and Janssen (2022)" [ref=e250] [cursor=pointer]:
                - /url: javascript:;
              - text: "focuses on another core question to scholars of policy and public administration: trust. Decentralized technologies, SSI systems, distributed ledger technology, and other blockchain-based systems are said to be “trust-minimizing” technical infrastructures. Their trustworthiness is based on specific technical and design properties, such as decentralization, immutability, and strong cryptography, rather than regulation, impeccable governance, or conventional transparency and accountability. Public institutions generally enjoy reasonable levels of trust, and even if they are not fully trusted, they are embedded in complex frameworks that support their trustworthiness: they are subject to laws, public scrutiny, their decisions can be challenged, and so on ("
              - link "Van de Walle & Migchelbrink, 2022" [ref=e251] [cursor=pointer]:
                - /url: javascript:;
              - text: ). The deployment of trust-minimizing technologies in high-trust/high-trustworthiness contexts may contribute to more trustworthy public services but also threatens to disrupt such high-trust environments with a trust-minimizing technology that paradoxically undermines generalized trust in favor of digital security.
              - link "Bodó and Janssen (2022)" [ref=e252] [cursor=pointer]:
                - /url: javascript:;
              - text: "focus on the following questions: How can high-trust public institutions implement trust-minimizing infrastructures? In the case of low-trust institutions, what is the preferable way forward: replacing distrusted public entities with trust-minimizing technologies or improving their trustworthiness? Should we implement a trust-minimizing architecture or a trust-maximizing one? The authors explore the use of potentially untrustworthy (private) technological systems—including blockchain-based systems—in the public sector and how this may affect trust in government. They then propose several policy options with a view to protect trust in government even if some of the technological components used to do so prove fundamentally untrustworthy."
            - paragraph [ref=e253]:
              - link "Benchaya Gans et al. (2022)" [ref=e254] [cursor=pointer]:
                - /url: javascript:;
              - text: examine the potential of blockchain to enable SSIs. Traditionally, governments and companies rely on stored data (e.g., photo, birth certificate, fingerprint, and retina scan) to identify persons for service provision. Indeed, this is a core role of the state itself. The rise of SSIs based on blockchain technologies is potentially disruptive. SSIs provide individuals with ownership and control over their personal data and allow them to share their data with others using a sort of “digital safe.” Fundamentally, people can exert sole ownership of their identity data and control when and how it is shared, protecting their privacy. As these data need to be validated to be trusted, they may become a more important data source for digital information sharing and transactions than the formal source of identity controlled by governments. Furthermore, SSIs can be used for interacting digitally with any organization. These developments may potentially change the relationship between government, companies, and individuals.
              - link "Benchaya Gans et al. (2022)" [ref=e255] [cursor=pointer]:
                - /url: javascript:;
              - text: explore information sharing and governance in the digital society using blockchain-based SSIs. In addition, the impact of SSIs on data storage in the digital world is assessed. They find that technology enactment might result in no greater control or privacy and might in the end only reinforce current practices. Finally, the authors argue that regulation and a combination of centralized and decentralized governance are still required to avoid misuse and ensure that the envisaged benefits of blockchain-based SSIs are realized.
            - paragraph [ref=e256]:
              - text: Blockchain cannot be introduced into the public sector unless its workers accept it. The article by
              - link "Cagigas et al. (2022)" [ref=e257] [cursor=pointer]:
                - /url: javascript:;
              - text: examines the impact of blockchain on, and reception by, public sector workers. Public bureaucracies, whatever their rhetoric on digital services and e-government, may well avoid embracing disruption. Consequently, the implementation of blockchain in the public sector will depend to some degree on the support by public servants themselves, especially in those cases where the technology might reduce their power and discretion.
              - link "Cagigas et al. (2022)" [ref=e258] [cursor=pointer]:
                - /url: javascript:;
              - text: conduct a vignette experiment on the introduction of blockchain for a digital identity in providing local public services, positing different configurations around a blockchain that is more or less “open” (in the sense of openness to being able to “read” and “write” on the blockchain). The literature shows that public servants can have a mix of positive or negative attitudes toward the introduction of blockchain, depending on efficiency, service, impact on public sector jobs, and discretion, among other things. The article hypothesizes greater acceptance of blockchain by public servants, the more public the blockchain configuration is (more open and permissionless input and access to information on the public ledger). The results of the survey of “vignettes” (scenarios of configurations) of nearly 150 public officials in the City of Santander, Spain, show that a blockchain with “public write” mechanisms (any user can validate system registration processes) generates a higher level of acceptance, while “public read” (any user can see information in the system) has no demonstrable effect, possibly because the benefits of transparency are neutralized by the possibility of criticism of public servants themselves.
            - paragraph [ref=e259]:
              - text: A trio of articles examines blockchain in context, in the real world, and at different jurisdictional levels (international, national, and local). Blockchain technologies are increasingly being taken up by international organizations and becoming a feature of global policy making.
              - link "Dimitropoulos (2022)" [ref=e260] [cursor=pointer]:
                - /url: javascript:;
              - text: argues that the use of blockchain by international organizations poses important questions in international law and the conventional conduct of foreign policy. In these cases, while blockchain has output and substantive legitimacy, it lacks traditional input and procedural legitimacy. The article focuses on the primary use of blockchain by international organizations such as UN entities in the humanitarian sector. The two most important public sector applications are identity management and attestation and the keeping of government records. For example, refugees are often forced to flee their countries without documents attesting to their identity (e.g., passports and other valid travel documents). The UN Convention and Protocol Relating to the Status of Refugees permits the High Commissioner for Refugees to manage crucial data on personal identification. It is estimated that over 1 billion individuals lack official identity documents and blockchain can be one tool to create secure digital identities, which can then in turn be used to establish individual accounts for cash entitlements in refugee camps.
              - link "Dimitropoulos (2022)" [ref=e261] [cursor=pointer]:
                - /url: javascript:;
              - text: provides other examples from the economic realm, such as the World Bank’s Blockchain Lab, Bond-
              - emphasis [ref=e262]: I
              - text: (first-ever blockchain-based bond). All of these examples are one of “code” that regulates behavior and, as such, creates a new kind of legal system, putting international organizations “in the position of lawmakers in the world of crypto.” As lawmakers, international organizations cease to become entirely the creatures of their member states and begin to develop greater independence. The relative autonomy of transnational administration has long been considered an important feature of global policy making, but that autonomy always fell short of actually creating law, as opposed to regulations and standards. Blockchain may change that.
            - paragraph [ref=e263]:
              - text: The article by
              - link "Semenzin and Hassan (2022)" [ref=e264] [cursor=pointer]:
                - /url: javascript:;
              - text: examines a country where according at least to the hype is advancing quickly toward implementing blockchain. Estonia is perceived to have embraced blockchain early and with enthusiasm, after having built the first national integrated blockchain infrastructure. They examine the blockchain tools that have been built by the Estonian government to date and why. They also inquire as to whether these blockchain projects really reflect the original promises of disruption associated with claims by blockchain proponents. They use qualitative approaches to explore several blockchain projects to examine the narratives that have emerged in Estonia. They argue concepts associated with blockchain—transparency, trust, and decentralization—are deeply contested and used by different parties to mean different things. They find that the ways in which blockchain is configured and implemented are leading toward a reinforcement of centralization of practices, even though this is described using the rhetoric of decentralization. Moreover, the concepts of transparency and trust—which could be interpreted in a variety of ways—are often used in a narrow sense, as a synonym of data privacy. They conclude that the implementation of blockchain constitutes a power struggle with efforts being taken to ensure blockchain does not disrupt existing power structures in practice, even while the rhetoric around blockchain implementation suggests it is bringing about societal disruption.
            - paragraph [ref=e265]:
              - text: Blockchain has the disruptive potential to exploit and enhance the attitudes of people to participate in common causes. Local institutions can leverage this technology to support innovative forms of public–civic coproduction of services and of citizens’ self-organization initiatives. In their article,
              - link "Viano et al. (2022)" [ref=e266] [cursor=pointer]:
                - /url: javascript:;
              - text: evaluate CommonsHood, a wallet app, which uses blockchain as a tool to enhance financial inclusion and render the local economy more sustainable. It attempts to do so through a tokenization method, which allows residents to create new kinds of cryptographic tokens on the blockchain in order to digitalize assets, augment the availability of local liquidity, and incentivize cooperative socioeconomic interactions. In particular, the authors analyze a specific application of CommonsHood to innovate development policies and service coproduction in the tourism sector. Linder’s analytical framework for information and communications technology and coproduction is used. In conclusion, the authors point out some advantages of CommonsHood as regards policies on tourism development. As this paper examines an initial pilot of blockchain, lessons that can be learned in a new reiteration of the blockchain application are listed toward further refinement and improvement. For example, initial evidence provided by the authors demonstrates that citizens were open to exploring co-creation models and new technologies. However, some concern was detected among citizens about using a digital wallet, especially among older members of the population. In addition, resistance can be detected on the part of public sector workers, who require training and support.
            - paragraph [ref=e267]:
              - text: The articles in this special issue provide arresting insights on blockchain and some of its implications for policy, society, and governance. But the digital train has long left the station, and policy and public administration scholarship is just catching up with legal and computing science research, not to mention the practitioners already experimenting with digital identities, services, and regulation. And beyond the gates of academe and bureaucracy are the restless and the rebellious. Blockchain is
              - emphasis [ref=e268]: designed
              - text: to be disruptive. It is
              - emphasis [ref=e269]: designed
              - text: to create and nourish decentralized, autonomous, and non-state entities and systems. For the anarchists and crypto-enthusiasts, not to mention money launderers and terrorists, blockchain promises an escape from the shadow of the state. In this sense, blockchain is both a policy question and a political struggle. Our scholarship needs to be up to the challenge.
            - paragraph [ref=e270]: It is clear blockchain is a force to be reckoned with and of key interest to public policy and public administration scholars. We hope these papers provide a first glimpse into a deeper understanding of the potential benefits, costs, and risks and even danger of blockchain in the public sector and urge scholars in this field to engage.
