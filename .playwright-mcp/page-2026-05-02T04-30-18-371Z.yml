                    - generic [ref=e656]: "530 ♦ malavika nair and Daniel Sutter More important, blockchain technology could become the seamless em bedded economic layer the Web has never had, serving as the technological underlay for payments, decentralized exchange, token earning and spending, digital asset invocation and transfer, and smart contract issuance and exe cution. Bitcoin and blockchain technology, as a mode of decentralization, could be the next major disruptive technology and worldwide computing paradigm (following the mainframe, PC, Internet, and social networking/ mobile phones), with the potential for reconfiguring all human activity as pervasively as did the Web. (2015, vii) In this paper, we offer a framework for evaluating and integrating the various different consequences and impacts of the blockchain for the economy. We apply the public-goods argument for government and a comparative institutional approach to assess the government's and the voluntary sector's ability to produce different individual public goods. The public-goods argument holds that government provision (via taxes and regulation) will be frequently chosen given the limitations of voluntary provision— namely, the free-rider problem. In a comparative institutional framework, however, the imperfections of government must be compared against the effectiveness of voluntary mechanisms. People's willingness to contribute voluntarily to public goods and various mechanisms' ability to convert willingness into effective provision have been labeled \"cooperative efficacy\" (Cowen and Sutter 1999). We interpret the blockchain as a technological innovation that has the potential to increase cooperative efficacy significantly and consequently to reduce the size and scope of government. Toward this end, we provide examples of already existing and potential applications of the blockchain that illustrate cases of increasing voluntary cooperation outside of government-provided public goods. Specifically, we identify three mecha nisms stemming from technological properties of the blockchain that help create trust between potential trading partners by replacing the need for a third-party watcher or enforcer of rules: a publicly verifiable ledger, open entry, and decentralization of power through a widely distributed mining network as well as the open-source nature of the underlying code. The blockchain thus allows the creation of trust without the need for a concrete third-party watcher who has vested authority and impartiality that the potential traders must trust. We do not discuss the factors affecting whether the scope of governments will actually expand or contract. Blockchain innovations will reduce the need for gov ernment to provide certain public goods or types of regulation on behalf of citizens, but this does not mean that the scope of government will immediately shrink. Entrenched interests benefiting from government provision or the regulatory status quo could conceivably block privatization or deregulation regardless of the blockchain's potential. The blockchain does, however, offer significant potential for de facto or unauthorized privatization of current government activities, as perhaps best illustrated by the potential for Bitcoin or another cryptocurrency to serve as a medium of exchange without The independent review 530 ♦ malavika nair and Daniel Sutter More important, blockchain technology could become the seamless em bedded economic layer the Web has never had, serving as the technological underlay for payments, decentralized exchange, token earning and spending, digital asset invocation and transfer, and smart contract issuance and exe cution. Bitcoin and blockchain technology, as a mode of decentralization, could be the next major disruptive technology and worldwide computing paradigm (following the mainframe, PC, Internet, and social networking/ mobile phones), with the potential for reconfiguring all human activity as pervasively 