                    - generic [ref=e652]: The Blockchain and Increasing Cooperative Efficacy MA LA VI KA NAIR AND DANIEL SUTTER Bitcoin is a cryptocurrency based on open-source software created by the pseudonymous Satoshi Nakamoto in 2009. The Bitcoin currency has attracted considerable attention, first among computer scientists and later among businesspeople and the general public. It is being accepted by an increasing number of merchants worldwide; the current market price of Bitcoins is now widely available; and thousands of people worldwide used more than 1.46 terawatt hours of electricity in Bitcoin mining in 2015. Economists have noted the potential tor Bitcoin or perhaps a rival cryptocurrency to supplement or even displace fiat currencies. Regulators and policy makers have taken note as well, sometimes responding with regulations not well informed by the realities of Bitcoin (Brito and Castillo 2016). The Bitcoin payment system is based on the blockchain, a permanent record of all transactions maintained on users' computers. The blockchain is a distributed ledger that not only allows the Bitcoin payment system to operate but also opens possibilities for new forms of contracting and cooperation. Tech writers, bloggers, private corporations, government organizations, and economists have begun to notice the economic im plications of the blockchain, recognizing that it may far exceed that of Bitcoin itself. As Melanie Swan points out, Malavika Nair is assistant professor at the Manuel H. Johnson Center of Political Economy, Troy University. Daniel Sutter is Interim Director of the Manuel H. Johnson Center of Political Economy, Troy University. The Independent Review, v. 22, n. 4, Spring 2018, ISSN 1086-1653, Copyright © 2018, pp. 529-550. 529 The Blockchain and Increasing Cooperative Efficacy MA LA VI KA NAIR AND DANIEL SUTTER Bitcoin is a cryptocurrency based on open-source software created by the pseudonymous Satoshi Nakamoto in 2009. The Bitcoin currency has 