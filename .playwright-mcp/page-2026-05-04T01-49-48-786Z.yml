                  - paragraph [ref=e902]: Authors such as Mangla, Mishra, and Singh, who exhibit the highest betweenness and PageRank values, occupy bridging positions that connect otherwise fragmented subgroups. These scholars function as intellectual brokers who facilitate cross-disciplinary knowledge transfer in sustainability, operations management and blockchain adoption studies. The high closeness and proximity values observed for secondary contributors (e.g. Calik, Daim, and Kazancoglu) indicate their role in reinforcing thematic cohesion within specific subdomains. Overall, the network structure reveals a combination of core influencers and peripheral contributors, whose collaborations collectively define the field's knowledge architecture.
                - heading "3.10 Theoretical framework's contributions" [level=3] [ref=e903]
                - generic [ref=e904]:
                  - paragraph [ref=e906]:
                    - text: The reviewed articles highlight the importance of blockchain technology across diverse sectors and its transformative potential. One significant contribution is summarised in “A conceptual framework for blockchain-based sustainable supply chain” (
                    - link "Mangla et al., 2022" [ref=e907] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Mangla
                      - emphasis [ref=e908]: et al.
                      - text: ", 2022"
                    - text: ), which integrates blockchain technology to improve sustainability in the tea supply chain. This study utilises a Spherical Fuzzy Analytic Hierarchy Process to identify barriers and prioritise actions, creating a framework applicable across agricultural sectors.
                    - link "Caldarelli et al. (2021)" [ref=e909] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Caldarelli
                      - emphasis [ref=e910]: et al.
                      - text: (2021)
                    - text: ", in their work on the sustainable fashion supply chain, demonstrate how a pragmatic approach to overcoming organisational and cultural resistance can accelerate the adoption of blockchain, highlighting the importance of stakeholder participation and gradual integration."
                  - paragraph [ref=e912]:
                    - text: Another remarkable framework is presented in the document “A novel algorithm for evaluating omni-channel distribution networks” (
                    - link "Babaei et al., 2023" [ref=e913] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Babaei
                      - emphasis [ref=e914]: et al.
                      - text: ", 2023"
                    - text: ). By leveraging blockchain technology for transparency and consensus formation, this study suggests a fuzzy goal programming model to optimise performance evaluation in the retail sector. The document “Blockchain and energy commodity markets” (
                    - link "Lee and Khan, 2022" [ref=e915] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) searches for the legal implications and sustainability impacts of blockchain in crude oil trading. This agenda links blockchain architecture with the United Nations Sustainable Development Goals by offering practical visions for responsible sourcing and information symmetry.
                    - link "Pandey et al. (2024)" [ref=e916] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Pandey
                      - emphasis [ref=e917]: et al.
                      - text: (2024)
                    - text: contribute identifying 21 key factors influencing supply chain sustainability. By employing the Grey-DEMATEL method, this framework highlights the importance of core integration and standardised data management.
                    - link "Singh et al. (2019)" [ref=e918] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Singh
                      - emphasis [ref=e919]: et al.
                      - text: (2019)
                    - text: employ the technology acceptance model (TAM) to assess stakeholder acceptance of blockchain, demonstrating how blockchain enhances transparency and accountability, adopting long-standing challenges in financial record-keeping. All of these illustrate the versatility of blockchain and its ability to address complex building problems.
                - heading "4. Intellectual structure" [level=2] [ref=e920]
                - generic [ref=e921]:
                  - list [ref=e923]:
                    - listitem [ref=e924]:
                      - paragraph [ref=e925]:
                        - link "RQ1" [ref=e926] [cursor=pointer]:
                          - /url: "#stmt1"
                        - text: ": How can blockchain technology facilitate compliance with the Non-Financial Disclosure Directive, promoting transparency and alignment with ESG standards?"
                      - paragraph [ref=e927]:
                        - text: Blockchain technology can ensure compliance with CSRD regulations and the preparation of associated reports by providing reliable infrastructure based on the collection, verification and auditing of ESG data. By recording every relevant transaction or data in a shared and decentralised digital ledger, blockchain technology enhances the verifiability and traceability of ESG indicators along supply chains and held within organisations (
                        - link "Senturk and Baghırov, 2023" [ref=e928] [cursor=pointer]:
                          - /url: javascript:;
                        - text: ). Additionally, this technology can be integrated with Smart Contracts (
                        - link "Szabo, 1995" [ref=e929] [cursor=pointer]:
                          - /url: javascript:;
                        - text: ), allowing the automation of sustainability-related reporting and enabling the proactive detection of non-compliance and facilitating audit work. This enhances the confidence of the stakeholders involved.
                    - listitem [ref=e930]:
                      - paragraph [ref=e931]:
                        - link "RQ2" [ref=e932] [cursor=pointer]:
                          - /url: "#stmt2"
                        - text: ": What are the main benefits and risks associated with blockchain implementation for corporate sustainability and financial and operational risk management?"
                      - paragraph [ref=e933]:
                        - text: We can highlight the improvement in transparency processes, the ability to reduce fraud, and the improvement in automation and traceability processes in critical supply chain operations. In turn, the most relevant ability is to facilitate ESG compliance or so-called internal governance (
                        - link "Senturk and Baghırov, 2023" [ref=e934] [cursor=pointer]:
                          - /url: javascript:;
                        - text: ). Although technology strengthens operational efficiency and enables a more robust approach to corporate risk management, associated risks should not be ignored. The high costs of adoption, the need for human resources training, the lack of technical standards, the lack of global regulation and the correct management of data (
                        - link "Mishra et al., 2023" [ref=e935] [cursor=pointer]:
                          - /url: javascript:;
                          - text: Mishra
                          - emphasis [ref=e936]: et al.
                          - text: ", 2023"
                        - text: ) are challenges to be solved in the coming years. Another relevant challenge is the energy consumption of certain blockchain networks, although steps have already been taken to incorporate solutions, such as changes to consensus mechanisms (
                        - link "Ethereum.org, 2025" [ref=e937] [cursor=pointer]:
                          - /url: javascript:;
                        - text: ), the use of renewable energy and the use of more efficient blockchain networks (
                        - link "Lightning Network, 2025" [ref=e938] [cursor=pointer]:
                          - /url: javascript:;
                        - text: ). Although blockchain enhances transparency and trust, its environmental footprint remains a concern. Energy-intensive consensus mechanisms can offset sustainability gains; however, recent shifts towards proof-of-stake systems and renewable-powered infrastructure are reducing these impacts and aligning blockchain with low-carbon objectives.
                    - listitem [ref=e939]:
                      - paragraph [ref=e940]:
                        - link "RQ3" [ref=e941] [cursor=pointer]:
                          - /url: "#stmt3"
                        - text: ": To what extent can blockchain transform corporate governance, strengthen trust, reduce information asymmetry and optimise ESG decision-making?"
                      - paragraph [ref=e942]:
                        - text: Blockchain technology has the potential to transform corporate governance of firms by empowering digitisation, decentralisation and automation of corporate oversight and decision-making mechanisms. The ability to record all relevant transactions and decisions in a transparent and immutable way provides the ability to significantly reduce information asymmetry between managers, shareholders and other stakeholders (
                        - link "Singh et al., 2019" [ref=e943] [cursor=pointer]:
                          - /url: javascript:;
                          - text: Singh
                          - emphasis [ref=e944]: et al.
                          - text: ", 2019"
                        - text: ).
                  - paragraph [ref=e946]:
                    - text: From the perspective of business decision-making derived from the ESG framework, blockchain technology allows the integration of real-time data from different internal and external data sources. This guarantees the authenticity of the data, facilitates decision-making and promotes the transparency of the analysed data. Specifically, it facilitates the use of digital governance information platforms with the capacity to develop secure voting systems in shareholder meetings and to control staff and management incentives in an ethical and transparent manner by considering governance criteria (
                    - link "Yusuf et al., 2023" [ref=e947] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Yusuf
                      - emphasis [ref=e948]: et al.
                      - text: ", 2023"
                    - text: ).
                  - list [ref=e950]:
                    - listitem [ref=e951]:
                      - paragraph [ref=e952]:
                        - link "RQ4" [ref=e953] [cursor=pointer]:
                          - /url: "#stmt4"
                        - text: ": How can blockchain technology improve sustainability and resilience in supply chains, thus fostering responsible practices and cross-sector collaboration?"
                      - paragraph [ref=e954]:
                        - text: The application of blockchain technology in supply chains enables granular traceability of both products and services. This means that every step can be recorded in an immutable digital record (blockchain network) from the origin of the raw materials to their purchase by the end consumer. This functionality strengthens responsible practices, enabling the verification of certifications such as fair trade (
                        - link "FairTrade International, 2025" [ref=e955] [cursor=pointer]:
                          - /url: javascript:;
                        - text: ), carbon footprint (
                        - link "Carbon Trust, 2025" [ref=e956] [cursor=pointer]:
                          - /url: javascript:;
                        - text: ) and labour compliance, acting as a deterrent to unethical and opaque practices (
                        - link "Pandey et al., 2024" [ref=e957] [cursor=pointer]:
                          - /url: javascript:;
                          - text: Pandey
                          - emphasis [ref=e958]: et al.
                          - text: ", 2024"
                        - text: ). Furthermore, the interoperability of blockchain technology with other technologies, such as the internet of Things (IoT) sensors, can enhance the agile response to corporate crises and more global crises, such as natural disasters, improving operational resilience.
                    - listitem [ref=e959]:
                      - paragraph [ref=e960]:
                        - link "RQ5" [ref=e961] [cursor=pointer]:
                          - /url: "#stmt5"
                        - text: ": What technological, regulatory and organisational factors determine the successful adoption of blockchain in the context of ESG and corporate sustainability?"
                      - paragraph [ref=e962]:
                        - text: From the technological point of view, the functionalities associated with scalability, interoperability between platforms, energy efficiency and the availability of specialised human resources (mentioned above) are key factors in the adoption of blockchain technology in the field analysed (
                        - link "Mishra et al., 2023" [ref=e963] [cursor=pointer]:
                          - /url: javascript:;
                          - text: Mishra
                          - emphasis [ref=e964]: et al.
                          - text: ", 2023"
                        - text: ). From a regulatory point of view, there is a need for regulatory clarity that is currently lacking, especially considering the different regulations by country and geographical area. From an organisational point of view, the leadership factor is key. To implement the aforementioned functionalities effectively, it is necessary to foster a culture of innovation in the company and the dedication of sustainable financial resources over time (
                        - link "Zhang and Song, 2022" [ref=e965] [cursor=pointer]:
                          - /url: javascript:;
                        - text: ).
                    - listitem [ref=e966]:
                      - paragraph [ref=e967]:
                        - link "RQ6" [ref=e968] [cursor=pointer]:
                          - /url: "#stmt6"
                        - text: ": How do blockchain-based solutions compare with other emerging technologies in terms of sustainability and compliance impact?"
                      - paragraph [ref=e969]:
                        - text: What differentiates blockchain technology from other emerging technologies is its ability to ensure data integrity, transparency management and tamper-resistance (
                        - link "Asif et al., 2023" [ref=e970] [cursor=pointer]:
                          - /url: javascript:;
                          - text: Asif
                          - emphasis [ref=e971]: et al.
                          - text: ", 2023"
                        - text: ). This is key in the context of sustainability and regulatory compliance. However, its risks must also be considered, some of which have been discussed, such as its considerable energy cost. This makes it a technology with high potential, but in a process of technological maturity.
                    - listitem [ref=e972]:
                      - paragraph [ref=e973]:
                        - link "RQ7" [ref=e974] [cursor=pointer]:
                          - /url: "#stmt7"
                        - text: ": How does the adoption of blockchain vary in different regulatory contexts and what lessons can be learned to promote its implementation globally?"
                      - paragraph [ref=e975]:
                        - text: From a regulatory point of view, there are countries with regulatory frameworks already defined in terms of access to digital infrastructure and with public policies geared towards innovation. Thus, in these regions, the implementation of blockchain technology in areas related to corporate sustainability has advanced enormously, as in the cases of countries such as Estonia and Singapore. In contrast, there are other regions with high legal uncertainties derived from the lack of technological standardisation and low levels of business and population digitisation, where the implementation barriers are significant (
                        - link "Drljevic et al., 2020" [ref=e976] [cursor=pointer]:
                          - /url: javascript:;
                          - text: Drljevic
                          - emphasis [ref=e977]: et al.
                          - text: ", 2020"
                        - text: ). Against this backdrop, it is necessary to develop policies and regulations to define clear international technical and regulatory standards, foster public–private collaboration, and adapt the development of blockchain solutions to the context of the geographical region, for example, by developing pilot projects that have measurable initial results.
                  - paragraph [ref=e979]:
                    - link "Table 6" [ref=e980] [cursor=pointer]:
                      - /url: javascript:;
                    - text: offers a comprehensive response to the research questions by drawing on the findings from the reviewed literature. This table enhances transparency and augments the theoretical contributions of this study.
