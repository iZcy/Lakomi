                - heading "3.2 Trend of the annual citations" [level=3] [ref=e412]
                - generic [ref=e413]:
                  - paragraph [ref=e415]:
                    - text: As shown in
                    - link "Table 1" [ref=e416] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ", the annual citations per article fluctuated over the years. In 2017, with only one document, the average number of citations per article was 71.00, demonstrating a significant initial impact. In 2018, the average dropped to 34.00, but increased dramatically to 237.50 in 2019, despite only two documents being published that year. From 2020 onwards, the average number of citations per article per year has gradually decreased, with values of 35.00 in 2021, 27.17 in 2022, 11.33 in 2023 and 4.75 in 2024. These fluctuations suggest variations in the focus and reach of the research output during this period. Despite this, consistent publication activities and the number of citable years have highlighted the growing influence of the field."
