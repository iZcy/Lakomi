                - heading "5. Contribution to theoretical frameworks" [level=2] [ref=e1061]
                - generic [ref=e1062]:
                  - paragraph [ref=e1064]:
                    - text: This research contributes to the advancement of blockchain technology adoption in the field of corporate sustainability by analysing the existing literature up to 2024. It integrates different streams of literature on the aspects of corporate governance, risk management and sustainability. From a theoretical point of view, the contributions enrich the TAM (
                    - link "Davis, 1989" [ref=e1065] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) and the Diffusion of Innovations Theory (DOI) (
                    - link "Rogers, 1962" [ref=e1066] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ), providing the unique attributes of the blockchain (immutability, decentralisation and real-time auditability) as key determinants of institutional trust and symmetry of financial and non-financial information. Additionally, the paper aligns with Stakeholder Theory (
                    - link "Freeman and McVea, 2001" [ref=e1067] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) by suggesting that blockchain technology has the ability to facilitate transparent communication between stakeholders by providing clearly verifiable ESG data. The meta-analysis also validates the relevance of Institutional Theory (
                    - link "DiMaggio and Powell, 1983" [ref=e1068] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ;
                    - link "Meyer and Rowan, 1977" [ref=e1069] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) by explaining the disparate manner in which the technology under analysis is adopted in different regulatory environments. This theory highlights the influence of institutional pressure and the need for regulatory maturity when deploying any technology that is key to the adoption of blockchain technology.
                  - paragraph [ref=e1071]:
                    - text: These existing theoretical frameworks seek to reinforce the potential of technology as a facilitator in improving governance mechanisms and supporting legislative directives, such as the CSRD (
                    - link "European Commission, 2023" [ref=e1072] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) and Corporate Governance Theory (
                    - link "Eccles et al., 2014" [ref=e1073] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Eccles
                      - emphasis [ref=e1074]: et al.
                      - text: ", 2014"
                    - text: ), which is linked to Sustainability Theory (
                    - link "Krüger, 2015" [ref=e1075] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). Blockchain technology has the power to improve areas related to transparency, traceability and regulatory compliance in ESG reporting, considering CSRD directives (
                    - link "European Parliament, 2022" [ref=e1076] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). The integration of the functionalities of smart contracts and DAOs provides a new framework that can support future business decision-making processes. However, it is necessary to develop theoretical frameworks that delve deeper into the new dynamics of corporate governance based on decentralised consensus.
                  - paragraph [ref=e1078]: This study advances the academic debate on blockchain and sustainability by integrating bibliometric, meta-analysis and social network analyses. It aims to provide transparency on how blockchain can contribute to ESG information and governance using a multi-method approach that expands on previous reviews on the topic.
                  - paragraph [ref=e1080]:
                    - text: Beyond the institutional and stakeholder lenses, this research incorporates insights from Sustainability Transitions Theory to capture the multi-level dynamics of technological and organisational change. This perspective emphasises how blockchain adoption in ESG reporting represents technological innovation and a socio-technical transition that depends on regime-level coordination, niche experimentation and policy alignment from a multilevel perspective. Foundational work on transitions highlights how changes unfold across niches, regimes and landscapes, providing a lens to situate blockchain-enabled transparency within broader decarbonisation pathways (
                    - link "Geels, 2002" [ref=e1081] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ;
                    - link "Markard et al., 2012" [ref=e1082] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Markard
                      - emphasis [ref=e1083]: et al.
                      - text: ", 2012"
                    - text: ). Recent reviews on blockchain and sustainability further indicate that diffusion accelerates when on-chain data architectures align with supportive policy and governance arrangements, reinforcing the value of a transition lens for ESG reporting (
                    - link "Thanasi-Boçe and Hoxha, 2025" [ref=e1084] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ).
                  - paragraph [ref=e1086]:
                    - text: From an organisational theory perspective, the adoption of blockchain can be interpreted as an interplay between dynamic capabilities and their micro-foundations. Dynamic capabilities reflect a firm's ability to integrate, build and reconfigure resources in response to environmental and regulatory changes, whereas microfoundations focus on the individual routines, learning processes and managerial decisions that enable such adaptability (
                    - link "Felin et al., 2012" [ref=e1087] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Felin
                      - emphasis [ref=e1088]: et al.
                      - text: ", 2012"
                    - text: ;
                    - link "Teece, 2010" [ref=e1089] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). This dual lens highlights how blockchain implementation depends not only on strategic reconfiguration at the organisational level but also on the behavioural and cognitive mechanisms that drive acceptance and sustained use within firms. The bibliometric clusters identified (impact, management and sustainability) closely correspond to the qualitative themes derived from the meta-synthesis. This convergence reinforces the robustness of the findings and demonstrates the alignment between quantitative mapping and qualitative interpretation.
                - heading "6. Conclusions" [level=2] [ref=e1090]
                - generic [ref=e1091]:
                  - paragraph [ref=e1093]: This research provides an extensive overview of how blockchain technology can be useful and relevant for compliance with the CSRD. This establishes that blockchain can promote and strengthen corporate governance, sustainability and risk management practices by improving transparency, traceability and trust in ESG reporting. A bibliometric and meta-analytical synthesis of 43 academic articles confirms that this is a rapidly growing field of research that is increasingly focused on the potential of technology to enhance corporate accountability and stakeholder confidence.
                  - paragraph [ref=e1095]: In particular, blockchain's application in supply chains, financial services and stakeholder governance can help companies meet their compliance, efficiency and social responsibility requirements. However, its implementation still faces several technical, organisational and regulatory challenges that require coordinated responses. Therefore, this study emphasises the importance of developing sector-specific strategies based on international cooperation to ensure the widespread and responsible adoption of blockchain technology.
                  - paragraph [ref=e1097]: Beyond the European framework, the results highlight the necessity of transnational regulatory coordination of blockchain adoption for sustainability. Differences between regions such as North America, Asia and Latin America illustrate the need for harmonised standards and collaborative governance to maximise blockchain's potential for ESG reporting. By combining bibliometric evidence, meta-analysis and social network analysis, this study offers a comprehensive perspective on the field and serves as a foundation for future international comparative research.
                  - paragraph [ref=e1099]: Blockchain is emerging as a relevant enabler of sustainable governance and corporate reputation, with implications that transcend national borders and require global cooperation among companies, regulators and stakeholders. Future research could further validate and extend these findings by examining how blockchain interacts with emerging technologies such as AI and the Internet of Things (IoT), and by analysing its implications for sustainable reporting and regulatory innovation.
                - heading "7. Limitations and future research" [level=2] [ref=e1100]
                - generic [ref=e1101]:
                  - paragraph [ref=e1103]: This study has several limitations that should be considered in future work. First, the methodology relies exclusively on the Web of Science (WoS) database, which ensures data quality and replicability, but may overlook relevant contributions from other sources such as Scopus. Additionally, for the purposes of this analysis, some disciplinary categories – particularly engineering and environmental sciences – were excluded to maintain a focus on business and management. Although this approach provides clear managerial implications, it limits cross-disciplinary perspectives.
                  - paragraph [ref=e1105]: From a methodological viewpoint, future studies should expand the database scope and adopt empirical validation techniques, such as case studies and surveys, to measure the impact of blockchain on CSRD compliance, audit efficiency and stakeholder trust. Empirical research is particularly relevant for sectors with segmented value chains, such as agriculture, tourism and retail distribution, in which blockchain traceability and data integration capabilities can be tested in real operational contexts.
                  - paragraph [ref=e1107]: There are also opportunities for comparative studies between blockchain and other digital technologies, including AI and IoT, to assess potential synergies in improving ESG reporting and corporate sustainability performance. Moreover, longitudinal research designs are needed to examine adoption patterns over time and identify learning dynamics within organisations and institutions.
                  - paragraph [ref=e1109]: Furthermore, while the present study prioritises methodological rigor and replicability through a WoS-only dataset and qualitative meta-synthesis, future analyses could adopt a hybrid meta-analytic approach that combines quantitative aggregation with cross-database validation to deepen inferential robustness.
                  - paragraph [ref=e1111]: Finally, cross-regional comparative analyses should be conducted to evaluate how cultural, institutional and regulatory factors influence blockchain adoption in diverse economic environments. While the debate has been primarily European, future studies should broaden the analysis to other regions, such as North America, Asia and Latin America, to capture differences in policy maturity and innovation ecosystems. These approaches will enrich the understanding of blockchain's temporal and contextual dimensions and help address the scope limitations of the present study.
                - heading "8. Practical, social and policy implications" [level=2] [ref=e1112]
                - generic [ref=e1113]:
                  - paragraph [ref=e1115]:
                    - text: From a practical perspective, this study provides several pertinent guidelines for corporations, public regulators and researchers. The themes delineated in
                    - link "Table 7" [ref=e1116] [cursor=pointer]:
                      - /url: javascript:;
                    - text: encompass six distinct areas of application, elucidating their implications from the governance and sustainability standpoints, alongside examples of prospective applications derived from the findings of this study. These themes encompass the analysis of operational validation, real-time management of environmental compliance, and traceability of products and services within key sectors.
