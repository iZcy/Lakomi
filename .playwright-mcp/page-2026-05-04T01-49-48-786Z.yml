                - heading "1. Introduction" [level=2] [ref=e259]
                - generic [ref=e260]:
                  - paragraph [ref=e262]:
                    - text: Blockchain has gained significant academic and practical attention since its introduction (
                    - link "Prados-Castillo et al., 2023" [ref=e263] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Prados-Castillo
                      - emphasis [ref=e264]: et al.
                      - text: ", 2023"
                    - text: ). This technological paradigm, initially linked to the rise of “cryptoeconomics” (
                    - link "Beck et al., 2018" [ref=e265] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Beck
                      - emphasis [ref=e266]: et al.
                      - text: ", 2018"
                    - text: ), integrates cryptographic mechanisms and distributed consensus to enable secure, transparent and tamper-proof transactions across decentralised networks. By replacing reliance on third-party intermediaries with algorithmic trust, blockchain establishes a reliable and auditable digital infrastructure for recording and verifying economic exchanges (
                    - link "Prados-Castillo et al., 2022" [ref=e267] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Prados-Castillo
                      - emphasis [ref=e268]: et al.
                      - text: ", 2022"
                    - text: ). Beyond cryptocurrency applications, blockchain underpins diverse processes, such as smart contracts, supply chain traceability and sustainability reporting, providing a foundation for automation, accountability and data integrity within corporate governance frameworks.
                  - paragraph [ref=e270]:
                    - link "Szabo (1995)" [ref=e271] [cursor=pointer]:
                      - /url: javascript:;
                    - text: defines smart contracts as “computerised transaction protocols that execute the terms of a contract”. In other words, they can automatically execute a set of instructions when the specified assigned conditions are met. Smart contracts have applicability in the management of multi-signature electronic portfolios, insurance and inheritance, among many other applications. One of the developments in smart contracts has been the emergence of decentralised autonomous organisations (DAOs) (
                    - link "Ding et al., 2022" [ref=e272] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Ding
                      - emphasis [ref=e273]: et al.
                      - text: ", 2022"
                    - text: ). DAOs are collective entities governed by smart contracts that allow decisions and operations to be executed automatically without traditional hierarchical management. These organisations operate as individual self-managed systems or platforms under specific protocols based on blockchain technology. Their applications range from fund management by non-profit organisations, the management and traceability of subsidies, the management of software subscriptions and the transparency and legitimation of properties in metaverse platforms, such as the example of Decentraland (
                    - link "Al-Jaroodi and Mohamed, 2019" [ref=e274] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ).
                  - paragraph [ref=e276]:
                    - text: Blockchain technology has revolutionised various industries by offering benefits such as greater transparency, security and efficiency (
                    - link "Juneja, 2024" [ref=e277] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) in business operations. The relevant areas of application are finance, healthcare management, supply chain management and traceability of products and services. This technology allows for transparent transactions, secure management of personal data and automation of processes through the aforementioned smart contracts. Blockchain technology also presents risks and challenges in its implementation in areas such as scalability, security and regulation. The adoption of blockchain is still in a very early phase in most economic sectors, and existing implementations still lack systems for evaluating effectiveness. This does not mean that there are no more applications that imply its wider adoption (
                    - link "Morar and Popescu, 2024" [ref=e278] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). Blockchain technology offers benefits in improving corporate governance, risk management and sustainability in various business sectors (
                    - link "Yermack, 2016" [ref=e279] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) through its ability to carry out secure, transparent and efficient transactions. This technology has the potential to revolutionise traditional business processes (
                    - link "Park and Li, 2021" [ref=e280] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). This technology can eliminate or considerably reduce the possibility of fraud through the transparency and disclosure of information shared by company boards of directors (
                    - link "Mehta et al., 2023" [ref=e281] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Mehta
                      - emphasis [ref=e282]: et al.
                      - text: ", 2023"
                    - text: ).
                  - paragraph [ref=e284]:
                    - text: In addition, blockchain adoption is expanding in sectors such as healthcare and energy. In the healthcare sector, blockchain-based solutions have been deployed to secure patient records, improve data interoperability and strengthen traceability in pharmaceutical and medical device supply chains, thereby enhancing overall compliance with data protection regulations. In the energy sector, blockchain enables decentralised energy trading, facilitates peer-to-peer transaction transparency and supports traceable carbon accounting in emerging renewable ecosystems. These examples highlight the adaptability of blockchain across industries (
                    - link "Al-Jaroodi and Mohamed, 2019" [ref=e285] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ;
                    - link "Lee and Khan, 2022" [ref=e286] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ).
                  - paragraph [ref=e288]:
                    - text: For supply chain management, blockchain brings transparency, reliability, traceability and efficiency to environmental protection, social equity and governance (
                    - link "Munir et al., 2022" [ref=e289] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Munir
                      - emphasis [ref=e290]: et al.
                      - text: ", 2022"
                    - text: ). The application of blockchain technology extends beyond corporate governance and supply chain management. In the manufacturing industry, this can lead to real-time transparency and cost savings, thereby improving profitability and competitiveness (
                    - link "Ko et al., 2018" [ref=e291] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Ko
                      - emphasis [ref=e292]: et al.
                      - text: ", 2018"
                    - text: ). Finally, the financial sector can benefit from blockchain's ability to track assets, reduce reliance on credit rating agencies and increase investor confidence (
                    - link "Cohen et al., 2017" [ref=e293] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Cohen
                      - emphasis [ref=e294]: et al.
                      - text: ", 2017"
                    - text: ). However, the implementation of blockchain technology presents challenges, including technological, organisational, adoption, operational and environmental barriers (
                    - link "Saberi et al., 2018" [ref=e295] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Saberi
                      - emphasis [ref=e296]: et al.
                      - text: ", 2018"
                    - text: ). Similar analyses have been conducted in the context of the supply chain.
                    - link "Younis et al. (2024)" [ref=e297] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Younis
                      - emphasis [ref=e298]: et al.
                      - text: (2024)
                    - text: offer a critical meta-analysis that synthesises the enabling and limiting factors affecting the adoption of blockchain. It identifies technological readiness, regulatory harmonisation and organisational learning as relevant elements in the long-term success of its implementation.
                  - paragraph [ref=e300]:
                    - text: Blockchain technology offers a solution for improving corporate governance, risk management and sustainability across various sectors. Its potential to create transparency, reduce fraud and enhance efficiency can lead to significant improvements in business practices and sustainability (
                    - link "Kewell et al., 2017" [ref=e301] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Kewell
                      - emphasis [ref=e302]: et al.
                      - text: ", 2017"
                    - text: ;
                    - link "Ronaghi and Mosakhani, 2021" [ref=e303] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). As technology continues to evolve, addressing adoption barriers and tailoring governance models to specific organisational needs will be crucial to realising its full potential in transforming business operations and contributing to sustainable development goals (
                    - link "Trump et al., 2018" [ref=e304] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Trump
                      - emphasis [ref=e305]: et al.
                      - text: ", 2018"
                    - text: ).
                  - paragraph [ref=e307]:
                    - text: This solution can enhance transparency, efficiency and security in estate management (
                    - link "Jebril et al., 2024" [ref=e308] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Jebril
                      - emphasis [ref=e309]: et al.
                      - text: ", 2024"
                    - text: ", p. 202) and improve data integrity in sustainable development initiatives ("
                    - link "Senturk and Baghırov, 2023" [ref=e310] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). For small and medium enterprises (SMEs), blockchain-based corporate governance innovations can reduce credit risk (
                    - link "Mutamimah et al., 2022" [ref=e311] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Mutamimah
                      - emphasis [ref=e312]: et al.
                      - text: ", 2022"
                    - text: ). Nonetheless, adopting blockchain in sustainable supply chain management also presents risks such as increased training costs and resource wastage (
                    - link "Zhang and Song, 2022" [ref=e313] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ).
                    - link "Singh et al. (2023)" [ref=e314] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Singh
                      - emphasis [ref=e315]: et al.
                      - text: (2023)
                    - text: propose a strategic roadmap to overcome adoption challenges in sustainable construction by combining structural equation models and artificial neural networks to prioritise mitigation strategies. This approach is potentially transferable to blockchain projects focused on environmental, social and governance (ESG) standards (
                    - link "Dasilas and Karanović, 2025" [ref=e316] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). In the financial context, blockchain can transform corporate governance by improving record-keeping and ownership transparency (
                    - link "Yusuf et al., 2023" [ref=e317] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Yusuf
                      - emphasis [ref=e318]: et al.
                      - text: ", 2023"
                    - text: ). Although promising, there are still obstacles to overcome, such as ensuring network security, addressing data privacy issues and establishing effective governance frameworks (
                    - link "Drljevic et al., 2020" [ref=e319] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Drljevic
                      - emphasis [ref=e320]: et al.
                      - text: ", 2020"
                    - text: ).
                  - paragraph [ref=e322]:
                    - text: This study analyses the potential of blockchain technology as a tool capable of improving value creation in companies and promoting sustainable innovation processes (
                    - link "López Vázquez et al., 2024" [ref=e323] [cursor=pointer]:
                      - /url: javascript:;
                      - text: López Vázquez
                      - emphasis [ref=e324]: et al.
                      - text: ", 2024"
                    - text: ). It analyses how the characteristics of blockchain technology (based on security and transparency) can improve the behaviour and decision-making of companies in areas such as risk management, sustainability and regulatory compliance, as stated in the Corporate Sustainability Reporting Directive (CSRD) (
                    - link "European Commission, 2025" [ref=e325] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ;
                    - link "Li et al., 2025" [ref=e326] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Li
                      - emphasis [ref=e327]: et al.
                      - text: ", 2025"
                    - text: ). The CSRD significantly broadens the scope and depth of sustainability disclosures, making non-financial reporting mandatory for a wide range of companies, and is therefore central to ongoing debates on governance and transparency. The aim is to analyse the benefits and challenges associated with the adoption of this technology and its impact on the transformation of corporate governance and the efficiency of companies. Seven research questions were developed for this purpose.
                  - generic [ref=e329]:
                    - emphasis [ref=e331]: RQ1.
                    - paragraph [ref=e332]: How can blockchain technology facilitate compliance with the non-financial disclosure directive, promoting transparency and alignment with ESG standards?
                  - generic [ref=e334]:
                    - emphasis [ref=e336]: RQ2.
                    - paragraph [ref=e337]:
                      - text: What are the main benefits and risks associated with blockchain implementation for corporate sustainability and financial and operational risk management
                      - strong [ref=e338]: "?"
                  - generic [ref=e340]:
                    - emphasis [ref=e342]: RQ3.
                    - paragraph [ref=e343]: To what extent can blockchain transform corporate governance, strengthen trust, reduce information asymmetry and optimise ESG decision-making?
                  - generic [ref=e345]:
                    - emphasis [ref=e347]: RQ4.
                    - paragraph [ref=e348]: How can blockchain technology improve sustainability and resilience in supply chains, thus fostering responsible practices and cross-sector collaboration?
                  - generic [ref=e350]:
                    - emphasis [ref=e352]: RQ5.
                    - paragraph [ref=e353]: What technological, regulatory and organisational factors determine the successful adoption of blockchain in the context of ESG and corporate sustainability?
                  - generic [ref=e355]:
                    - emphasis [ref=e357]: RQ6.
                    - paragraph [ref=e358]: How do blockchain-based solutions compare with other emerging technologies in terms of sustainability and compliance impact?
                  - generic [ref=e360]:
                    - emphasis [ref=e362]: RQ7.
                    - paragraph [ref=e363]: How does the adoption of blockchain vary in different regulatory contexts and what lessons can be learned to promote its implementation globally?
                - heading "2. Methodology" [level=2] [ref=e364]
                - generic [ref=e365]:
                  - paragraph [ref=e367]:
                    - text: In the initial stage of this systematic analysis, the Web of Science (WoS) database was chosen as the main resource. This indexing platform is recognised as the most extensive repository of scholarly publications worldwide (
                    - link "Zhu and Liu, 2020" [ref=e368] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) and is considered the most authoritative academic source (
                    - link "Elvik, 1998" [ref=e369] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). Peer-reviewed articles were analysed up to 31 December 2024 considering that this is the last year of consolidated research. A Boolean methodology was employed, utilising the keywords “blockchain risk sustainability”, “blockchain risk corporate governance” and “blockchain risk institution”. The selection of titles, abstracts and keywords is justified by the need for specificity in the subject matter under analysis, necessitating a precise approach to the breadth of the keywords utilised. In accordance with the Prisma Statement methodology (
                    - link "Page et al., 2021" [ref=e370] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Page
                      - emphasis [ref=e371]: et al.
                      - text: ", 2021"
                    - text: ) and the recommendations of prominent experts in bibliometric analyses and literature reviews (
                    - link "Kraus et al., 2022" [ref=e372] [cursor=pointer]:
                      - /url: javascript:;
                      - text: Kraus
                      - emphasis [ref=e373]: et al.
                      - text: ", 2022"
                    - text: ), data were gathered from WoS sources up to a designated date. The focus was solely on articles published in English, including those available in early access, which are related to the fields of Business and Management. The dataset derived from the WoS comprised 55 documents after applying the specified exclusions. The analysis was conducted using the Biblioshiny software tool (
                    - link "Aria and Cuccurullo, 2017" [ref=e374] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). Thresholds for citation counts and keyword occurrences were calibrated according to the scale and maturity of the research domain to ensure that the most influential contributions were captured while avoiding the overrepresentation of peripheral terms. This calibration enhances the reliability of bibliometric mapping by balancing coverage and precision. The exclusive use of the WoS database was motivated by its standardised indexing procedures, peer-reviewed quality control and consistency with the PRISMA 2020 reporting guidelines. To assess potential selection bias, manual cross-validation was performed with Scopus-indexed records using the same Boolean search terms. The comparison confirmed that the core set of high-impact publications was identical across the databases, supporting the reliability of WoS coverage for the studied period. Nonetheless, future research may integrate Scopus and Google Scholar sources to expand longitudinal and regional representations as the field continues to evolve. This indexing source constitutes the most extensive and academically recognised collection of peer-reviewed research journals worldwide (
                    - link "Zhu and Liu, 2020" [ref=e375] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ). WoS provides reliable citation metadata and ensures replicability in bibliometric analyses by minimising data duplication and inconsistencies across indexing platforms. While complementary databases such as Scopus and Google Scholar could expand the corpus in future research, the focus on WoS guarantees a high level of methodological rigor and transparency suitable for the objectives of this study.
                  - paragraph [ref=e377]:
                    - text: Nineteen documents were excluded, as they did not align with the research topic, while four documents were incorporated because of their relevance to the objectives of the study, having not been previously included in the analysis. The methodology employed in this study, illustrated in
                    - link "Figure 1" [ref=e378] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ", is supported by numerous scientific investigations. An initial evaluation of the bibliographic data was conducted on the first set of 36 documents, which were deemed appropriate for description and visualisation through bibliometric techniques. In addition to the 36 documents incorporated for analysis, seven additional documents were incorporated for discussion and conclusions, including the most relevant documents published until the end of 2024. Based on this, a total of 43 documents were analysed (see"
                    - link "Table S1 in Supplementary Material" [ref=e379] [cursor=pointer]:
                      - /url: /jrf/article-supplement/1351487/docx/jrf-07-2025-0297_suppl1/
                    - text: ). The subsequent sections present an analysis of the bibliometric results, followed by a discussion and meta-analysis of the acquired data in response to the proposed research questions. Specifically, the meta-analysis conducted in this study was mainly qualitative. As mentioned above, the PRISMA 2020 guidelines were followed, selecting documents based on their relevance to blockchain compliance and ESG/CSRD criteria. Coding was carried out by theme, grouping the results into categories such as governance, supply chain, risk management and technology adoption. This ensured consistency in the extraction of information and facilitated synthesis between different studies.
