                    - text: 
                  - paragraph [ref=e393]: Nevertheless, preliminary descriptive quantification was performed to complement the qualitative synthesis. This included computing the frequency distributions of publication years, research domains and average citation rates per thematic cluster, offering a numerical overview of the research landscape. While these indicators do not constitute formal effect sizes, they provide valuable contextual evidence that strengthens the interpretative validity of qualitative meta-synthesis. Future research, once a more homogeneous body of empirical studies becomes available, could develop a hybrid meta-analytic approach that combines quantitative aggregation and qualitative synthesis to enhance inferential robustness.
                - heading "3. Results of the descriptive analysis" [level=2] [ref=e394]
                - heading "3.1 Overview and production trends" [level=3] [ref=e395]
                - generic [ref=e396]:
                  - paragraph [ref=e398]:
                    - text: An analysis of 36 documents published between 2017 and 2024 revealed a rapidly expanding research field, with an average annual growth of over 40% and increasing international collaboration. On average, each paper received nearly 28 citations, underscoring the field's growing academic impact and relevance. As shown in
                    - link "Figure 2" [ref=e399] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ", citation patterns fluctuate across years but remain indicative of sustained scholarly attention. While early publications (2017–2019) achieved higher citation averages, subsequent years showed broader participation and diversification of topics, reflecting the maturation of blockchain–CSRD research."
