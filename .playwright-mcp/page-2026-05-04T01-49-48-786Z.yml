                  - paragraph [ref=e1166]: Recent technological developments have demonstrated how blockchain operates synergistically with AI and the IoT to strengthen ESG data reliability. For example, AI-driven analytics can automatically detect inconsistencies in sustainability disclosures recorded on blockchain ledgers, thereby improving the accuracy of environmental reporting. Similarly, IoT sensors embedded in production and logistics networks can transmit real-time data on emissions, energy consumption and resource use directly to blockchain systems, thereby ensuring traceability and verifiable compliance. These integrated applications highlight the complementary role of blockchain within a broader digital ecosystem for sustainable governance and performance management.
                  - paragraph [ref=e1168]: For managers and professionals, the results of this study highlight the potential of blockchain to improve transparency, traceability and CSRD compliance. Companies can apply this knowledge to strengthen their risk management and improve supply chain sustainability. Various obstacles are also identified, such as scalability and organisational readiness, and guidance is provided for implementation strategies. Beyond the business sphere, blockchain adoption has broader social and regulatory implications. For example, by emphasising transnational perspectives, this research highlights the importance of international cooperation in sustainability reporting. Regulators and policymakers in North America, Asia and Latin America can benefit from lessons learned in the EU, facilitating the harmonisation of disclosure standards and promoting corporate responsibility globally.
                  - paragraph [ref=e1170]:
                    - text: Effective policy harmonisation requires alignment with existing international standards and regulatory initiatives. Relevant examples include the International Organisation for Standardisation's (
                    - link "ISO, 2021" [ref=e1171] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ) framework, which guides greenhouse gas management and investment decision-making, and the IFRS Foundation's International Sustainability Standards Board (ISSB), which promotes uniform sustainability disclosure practices across jurisdictions. Coordinating blockchain-enabled ESG reporting with these standards can facilitate global comparability, reduce regulatory fragmentation and strengthen the credibility of corporate sustainability disclosures.
                  - paragraph [ref=e1173]: "To overcome these barriers, a structured roadmap is proposed to guide organisations and policymakers towards effective blockchain integration. (1) Regulatory harmonisation: establish interoperable standards and cross-border alignment of ESG disclosure requirements. (2) Technical standardisation: develop open-source protocols that ensure interoperability between blockchain platforms and existing reporting systems. (3) Capacity building: provide targeted training for managers, auditors and IT professionals to reduce implementation uncertainty and foster organisational readiness. (4) Pilot implementation: initiate small-scale pilot projects in high-impact sectors, such as finance, supply chain and energy, to generate evidence of cost-efficiency and scalability. This phased approach facilitates gradual adoption while minimising financial and operational risks."
                  - paragraph [ref=e1175]: Based on the above, to translate these recommendations into practice, a concise Blockchain ESG Readiness Checklist is proposed. This tool helps organisations evaluate their preparedness for blockchain adoption in ESG reporting and sustainability management.
                  - paragraph [ref=e1177]: Blockchain ESG Readiness Checklist.
                  - list [ref=e1179]:
                    - listitem [ref=e1180]:
                      - paragraph [ref=e1181]:
                        - emphasis [ref=e1182]: "Data governance maturity:"
                        - text: Does the organisation maintain reliable, digitised and auditable ESG data sources?
                    - listitem [ref=e1183]:
                      - paragraph [ref=e1184]:
                        - emphasis [ref=e1185]: "Technical infrastructure:"
                        - text: Are IT systems interoperable and capable of integration with blockchain platforms?
                    - listitem [ref=e1186]:
                      - paragraph [ref=e1187]:
                        - emphasis [ref=e1188]: "Regulatory compliance:"
                        - text: Has the organisation aligned its reporting framework with existing standards, such as CSRD or ISO 14097?
                    - listitem [ref=e1189]:
                      - paragraph [ref=e1190]:
                        - emphasis [ref=e1191]: "Energy efficiency:"
                        - text: Are blockchain solutions evaluated in terms of sustainability and low-energy consensus mechanism?
                    - listitem [ref=e1192]:
                      - paragraph [ref=e1193]:
                        - emphasis [ref=e1194]: "Human capital and training:"
                        - text: Do managers, auditors and IT personnel receive adequate training on decentralised reporting tools?
                    - listitem [ref=e1195]:
                      - paragraph [ref=e1196]:
                        - emphasis [ref=e1197]: "Cross-functional governance:"
                        - text: Is there coordination between sustainability, IT and compliance departments for blockchain deployment?
                  - paragraph [ref=e1199]:
                    - text: Applying this checklist enables decision-makers to identify organisational gaps and prioritise actions required for effective blockchain integration into ESG reporting systems. Finally,
                    - link "Table 8" [ref=e1200] [cursor=pointer]:
                      - /url: javascript:;
                    - text: summarises the main practical, social and policy implications of this study. It integrates the blockchain's contributions to ESG data governance, the four-step roadmap for adoption, the ESG readiness checklist and policy alignment with international standards, thereby providing an executive summary for practitioners and regulators.
