                  - paragraph [ref=e708]: The thematic evolution observed across the analysed period reflects a gradual transition from exploratory discussions on blockchain's risks and operational challenges to more outcome-oriented research agendas. Earlier studies (2017–2020) predominantly focused on feasibility, adoption barriers and governance issues, whereas more recent contributions (2021–2024) increasingly examined sustainability performance, policy alignment and cross-technology integration. This progression illustrates the maturation of the field from conceptual debates to empirical validation and strategic implementation, where blockchain is positioned as a key enabler of transparency and compliance in ESG reporting.
