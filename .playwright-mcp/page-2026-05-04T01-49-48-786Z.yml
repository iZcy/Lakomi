            - generic [ref=e218]:
              - generic [ref=e221]:
                - region "Main abstract" [ref=e223]:
                  - generic [ref=e224]:
                    - generic [ref=e225]: Purpose
                    - paragraph [ref=e226]: This study analyses the potential and emerging risks of blockchain technology in several financial and non-financial industries. The ability of blockchain technology to comply with the Corporate Sustainability Reporting Directive is also analysed.
                  - generic [ref=e227]:
                    - generic [ref=e228]: Design/methodology/approach
                    - paragraph [ref=e229]: A systematic bibliometric analysis was carried out based on the PRISMA 2020 methodology, reviewing 43 articles, all peer-reviewed and indexed in the Web of Science database. Subsequently, a meta-analysis was conducted to assess how blockchain technology can provide advances and improvements.
                  - generic [ref=e230]:
                    - generic [ref=e231]: Findings
                    - paragraph [ref=e232]: Seven research questions were answered to highlight the ability of blockchain technology to automate data verification, data immutability and align corporate reporting with International Financial Reporting Standards. Blockchain technology has the potential to enhance corporate risk management strategies and promote cross-industry collaboration.
                  - generic [ref=e233]:
                    - generic [ref=e234]: Research limitations/implications
                    - paragraph [ref=e235]: We found that technology can act as an enabler for achieving sustainability goals and more effective corporate governance in increasingly changing environments.
                  - generic [ref=e236]:
                    - generic [ref=e237]: Practical implications
                    - paragraph [ref=e238]: In addition to the ability to automate traceability and strengthen regulatory compliance in sectors such as finance, tourism and agribusiness. Blockchain technology has the potential to improve environmental, social and governance auditing and facilitate verification processes. The findings focus on its role in enhancing transparency, risk management and cross-industry collaboration, leading to more reliable and sustainable corporate reporting.
                  - generic [ref=e239]:
                    - generic [ref=e240]: Originality/value
                    - paragraph [ref=e241]: A combined approach is offered by bibliometric analysis and meta-analysis to assess the role of blockchain technology in Corporate Sustainability Reporting Directive compliance. Theoretical frameworks such as institutional, stakeholder and corporate governance theories are integrated from a sustainable and technological perspective.
                - generic [ref=e244]:
