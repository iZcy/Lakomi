                      - emphasis [ref=e800]: et al.
                      - text: ", 2022"
                    - text: ). Specifically, it highlights how this technology can be used in combination with other digital tools to promote the preservation of historical records, improve tourist experiences and maintain cultural integrity, thus improving the impact of tourist activities on these assets. The thematic areas identified in the figure (adoption of technology in tourism, blockchain for sustainability, improvement of the user experience and cultural preservation) offer interesting avenues to explore in future research.
