                - heading "3.7 Thematic map evolution" [level=3] [ref=e690]
                - generic [ref=e691]:
                  - paragraph [ref=e693]:
                    - text: As shown in
                    - link "Figure 5" [ref=e694] [cursor=pointer]:
                      - /url: javascript:;
                    - text: ", the documents examined indicate a notable change in research emphasis over time. Prior to 2023, the primary focus areas encompassed themes such as challenges, impacts, management and risks. However, by 2024, attention had shifted towards more specific subjects, including sustainability and performance. The concept of “challenges” evolved into “sustainability” (weighted inclusion index = 0.67), reflecting an increased emphasis on environmental concerns and long-term strategies. Similarly, “management” retained its relevance (weighted inclusion index = 0.56) but also expanded to include elements of performance (weighted inclusion index = 0.18), indicating a focus on efficiency and effectiveness. Additionally, “risk” remained stable but continues to underscore concerns regarding uncertainties in blockchain applications (weighted inclusion index = 0.50). These findings illustrate the dynamic nature of thematic evolution within the field, displaying a progression towards addressing complex and impactful issues in blockchain research."
