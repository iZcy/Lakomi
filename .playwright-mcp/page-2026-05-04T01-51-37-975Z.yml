                      - generic [ref=e307]:
                        - paragraph [ref=e308]:
                          - text: This essay considers the ideological context of blockchain technology. This technology is often celebrated for its potential for decentralization, distribution, privacy, and a lack of intermediaries and coordinators for transactions and general governance. Because of these features, blockchain technology, and, in particular, its most famous inauguration—the bitcoin blockchain—is frequently identified with libertarianism.
                          - link "Footnote 1" [ref=e309] [cursor=pointer]:
                            - /url: "#fn1"
                            - generic [ref=e310]: Footnote
                            - superscript [ref=e311]: "1"
                          - text: In this essay, we argue that the ideological context of blockchain technology is much more complicated. In addition to unraveling a number of background ideologies and their role in this technology, we raise the ontological issue concerning the relationship of ideology to technology.
                          - link "Footnote 2" [ref=e312] [cursor=pointer]:
                            - /url: "#fn2"
                            - generic [ref=e313]: Footnote
                            - superscript [ref=e314]: "2"
                          - text: These matters have implications for, among other things, the approach that should be taken to blockchain's governance, as well as how international lawyers may approach this “foreign”-seeming phenomenon that has its proponents from the European Central Bank to the United Nations (not, however, forgetting the private sector nor the digital underground).
                        - generic [ref=e315]:
                          - heading "Libertarians, Cryptoanarchists, and Hacker Ethicists" [level=2] [ref=e316]
                          - paragraph [ref=e317]:
                            - text: According to David Golumbia, the ideological inflections of blockchain technology are primarily right-wing or right extremist.
                            - link "Footnote 3" [ref=e318] [cursor=pointer]:
                              - /url: "#fn3"
                              - generic [ref=e319]: Footnote
                              - superscript [ref=e320]: "3"
                            - text: According to this view, blockchain is valued for its potential to add business and financial transaction value and efficiency and make the financial industry quicker, more transparent, and globally formalized. Milder characterizations of blockchain's ideological presuppositions link the development history of blockchain technology with “libertarian-esque” ideas of the cryptoanarchists and cypherpunks, including John Gilmore, Julian Assange, Eric Hughes, and Hal Finney.
                            - link "Footnote 4" [ref=e321] [cursor=pointer]:
                              - /url: "#fn4"
                              - generic [ref=e322]: Footnote
                              - superscript [ref=e323]: "4"
                            - text: On the other hand, it is often said that blockchain technology manifests a number of ideas from new social movements, cooperativism, and the sharing economy.
                            - link "Footnote 5" [ref=e324] [cursor=pointer]:
                              - /url: "#fn5"
                              - generic [ref=e325]: Footnote
                              - superscript [ref=e326]: "5"
                            - text: "Also, the hacker ethics movement(s) (explained below) have been a breeding ground for blockchain technology. From the latter perspective, the position of the mainstream misses the mark. As Meltem Demirors states: “if your idea of bitcoin finally succeeding is boomer banker bros finally getting it and trying to co-opt it for their own gain . . . then I don't really know what to tell you.”"
                            - link "Footnote 6" [ref=e327] [cursor=pointer]:
                              - /url: "#fn6"
                              - generic [ref=e328]: Footnote
                              - superscript [ref=e329]: "6"
                            - text: The blockchain developer community, as other communities, constantly argues about its vision of the technology.
                            - link "Footnote 7" [ref=e330] [cursor=pointer]:
                              - /url: "#fn7"
                              - generic [ref=e331]: Footnote
                              - superscript [ref=e332]: "7"
                          - paragraph [ref=e333]:
                            - text: Statements of hacker ethics, with their many variations, have proposed such imperatives as “information wants to be free” (free to move, free of charge) and “mistrust authority,” while promoting artistry and creativity. As one hacker described, the aim is to strive for a better world in which everyone can “speak without fear of reprisal, . . . be anonymous if they so choose, [and] . . . participate in a dialogue where one is judged by the merits of their words, not the color of their skin or the timbre of their voice.”
                            - link "Footnote 8" [ref=e334] [cursor=pointer]:
                              - /url: "#fn8"
                              - generic [ref=e335]: Footnote
                              - superscript [ref=e336]: "8"
                            - text: One statement of the hacker ethic, asserted as a “categorical imperative” (the “Hands On Imperative”), postulates that “(a)ccess to computers and hardware should be complete and total.”
                            - link "Footnote 9" [ref=e337] [cursor=pointer]:
                              - /url: "#fn9"
                              - generic [ref=e338]: Footnote
                              - superscript [ref=e339]: "9"
                            - text: Hacker ethics has striven to “remove any barriers between people and the use and understanding of any technology, no matter how large, complex, dangerous, labyrinthine, proprietary, or powerful.”
                            - link "Footnote 10" [ref=e340] [cursor=pointer]:
                              - /url: "#fn10"
                              - generic [ref=e341]: Footnote
                              - superscript [ref=e342]: "10"
                            - text: Another hacker ethics proponent claimed that, already in the 1980s, it was evident that “[t]he computer system has been solely in the hands of big businesses and the government. The wonderful device meant to enrich life has become a weapon which dehumanizes people. . . . [T]he government doesn't use computers to arrange aid for the poor, but to control nuclear death weapons.”
                            - link "Footnote 11" [ref=e343] [cursor=pointer]:
                              - /url: "#fn11"
                              - generic [ref=e344]: Footnote
                              - superscript [ref=e345]: "11"
                        - generic [ref=e346]:
                          - heading "The Ideology of a Technology" [level=2] [ref=e347]
                          - paragraph [ref=e348]:
                            - text: Many argue that blockchain, like any other technology, is not politically neutral. According to Francesco Galati, blockchain technology is not ideology-free and should be discussed in terms of ideology rather than added value. Blockchain is essentially a political, not a technological, idea dating back to the teachings of Lao Tzu.
                            - link "Footnote 12" [ref=e349] [cursor=pointer]:
                              - /url: "#fn12"
                              - generic [ref=e350]: Footnote
                              - superscript [ref=e351]: "12"
                            - text: For Galati, the libertarian elements in blockchain's ideological background are both left- and right-wing libertarian.
                            - link "Footnote 13" [ref=e352] [cursor=pointer]:
                              - /url: "#fn13"
                              - generic [ref=e353]: Footnote
                              - superscript [ref=e354]: "13"
                            - text: In each case, it is deeply ideological and, thus, any governance using it will incorporate and spread the ideology. A more nuanced view is that it is the human operationalization of a technological application in a material-physical environment that imprints the operations in question with ideological content.
                          - paragraph [ref=e355]:
                            - text: Any assertions about the ideology of the blockchain and blockchain-facilitated governance can be either correct and/or misguided depending on which kind of ontological position one assumes. Martin Heidegger's analysis of tools and technology has been widely discussed with reference to the development of artificial intelligence as well as other emerging technologies. Also Rantala, referring to the potential of blockchains, argues that blockchains as technological schemes cannot be reduced to the cognitive images of their designers.
                            - link "Footnote 14" [ref=e356] [cursor=pointer]:
                              - /url: "#fn14"
                              - generic [ref=e357]: Footnote
                              - superscript [ref=e358]: "14"
                            - text: Even if blockchain technology is exploited to add value in a number of industries, there is at the very least residual enrichment accrued outside the industrial value chains in question—from access to open source code, for example.
                            - link "Footnote 15" [ref=e359] [cursor=pointer]:
                              - /url: "#fn15"
                              - generic [ref=e360]: Footnote
                              - superscript [ref=e361]: "15"
                          - paragraph [ref=e362]:
                            - text: As a part of an ideological performance, a tool and a technology can be assigned different roles. Wessel Reijers and Mark Coeckelberg argue that blockchain is more than a technology since it has become a powerful narrative and governance ideology that promises automated governance through code.
                            - link "Footnote 16" [ref=e363] [cursor=pointer]:
                              - /url: "#fn16"
                              - generic [ref=e364]: Footnote
                              - superscript [ref=e365]: "16"
                            - text: As noted above, the usefulness of blockchain has been championed by those advocating for the sharing economy, platform cooperativism, decentralized horizontal networks, and social movements to facilitate governance without establishing hierarchical bodies. In such proposals, the motivation is to avoid corporate governance prevalent in the platform economy and move toward self-governed networks in the digital space. For proponents of blockchain working in this vein, blockchain represents a materialist solution to governance, thus effacing subjective decisions by human actors. Materialist governance is “engineered, encoded, and inscribed to take place independently of active subjective consideration.”
                            - link "Footnote 17" [ref=e366] [cursor=pointer]:
                              - /url: "#fn17"
                              - generic [ref=e367]: Footnote
                              - superscript [ref=e368]: "17"
                            - text: One must not forget, however, that this role has been assigned to blockchain technology as a result of human advocacy and involvement. The blockchain itself does not “speak” or “intend” materialism, cooperativism, corporate governance, right or left libertarianism, or hierarchy any more than a hammer or a hydrological dam, even if it can be utilized in performing skills, including governance skills, that project these ideological visions.
                        - generic [ref=e369]:
                          - heading "Governance Crusade Born Out of the Financial Crisis" [level=2] [ref=e370]
                          - paragraph [ref=e371]:
                            - text: It has been proposed that the contemporary ascent of blockchain technology was set in motion by the invention of the bitcoin blockchain that grew out of anger at the financial crisis. Although similar technologies and visions had been presented before, it was the crisis of 2008 that is said to have motivated the mysterious Satoshi Nagamoto to create bitcoin. It is said that bitcoin is “a crusade in the costume of a currency.”
                            - link "Footnote 18" [ref=e372] [cursor=pointer]:
                              - /url: "#fn18"
                              - generic [ref=e373]: Footnote
                              - superscript [ref=e374]: "18"
                          - paragraph [ref=e375]:
                            - text: In a Kierkegaardian vein, the politics of hacker ethics is about shifting away from external authority to everyone accepting their own authority and the accompanying responsibility, and becoming authors and facilitators—of choices, solutions, and checks and balances on various systems. While in the past, to gain voice and authority, an author needed intermediaries to market and distribute their message, hacker ethics-inspired blockchain governance seeks to do away with the power of the middle, i.e., the gatekeepers, the bookkeepers, and the authoritarian institutions that accredit, verify, limit, represent, showcase, or censor others. Bitcoin blockchain was the first technology to show that even the bank ledger did not need to be in centralized hands and the authority of the ledger keeper could thus be distributed. Many philosophers, including Kierkegaard and Weil, like many of the blockchain pioneers, espouse anonymity and see the best leaders as agents who seek to facilitate “in others a transition from authority exercised over them to authority vested in them individually.”
                            - link "Footnote 19" [ref=e376] [cursor=pointer]:
                              - /url: "#fn19"
                              - generic [ref=e377]: Footnote
                              - superscript [ref=e378]: "19"
                            - text: They both set self-effacement (even ego destruction) as the goal to create, serve, and unite in humanity.
                            - link "Footnote 20" [ref=e379] [cursor=pointer]:
                              - /url: "#fn20"
                              - generic [ref=e380]: Footnote
                              - superscript [ref=e381]: "20"
                            - text: Thus, the pursuit of anonymity should not be automatically reduced to extremist privacy or to a “hiding from the government” mentality; it can have quite different political and philosophical inflections.
                          - paragraph [ref=e382]: However, when authority, authorship, and agency get redistributed, many unforeseen things tend to happen. The visions of the cypherpunks, for instance, did not include the scenario that their favorite technologies get co-opted by public and private powerhouses, such as the FANG+, TBTF-companies, or the Chinese Communist Party. Blockchain technologies were constructed by many of their pioneers to be run as global networks with potentially unlimited amounts of nodes—each working, authoring something, and having the inalienable authority attached to these agencies. Of course, other pioneers and coders intended adding value and global formalization of transactions and records.
                        - generic [ref=e383]:
                          - 'heading "Blockchain-Based Governance: From Visions to Experiments" [level=2] [ref=e384]'
                          - paragraph [ref=e385]:
                            - text: The year 2020 saw wide-scale institutional adoption of blockchain technologies. It was also the year of the forceful co-option of blockchain-powered cyberspace by governments and business groups, according to blockchain pioneer Amir Taaki. In addition to developing blockchain technology and giving it a face, Taaki's projects against this co-option include the use of blockchain-based governance to build an autonomous region in Rojava, Northern Syria. The region is to be governed as a direct democracy based on libertarian, socialist, and anarchist principles “that promot(e) decentralization, gender equality, environmental sustainability as well as religious, political, and cultural tolerance and diversity.”
                            - link "Footnote 21" [ref=e386] [cursor=pointer]:
                              - /url: "#fn21"
                              - generic [ref=e387]: Footnote
                              - superscript [ref=e388]: "21"
                            - text: These are linked to hacker ethics imperatives, such as “(f)ree your fellow man, give him the tools (and) the knowledge to fight oppression.”
                            - link "Footnote 22" [ref=e389] [cursor=pointer]:
                              - /url: "#fn22"
                              - generic [ref=e390]: Footnote
                              - superscript [ref=e391]: "22"
                            - text: According to Taaki and others, the co-option of the blockchain space means investment and development being increasingly in the hands of “actors who don't necessarily have a philosophical vision or goal we originally had in mind.”
                            - link "Footnote 23" [ref=e392] [cursor=pointer]:
                              - /url: "#fn23"
                              - generic [ref=e393]: Footnote
                              - superscript [ref=e394]: "23"
                            - text: He identifies examples such as ConsenSys, central banks, and social media giants, e.g., Facebook.
                          - paragraph [ref=e395]:
                            - text: The bio-engineering scholar Aatresh has argued that non-fungible tokens (NFTs) are an important part of the shift in the technology sector away from a consumer tracking and advertising-based attention economy toward a “creator economy.”
                            - link "Footnote 24" [ref=e396] [cursor=pointer]:
                              - /url: "#fn24"
                              - generic [ref=e397]: Footnote
                              - superscript [ref=e398]: "24"
                            - text: The creator economy emphasizes the potential of creators of art, such as a piece of music, that today can easily be human or not, individual or collective, utilizing new or recycled materials. In the gaming industry, the creation and distribution of NFTs, through platforms such as Enjin, seek to put the focus on the gamer instead of the commercial game maker. The idea is that gamers should not be tied to the “jurisdiction” of one corporate game at a time and that they would be able to travel cyberspace with their “fruits” of gaming (e.g., trophies, purchased elements, scores). For Aatresh, NFTs enable us to “rethink the intersection of money and power” in cyberspace.
                            - link "Footnote 25" [ref=e399] [cursor=pointer]:
                              - /url: "#fn25"
                              - generic [ref=e400]: Footnote
                              - superscript [ref=e401]: "25"
                            - text: They also call for the rethinking of communities online. Rather than making more room for constructive, digital, and collective engagement, the present configuration of cyberspace causes negative emotions and radicalization to spread.
                            - link "Footnote 26" [ref=e402] [cursor=pointer]:
                              - /url: "#fn26"
                              - generic [ref=e403]: Footnote
                              - superscript [ref=e404]: "26"
                            - text: Aatresh sees the creator economy and NFTs as shifting toward authenticated creation away from noise and toward decentralizing financial power, sharing in and supporting others’ initiatives (e.g., through crowdfunding).
                            - link "Footnote 27" [ref=e405] [cursor=pointer]:
                              - /url: "#fn27"
                              - generic [ref=e406]: Footnote
                              - superscript [ref=e407]: "27"
                          - paragraph [ref=e408]:
                            - text: Many banks and global financial operators, such as the SWIFT group, build and experiment with blockchain-facilitated operations with the help of traditional megaconsultant firms (e.g., Accenture).
                            - link "Footnote 28" [ref=e409] [cursor=pointer]:
                              - /url: "#fn28"
                              - generic [ref=e410]: Footnote
                              - superscript [ref=e411]: "28"
                            - text: The Santander Bank has used blockchain technology for its governance meetings and reports increased efficiency.
                            - link "Footnote 29" [ref=e412] [cursor=pointer]:
                              - /url: "#fn29"
                              - generic [ref=e413]: Footnote
                              - superscript [ref=e414]: "29"
                            - text: It is important to note that when proprietary organizations use blockchain technology, they use closed chains and afford no anonymity. Thus, these two key libertarian or anarchist features are optional, not, as is often assumed,
                            - emphasis [ref=e415]: sine qua non
                            - text: for blockchain.
                          - paragraph [ref=e416]:
                            - text: Jaya Klara Brekke, Kate Beecroft, and Francesca Pick analyzed two open blockchain-based online communities, namely Genesis DAO and Ouishare. For them, blockchain technology-based governance, often described as “consensus algorithms,” is better described as a way to navigate with communal “dissensus.” They discuss voting, staking, and forking as consensus/dissensus mechanisms that, for them, are the main “blockchain governance ideologies.”
                            - link "Footnote 30" [ref=e417] [cursor=pointer]:
                              - /url: "#fn30"
                              - generic [ref=e418]: Footnote
                              - superscript [ref=e419]: "30"
                            - text: Their analysis highlights the open-endedness, dissociation, lack of follow-through, and passivity of the community-members from which all democratic governance suffers. They also emphasize the importance of adding off-line communication to blockchain governance because it better injects “historically and culturally specific practices”
                            - link "Footnote 31" [ref=e420] [cursor=pointer]:
                              - /url: "#fn31"
                              - generic [ref=e421]: Footnote
                              - superscript [ref=e422]: "31"
                            - text: into community governance and that seems at odds with “supposedly universal mechanisms”
                            - link "Footnote 32" [ref=e423] [cursor=pointer]:
                              - /url: "#fn32"
                              - generic [ref=e424]: Footnote
                              - superscript [ref=e425]: "32"
                            - text: that the blockchain governance technology by itself represents in their view. From the perspective of coding science and, in particular, developers of assisted and artificial intelligence, it is not, however, that code is incapable of giving effect to historical, cultural, and other human nuance. Rather, it is a question of the intricacy of the code and, consequently, the time and resources spent in creating it.
                            - link "Footnote 33" [ref=e426] [cursor=pointer]:
                              - /url: "#fn33"
                              - generic [ref=e427]: Footnote
                              - superscript [ref=e428]: "33"
                        - generic [ref=e429]:
                          - 'heading "Conclusion: Blockchain Governance Challenges" [level=2] [ref=e430]'
                          - paragraph [ref=e431]:
                            - text: The ideologies of blockchain development and governance need to be more diligently discussed also by international lawyers whenever blockchain technology is invoked as a solution to a social issue—be it consensus-seeking, dissensus-management, facilitations of transactions, value storage, value creation, or general governance, such as a UN initiative on blockchain for sustainable development.
                            - link "Footnote 34" [ref=e432] [cursor=pointer]:
                              - /url: "#fn34"
                              - generic [ref=e433]: Footnote
                              - superscript [ref=e434]: "34"
                            - text: Blockchain governance challenges are not helpfully analyzed by identifying all of the technological variants discussed under blockchain and diagnosing these as libertarian, right-wing, anarchist, socialist, or otherwise. Cyberspace communities and their ideologies, especially in the digital underground, are too poorly known.
                            - link "Footnote 35" [ref=e435] [cursor=pointer]:
                              - /url: "#fn35"
                              - generic [ref=e436]: Footnote
                              - superscript [ref=e437]: "35"
                            - text: It is also important to remember the Heideggerian analysis of our human connection to our tools that enables their quasi-embodiment and also critical distancing.
                          - paragraph [ref=e438]:
                            - text: When considering the ideologies, ethics, and ontological positions that have been briefly discussed in this essay, it should be clear that blockchain technologies invite various ideas to be put into use in cyberspace. They may also invite off-line interactions to complement algorithm-facilitated dissensus-management as a new variety of governance in the platform economy—a variation to address the old malaise of democracy. Ideological branding is effective in attracting users’ and commentators’ attention but it may also miss the ideological context of technology. Lawrence Lessig emphasized the culture of coders;
                            - link "Footnote 36" [ref=e439] [cursor=pointer]:
                              - /url: "#fn36"
                              - generic [ref=e440]: Footnote
                              - superscript [ref=e441]: "36"
                            - text: yet, not only the coders but every user and actor brings ideological framing into the blockchain-facilitated governance and is also able to be self-critical about it. Simultaneously, while ideologies narrow the societal direction of these technologies, their networked nature maintains openings.
