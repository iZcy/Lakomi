              - generic [ref=e188]:
                - heading "Abstract" [level=2] [ref=e189]
                - generic [ref=e191]: Academic, practitioner, and policy interest in digital labor platforms (DLPs)–businesses that use their digital infrastructure to intermediate transactions between workers and clients who need their services–is surging. While these transformational platforms have brought many benefits, there are growing concerns about the harms and entrepreneurial risks they create for workers. As such, there is a growing interest in problematizing the ownership and governance of DLPs. Our paper critically compares three increasingly common archetypes–Corporate DLPs, Cooperative DLPs, and Decentralized Autonomous Organization (DAO) DLPs–to discern their likelihood of addressing or exacerbating platform workers’ exposure to harms and entrepreneurial risks. Our analysis identifies promising new opportunities for those interested in cultivating a digital solidarity economy by highlighting the merits and demerits of different alternatives to Corporate DLPs, as well as promising new hybrids like Cooperative DAO DLPs. Furthermore, it advances our understanding of factors that contribute to DLPs’ being structured in particular ways and how choices about DLPs’ structures, in turn, prompt the evolution of organizational archetypes.
