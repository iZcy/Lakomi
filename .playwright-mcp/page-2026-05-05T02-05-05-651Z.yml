        - text: Simple Summary
      - paragraph [ref=e62]: A standard interface for tokens.
      - heading "Abstract" [level=2] [ref=e63]:
        - link [ref=e64] [cursor=pointer]:
          - /url: "#abstract"
        - text: Abstract
      - paragraph [ref=e65]: The following standard allows for the implementation of a standard API for tokens within smart contracts. This standard provides basic functionality to transfer tokens, as well as allow tokens to be approved so they can be spent by another on-chain third party.
      - heading "Motivation" [level=2] [ref=e66]:
        - link [ref=e67] [cursor=pointer]:
          - /url: "#motivation"
        - text: Motivation
      - paragraph [ref=e68]: "A standard interface allows any tokens on Ethereum to be re-used by other applications: from wallets to decentralized exchanges."
      - heading "Specification" [level=2] [ref=e69]:
        - link [ref=e70] [cursor=pointer]:
          - /url: "#specification"
        - text: Specification
      - heading "Token" [level=2] [ref=e71]:
        - link [ref=e72] [cursor=pointer]:
          - /url: "#token"
        - text: Token
      - heading "Methods" [level=3] [ref=e73]:
        - link [ref=e74] [cursor=pointer]:
          - /url: "#methods"
        - text: Methods
      - paragraph [ref=e75]:
        - strong [ref=e76]: NOTES
        - text: ":"
      - list [ref=e77]:
        - listitem [ref=e78]:
          - text: The following specifications use syntax from Solidity
          - code [ref=e79]: 0.4.17
          - text: (or above)
        - listitem [ref=e80]:
          - text: Callers MUST handle
          - code [ref=e81]: "false"
          - text: from
          - code [ref=e82]: returns (bool success)
          - text: . Callers MUST NOT assume that
          - code [ref=e83]: "false"
          - text: is never returned!
      - heading "name" [level=4] [ref=e84]:
        - link [ref=e85] [cursor=pointer]:
          - /url: "#name"
        - text: name
      - paragraph [ref=e86]:
        - text: Returns the name of the token - e.g.
        - code [ref=e87]: "\"MyToken\""
        - text: .
      - paragraph [ref=e88]: OPTIONAL - This method can be used to improve usability, but interfaces and other contracts MUST NOT expect these values to be present.
      - code [ref=e92]: function name() public view returns (string)
      - heading "symbol" [level=4] [ref=e93]:
        - link [ref=e94] [cursor=pointer]:
          - /url: "#symbol"
        - text: symbol
      - paragraph [ref=e95]: Returns the symbol of the token. E.g. “HIX”.
      - paragraph [ref=e96]: OPTIONAL - This method can be used to improve usability, but interfaces and other contracts MUST NOT expect these values to be present.
      - code [ref=e100]: function symbol() public view returns (string)
      - heading "decimals" [level=4] [ref=e101]:
        - link [ref=e102] [cursor=pointer]:
          - /url: "#decimals"
        - text: decimals
      - paragraph [ref=e103]:
        - text: Returns the number of decimals the token uses - e.g.
        - code [ref=e104]: "8"
        - text: ", means to divide the token amount by"
        - code [ref=e105]: "100000000"
        - text: to get its user representation.
      - paragraph [ref=e106]: OPTIONAL - This method can be used to improve usability, but interfaces and other contracts MUST NOT expect these values to be present.
      - code [ref=e110]: function decimals() public view returns (uint8)
      - heading "totalSupply" [level=4] [ref=e111]:
        - link [ref=e112] [cursor=pointer]:
          - /url: "#totalsupply"
        - text: totalSupply
      - paragraph [ref=e113]: Returns the total token supply.
      - code [ref=e117]: function totalSupply() public view returns (uint256)
      - heading "balanceOf" [level=4] [ref=e118]:
        - link [ref=e119] [cursor=pointer]:
