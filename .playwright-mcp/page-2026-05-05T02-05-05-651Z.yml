        - text: Transfer
      - paragraph [ref=e186]: MUST trigger when tokens are transferred, including zero value transfers.
      - paragraph [ref=e187]:
        - text: A token contract which creates new tokens SHOULD trigger a Transfer event with the
        - code [ref=e188]: _from
        - text: address set to
        - code [ref=e189]: "0x0"
        - text: when tokens are created.
      - code [ref=e193]: event Transfer(address indexed _from, address indexed _to, uint256 _value)
      - heading "Approval" [level=4] [ref=e194]:
