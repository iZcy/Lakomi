        - text: balanceOf
      - paragraph [ref=e120]:
        - text: Returns the account balance of another account with address
        - code [ref=e121]: _owner
        - text: .
      - code [ref=e125]: function balanceOf(address _owner) public view returns (uint256 balance)
      - heading "transfer" [level=4] [ref=e126]:
        - link [ref=e127] [cursor=pointer]:
          - /url: "#transfer"
        - text: transfer
      - paragraph [ref=e128]:
        - text: Transfers
        - code [ref=e129]: _value
        - text: amount of tokens to address
        - code [ref=e130]: _to
        - text: ", and MUST fire the"
        - code [ref=e131]: Transfer
        - text: event. The function SHOULD
        - code [ref=e132]: throw
        - text: if the message caller’s account balance does not have enough tokens to spend.
      - paragraph [ref=e133]:
        - emphasis [ref=e134]: Note
        - text: Transfers of 0 values MUST be treated as normal transfers and fire the
        - code [ref=e135]: Transfer
        - text: event.
      - code [ref=e139]: function transfer(address _to, uint256 _value) public returns (bool success)
      - heading "transferFrom" [level=4] [ref=e140]:
