        - text: transferFrom
      - paragraph [ref=e142]:
        - text: Transfers
        - code [ref=e143]: _value
        - text: amount of tokens from address
        - code [ref=e144]: _from
        - text: to address
        - code [ref=e145]: _to
        - text: ", and MUST fire the"
        - code [ref=e146]: Transfer
        - text: event.
      - paragraph [ref=e147]:
        - text: The
        - code [ref=e148]: transferFrom
        - text: method is used for a withdraw workflow, allowing contracts to transfer tokens on your behalf. This can be used for example to allow a contract to transfer tokens on your behalf and/or to charge fees in sub-currencies. The function SHOULD
        - code [ref=e149]: throw
        - text: unless the
        - code [ref=e150]: _from
        - text: account has deliberately authorized the sender of the message via some mechanism.
      - paragraph [ref=e151]:
        - emphasis [ref=e152]: Note
        - text: Transfers of 0 values MUST be treated as normal transfers and fire the
        - code [ref=e153]: Transfer
        - text: event.
      - code [ref=e157]: function transferFrom(address _from, address _to, uint256 _value) public returns (bool success)
      - heading "approve" [level=4] [ref=e158]:
        - link [ref=e159] [cursor=pointer]:
          - /url: "#approve"
        - text: approve
      - paragraph [ref=e160]:
        - text: Allows
        - code [ref=e161]: _spender
        - text: to withdraw from your account multiple times, up to the
        - code [ref=e162]: _value
        - text: amount. If this function is called again it overwrites the current allowance with
        - code [ref=e163]: _value
        - text: .
      - paragraph [ref=e164]:
        - strong [ref=e165]: NOTE
        - text: ": To prevent attack vectors like the one"
        - link "described here" [ref=e166] [cursor=pointer]:
          - /url: https://docs.google.com/document/d/1YLPtQxZu1UAvO9cZ1O2RPXBbT0mooh4DYKjA_jp-RLM/
        - text: and discussed
        - link "here" [ref=e167] [cursor=pointer]:
          - /url: https://github.com/ethereum/EIPs/issues/20#issuecomment-263524729
        - text: ", clients SHOULD make sure to create user interfaces in such a way that they set the allowance first to"
        - code [ref=e168]: "0"
        - text: before setting it to another value for the same spender. THOUGH The contract itself shouldn’t enforce it, to allow backwards compatibility with contracts deployed before
      - code [ref=e172]: function approve(address _spender, uint256 _value) public returns (bool success)
      - heading "allowance" [level=4] [ref=e173]:
        - link [ref=e174] [cursor=pointer]:
          - /url: "#allowance"
        - text: allowance
      - paragraph [ref=e175]:
        - text: Returns the amount which
        - code [ref=e176]: _spender
        - text: is still allowed to withdraw from
        - code [ref=e177]: _owner
        - text: .
      - code [ref=e181]: function allowance(address _owner, address _spender) public view returns (uint256 remaining)
