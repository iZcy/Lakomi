services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://127.0.0.1:8545"]
      interval: 2s
      timeout: 3s
      retries: 10

  deployer:
    build:
      context: .
      dockerfile: Dockerfile.hardhat
    environment:
      - RPC_URL=http://anvil:8545
    working_dir: /app/hardhat
    depends_on:
      anvil:
        condition: service_started
    command: ["bash", "/app/docker-entrypoint.sh"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_RPC_URL=http://localhost:8545
    ports:
      - "5173:80"
    depends_on:
      deployer:
        condition: service_completed_successfully
