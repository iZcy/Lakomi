# Paper Downloader Configuration
# ================================

# Ezproxy settings
ezproxy:
  url: "https://ezproxy.ugm.ac.id/login"
  username: "yitzhakedmundtiomanalu"
  password: "Z@cky4UGMAcc2022"
  login_timeout: 300  # 5 minutes max for manual login
  login_check_url: "https://ieeexplore.ieee.org"  # URL to check if logged in

# Database settings
databases:
  - name: ieee
    enabled: true
    domain: "ieeexplore.ieee.org"

  - name: sciencedirect
    enabled: true
    domain: "sciencedirect.com"

  - name: springer
    enabled: true
    domain: "link.springer.com"

  - name: wiley
    enabled: true
    domain: "onlinelibrary.wiley.com"

  - name: emerald
    enabled: true
    domain: "emerald.com"

  - name: taylorfrancis
    enabled: true
    domain: "tandfonline.com"

  - name: sage
    enabled: true
    domain: "journals.sagepub.com"

  - name: cambridge
    enabled: true
    domain: "cambridge.org"

  - name: oxford
    enabled: true
    domain: "academic.oup.com"

  - name: jstor
    enabled: true
    domain: "jstor.org"

# Download settings
download:
  max_per_database: 3      # Max papers to download per database per search
  delay_min: 5             # Minimum delay between requests (seconds)
  delay_max: 12            # Maximum delay between requests (seconds)
  delay_page_min: 8        # Minimum delay between page navigations (seconds)
  delay_page_max: 15       # Maximum delay between page navigations (seconds)
  retry_max: 2             # Max retry attempts
  timeout: 45              # Page load timeout (seconds)
  headless: false          # Show browser window (set true for background)

# Storage paths
paths:
  downloads: "./downloads"
  database: "./library.db"
  bibtex: "../latex-templates/my-thesis/daftar-pustaka.bib"
  logs: "./logs"

# Predefined searches for Lakomi cooperative governance thesis
# Strategy: each query targets specific databases to avoid Google CAPTCHA
# ~3 databases per query, ~6 queries per database, 60+ total papers
# Scrapers auto-add site: filter, so don't include it here
# Run with: python download.py --all
searches:
  # ── IEEE (3 queries, broader) ──────────────────────────────
  - query: "blockchain voting security"
    topic: "governance-voting"
    databases: [ieee]
